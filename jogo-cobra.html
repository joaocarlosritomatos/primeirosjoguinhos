<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Cobrinha - Primeiros Joguinhos</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#a8e06e">
    <style>
        * {
            margin: 0; padding: 0; box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none; -webkit-user-select: none;
        }
        body {
            overflow: hidden;
            background: #558b2f;
            min-height: 100vh; min-height: 100dvh;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            touch-action: none;
        }
        .home-btn {
            position: fixed; top: 10px; left: 10px; z-index: 20;
            width: 40px; height: 40px; border-radius: 50%; border: none;
            background: rgba(255,255,255,0.25); font-size: 20px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            text-decoration: none;
        }
        .score-display {
            position: fixed; top: 12px; right: 16px; z-index: 20;
            font-size: clamp(20px, 5vw, 30px); font-weight: 900;
            color: white; text-shadow: 2px 2px 0 rgba(0,0,0,0.2);
        }
        canvas { display: block; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }

        /* Game Over overlay */
        .overlay {
            position: fixed; inset: 0; z-index: 30;
            background: rgba(0,0,0,0.5);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 15px;
            opacity: 0; pointer-events: none;
            transition: opacity 0.3s;
        }
        .overlay.show { opacity: 1; pointer-events: all; }
        .overlay-emoji { font-size: clamp(60px, 16vw, 100px); }
        .overlay-text {
            font-size: clamp(24px, 6vw, 40px); font-weight: 900;
            color: white; text-shadow: 2px 2px 0 rgba(0,0,0,0.3);
        }
        .overlay-score {
            font-size: clamp(16px, 4vw, 24px); color: rgba(255,255,255,0.8);
            font-weight: 700;
        }
        .play-btn {
            padding: 14px 40px; border: none; border-radius: 50px;
            background: #55efc4; color: #2d3436;
            font-size: clamp(18px, 4.5vw, 24px); font-weight: 800;
            cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: transform 0.15s;
        }
        .play-btn:active { transform: scale(0.93); }

        /* Touch controls hint */
        .controls-hint {
            position: fixed; bottom: 15px; left: 50%;
            transform: translateX(-50%); z-index: 20;
            font-size: 12px; color: rgba(255,255,255,0.4);
            text-align: center; pointer-events: none;
        }
        .ios-unlock{position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.6);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;cursor:pointer;backdrop-filter:blur(5px);}.ios-unlock-emoji{font-size:80px;animation:ios-bounce 1s ease-in-out infinite;}.ios-unlock-text{font-size:24px;font-weight:800;color:white;text-shadow:2px 2px 0 rgba(0,0,0,0.2);}@keyframes ios-bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
    </style>
</head>
<body>
<div class="ios-unlock" id="iosUnlock"><div class="ios-unlock-emoji">🔊</div><div class="ios-unlock-text">Toca para comecar!</div></div>
    <a href="index.html" class="home-btn">🏠</a>
    <div class="score-display">🍎 <span id="score">0</span></div>
    <canvas id="game"></canvas>

    <div class="overlay" id="startOverlay">
        <div class="overlay-emoji">🐍</div>
        <div class="overlay-text">Cobrinha!</div>
        <div class="overlay-score">Desliza para mover</div>
        <button class="play-btn" id="startBtn">Jogar!</button>
    </div>

    <div class="overlay" id="gameOverOverlay">
        <div class="overlay-emoji" id="goEmoji">😵</div>
        <div class="overlay-text">Oh nao!</div>
        <div class="overlay-score" id="goScore">Comeste 0 macas!</div>
        <button class="play-btn" id="retryBtn">Tentar outra vez!</button>
    </div>

    <div class="controls-hint">Desliza ou usa as setas ← ↑ → ↓</div>

    <script>
        const canvas = document.getElementById('game');
        const c = canvas.getContext('2d');

        // Grid config
        const CELL = 28;
        let COLS, ROWS;

        // Game state
        let snake, dir, nextDir, food, score, gameLoop, speed, state;
        let dizzyAngle = 0;
        let dizzyTimer = 0;
        let particles = [];
        let eatAnim = 0;

        // Audio
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        let ctx;
        function ensureAudio() {
            if (!ctx) ctx = new AudioCtx();
            if (ctx.state === 'suspended') ctx.resume();
        }
        function playEat() {
            ensureAudio();
            const t = ctx.currentTime;
            const o = ctx.createOscillator();
            const g = ctx.createGain();
            o.type = 'sine';
            o.frequency.setValueAtTime(500, t);
            o.frequency.linearRampToValueAtTime(900, t + 0.1);
            g.gain.setValueAtTime(0.2, t);
            g.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
            o.connect(g).connect(ctx.destination);
            o.start(t); o.stop(t + 0.25);
        }
        function playDie() {
            ensureAudio();
            const t = ctx.currentTime;
            [300, 250, 200, 150].forEach((f, i) => {
                const o = ctx.createOscillator();
                const g = ctx.createGain();
                o.type = 'sawtooth'; o.frequency.value = f;
                g.gain.setValueAtTime(0.15, t + i * 0.1);
                g.gain.exponentialRampToValueAtTime(0.001, t + i * 0.1 + 0.15);
                o.connect(g).connect(ctx.destination);
                o.start(t + i * 0.1); o.stop(t + i * 0.1 + 0.2);
            });
        }

        function resize() {
            const maxW = Math.min(window.innerWidth - 20, 500);
            const maxH = Math.min(window.innerHeight - 100, 600);
            COLS = Math.floor(maxW / CELL);
            ROWS = Math.floor(maxH / CELL);
            canvas.width = COLS * CELL;
            canvas.height = ROWS * CELL;
        }
        resize();
        window.addEventListener('resize', () => { resize(); });

        function init() {
            const cx = Math.floor(COLS / 2);
            const cy = Math.floor(ROWS / 2);
            snake = [
                { x: cx, y: cy },
                { x: cx - 1, y: cy },
                { x: cx - 2, y: cy },
            ];
            dir = { x: 1, y: 0 };
            nextDir = { x: 1, y: 0 };
            score = 0;
            speed = 180;
            particles = [];
            eatAnim = 0;
            dizzyTimer = 0;
            document.getElementById('score').textContent = '0';
            placeFood();
        }

        function placeFood() {
            let pos;
            do {
                pos = {
                    x: Math.floor(Math.random() * COLS),
                    y: Math.floor(Math.random() * ROWS)
                };
            } while (snake.some(s => s.x === pos.x && s.y === pos.y));
            food = pos;
            food.type = Math.random() > 0.3 ? 'apple' : 'star';
        }

        function spawnEatParticles(x, y) {
            for (let i = 0; i < 8; i++) {
                const angle = (Math.PI * 2 * i) / 8;
                particles.push({
                    x: (x + 0.5) * CELL,
                    y: (y + 0.5) * CELL,
                    vx: Math.cos(angle) * (2 + Math.random() * 2),
                    vy: Math.sin(angle) * (2 + Math.random() * 2),
                    r: 3 + Math.random() * 3,
                    life: 1,
                    color: food.type === 'apple' ? '#ff6b6b' : '#ffd93d'
                });
            }
        }

        // ========== DRAWING ==========
        function drawBoard() {
            // Checkered grass
            for (let r = 0; r < ROWS; r++) {
                for (let co = 0; co < COLS; co++) {
                    c.fillStyle = (r + co) % 2 === 0 ? '#a8e06e' : '#9bd45f';
                    c.fillRect(co * CELL, r * CELL, CELL, CELL);
                }
            }
        }

        function drawFood() {
            const x = (food.x + 0.5) * CELL;
            const y = (food.y + 0.5) * CELL;
            const size = CELL * 0.4;

            if (food.type === 'apple') {
                // Red apple
                c.beginPath();
                c.arc(x, y + 2, size, 0, Math.PI * 2);
                c.fillStyle = '#e74c3c';
                c.fill();
                // Highlight
                c.beginPath();
                c.arc(x - size * 0.25, y - size * 0.15, size * 0.3, 0, Math.PI * 2);
                c.fillStyle = 'rgba(255,255,255,0.35)';
                c.fill();
                // Stem
                c.beginPath();
                c.moveTo(x, y - size + 2);
                c.lineTo(x + 2, y - size - 5);
                c.strokeStyle = '#5d4037';
                c.lineWidth = 2;
                c.stroke();
                // Leaf
                c.beginPath();
                c.ellipse(x + 5, y - size - 2, 5, 3, 0.5, 0, Math.PI * 2);
                c.fillStyle = '#27ae60';
                c.fill();
            } else {
                // Golden star
                const spikes = 5;
                const outerR = size;
                const innerR = size * 0.45;
                c.beginPath();
                for (let i = 0; i < spikes * 2; i++) {
                    const r = i % 2 === 0 ? outerR : innerR;
                    const angle = (Math.PI * i) / spikes - Math.PI / 2;
                    if (i === 0) c.moveTo(x + r * Math.cos(angle), y + r * Math.sin(angle));
                    else c.lineTo(x + r * Math.cos(angle), y + r * Math.sin(angle));
                }
                c.closePath();
                c.fillStyle = '#ffd93d';
                c.fill();
                c.strokeStyle = '#f9a825';
                c.lineWidth = 1.5;
                c.stroke();
            }
        }

        function drawSnake(isDead) {
            // Body segments
            for (let i = snake.length - 1; i >= 0; i--) {
                const s = snake[i];
                const x = s.x * CELL;
                const y = s.y * CELL;
                const isHead = i === 0;
                const progress = i / snake.length;

                // Body color gradient from head to tail
                const r = Math.round(74 - progress * 30);
                const g = Math.round(105 + progress * 50);
                const b = Math.round(189 + progress * 30);
                const bodyColor = `rgb(${r}, ${g}, ${b})`;

                if (isHead) {
                    // HEAD - larger and round
                    const hx = x + CELL / 2;
                    const hy = y + CELL / 2;
                    const headR = CELL * 0.55;

                    c.beginPath();
                    c.arc(hx, hy, headR, 0, Math.PI * 2);
                    c.fillStyle = '#4a69bd';
                    c.fill();
                    c.strokeStyle = '#3c55a0';
                    c.lineWidth = 2;
                    c.stroke();

                    if (isDead) {
                        // DIZZY eyes - spirals!
                        dizzyAngle += 0.15;
                        [-1, 1].forEach(side => {
                            const ex = hx + side * 6;
                            const ey = hy - 3;

                            // White bg
                            c.beginPath();
                            c.arc(ex, ey, 6, 0, Math.PI * 2);
                            c.fillStyle = 'white';
                            c.fill();

                            // Spiral
                            c.beginPath();
                            c.strokeStyle = '#2d3436';
                            c.lineWidth = 1.5;
                            for (let t = 0; t < Math.PI * 4; t += 0.1) {
                                const sr = t * 0.8;
                                const sx = ex + Math.cos(t + dizzyAngle * side) * sr;
                                const sy = ey + Math.sin(t + dizzyAngle * side) * sr;
                                if (t === 0) c.moveTo(sx, sy);
                                else c.lineTo(sx, sy);
                            }
                            c.stroke();
                        });

                        // Dizzy mouth - wobbly
                        c.beginPath();
                        c.moveTo(hx - 5, hy + 7 + Math.sin(dizzyAngle * 3) * 2);
                        c.quadraticCurveTo(hx, hy + 10 + Math.sin(dizzyAngle * 2) * 3, hx + 5, hy + 7 + Math.cos(dizzyAngle * 3) * 2);
                        c.strokeStyle = '#2d3436';
                        c.lineWidth = 1.5;
                        c.stroke();

                        // Stars around head
                        for (let s = 0; s < 3; s++) {
                            const sa = dizzyAngle * 2 + (Math.PI * 2 * s) / 3;
                            const sr = 18;
                            c.font = '12px serif';
                            c.fillStyle = '#ffd93d';
                            c.fillText('⭐', hx + Math.cos(sa) * sr - 6, hy + Math.sin(sa) * sr - 12);
                        }
                    } else {
                        // Normal eyes
                        const lookX = dir.x * 2;
                        const lookY = dir.y * 2;

                        [-1, 1].forEach(side => {
                            const ex = hx + side * 6 + lookX;
                            const ey = hy - 3 + lookY;
                            // White
                            c.beginPath();
                            c.arc(ex, ey, 5.5, 0, Math.PI * 2);
                            c.fillStyle = 'white';
                            c.fill();
                            c.strokeStyle = '#3c55a0';
                            c.lineWidth = 1;
                            c.stroke();
                            // Pupil
                            c.beginPath();
                            c.arc(ex + lookX * 0.5, ey + lookY * 0.5, 2.5, 0, Math.PI * 2);
                            c.fillStyle = '#2d3436';
                            c.fill();
                        });

                        // Smile
                        if (eatAnim > 0) {
                            // Open mouth when eating
                            c.beginPath();
                            c.arc(hx + dir.x * 4, hy + dir.y * 4 + 4, 5, 0, Math.PI);
                            c.fillStyle = '#e74c3c';
                            c.fill();
                            eatAnim--;
                        } else {
                            c.beginPath();
                            c.arc(hx, hy + 5, 4, 0.1, Math.PI - 0.1);
                            c.strokeStyle = '#2d3436';
                            c.lineWidth = 1.5;
                            c.stroke();
                        }
                    }
                } else {
                    // BODY segment - rounded
                    const bx = x + CELL / 2;
                    const by = y + CELL / 2;
                    const segR = CELL * 0.42 - progress * 3;

                    c.beginPath();
                    c.arc(bx, by, segR, 0, Math.PI * 2);
                    c.fillStyle = bodyColor;
                    c.fill();
                    c.strokeStyle = 'rgba(0,0,0,0.1)';
                    c.lineWidth = 1;
                    c.stroke();
                }
            }
        }

        function drawParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.1;
                p.life -= 0.03;
                if (p.life <= 0) { particles.splice(i, 1); continue; }

                c.save();
                c.globalAlpha = p.life;
                c.beginPath();
                c.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
                c.fillStyle = p.color;
                c.fill();
                c.restore();
            }
        }

        // ========== GAME LOOP ==========
        function update() {
            dir = { ...nextDir };
            const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

            // Wall collision - wrap around (mais facil para criancas)
            if (head.x < 0) head.x = COLS - 1;
            if (head.x >= COLS) head.x = 0;
            if (head.y < 0) head.y = ROWS - 1;
            if (head.y >= ROWS) head.y = 0;

            // Self collision
            if (snake.some(s => s.x === head.x && s.y === head.y)) {
                gameOver();
                return;
            }

            snake.unshift(head);

            // Eat food
            if (head.x === food.x && head.y === food.y) {
                score += food.type === 'star' ? 3 : 1;
                document.getElementById('score').textContent = score;
                playEat();
                spawnEatParticles(food.x, food.y);
                eatAnim = 8;
                placeFood();
                // Speed up slightly
                if (speed > 100) speed -= 3;
            } else {
                snake.pop();
            }
        }

        function render(isDead) {
            drawBoard();
            drawFood();
            drawSnake(isDead);
            drawParticles();
        }

        function tick() {
            update();
            render(false);
            gameLoop = setTimeout(tick, speed);
        }

        function startGame() {
            document.getElementById('startOverlay').classList.remove('show');
            document.getElementById('gameOverOverlay').classList.remove('show');
            init();
            render(false);
            gameLoop = setTimeout(tick, speed);
            state = 'playing';
        }

        function gameOver() {
            clearTimeout(gameLoop);
            state = 'dead';
            playDie();
            dizzyAngle = 0;

            // Animate dizzy for a bit
            let dizzyFrames = 0;
            function dizzyLoop() {
                dizzyFrames++;
                render(true);
                if (dizzyFrames < 90) {
                    requestAnimationFrame(dizzyLoop);
                } else {
                    // Show game over
                    const goEmoji = document.getElementById('goEmoji');
                    const goScore = document.getElementById('goScore');
                    goEmoji.textContent = score >= 10 ? '🌟' : score >= 5 ? '😵' : '🐍';
                    goScore.textContent = `Comeste ${score} ${score === 1 ? 'maca' : 'macas'}!`;
                    document.getElementById('gameOverOverlay').classList.add('show');
                }
            }
            dizzyLoop();
        }

        // ========== CONTROLS ==========
        // Swipe
        let touchStartX = 0, touchStartY = 0;
        document.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }, { passive: true });
        document.addEventListener('touchend', (e) => {
            if (state !== 'playing') return;
            const dx = e.changedTouches[0].clientX - touchStartX;
            const dy = e.changedTouches[0].clientY - touchStartY;
            if (Math.abs(dx) < 20 && Math.abs(dy) < 20) return;

            if (Math.abs(dx) > Math.abs(dy)) {
                if (dx > 0 && dir.x !== -1) nextDir = { x: 1, y: 0 };
                else if (dx < 0 && dir.x !== 1) nextDir = { x: -1, y: 0 };
            } else {
                if (dy > 0 && dir.y !== -1) nextDir = { x: 0, y: 1 };
                else if (dy < 0 && dir.y !== 1) nextDir = { x: 0, y: -1 };
            }
        }, { passive: true });

        // Keyboard
        document.addEventListener('keydown', (e) => {
            if (state !== 'playing') return;
            switch (e.key) {
                case 'ArrowUp':    case 'w': if (dir.y !== 1) nextDir = { x: 0, y: -1 }; break;
                case 'ArrowDown':  case 's': if (dir.y !== -1) nextDir = { x: 0, y: 1 }; break;
                case 'ArrowLeft':  case 'a': if (dir.x !== 1) nextDir = { x: -1, y: 0 }; break;
                case 'ArrowRight': case 'd': if (dir.x !== -1) nextDir = { x: 1, y: 0 }; break;
            }
            e.preventDefault();
        });

        // Buttons
        document.getElementById('startBtn').addEventListener('pointerdown', (e) => {
            e.preventDefault();
            startGame();
        });
        document.getElementById('retryBtn').addEventListener('pointerdown', (e) => {
            e.preventDefault();
            startGame();
        });

        // Initial render
        state = 'start';
        init();
        render(false);
        document.getElementById('startOverlay').classList.add('show');

        document.addEventListener('gesturestart', e => e.preventDefault());
        document.addEventListener('dblclick', e => e.preventDefault());

        // iOS audio unlock
        document.getElementById('iosUnlock').addEventListener('touchstart', function(e) {
            e.preventDefault();
            ensureAudio();
            const b = ctx.createBuffer(1, 1, 22050);
            const s = ctx.createBufferSource();
            s.buffer = b;
            s.connect(ctx.destination);
            s.start(0);
            this.remove();
        }, { once: true });
        document.getElementById('iosUnlock').addEventListener('click', function(e) {
            ensureAudio();
            const b = ctx.createBuffer(1, 1, 22050);
            const s = ctx.createBufferSource();
            s.buffer = b;
            s.connect(ctx.destination);
            s.start(0);
            this.remove();
        }, { once: true });
    </script>
</body>
</html>
