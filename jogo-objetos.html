<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Objetos do Dia a Dia - Primeiros Joguinhos</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#ffeaa7">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;}
        body{overflow:hidden;background:linear-gradient(135deg,#ffeaa7 0%,#fdcb6e 50%,#f9ca24 100%);min-height:100vh;min-height:100dvh;font-family:'Segoe UI',sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;}
        .cloud{position:fixed;background:rgba(255,255,255,0.5);border-radius:50px;animation:float-cloud linear infinite;z-index:0;pointer-events:none;}
        .cloud::before,.cloud::after{content:'';position:absolute;background:rgba(255,255,255,0.5);border-radius:50%;}
        .cloud::before{width:60%;height:80%;top:-40%;left:20%;}
        .cloud::after{width:40%;height:60%;top:-25%;left:55%;}
        @keyframes float-cloud{from{transform:translateX(110vw)}to{transform:translateX(-200px)}}
        .page-dots{position:relative;z-index:2;display:flex;gap:8px;margin-bottom:8px;}
        .page-dot{width:12px;height:12px;border-radius:50%;background:rgba(255,255,255,0.4);border:2px solid rgba(255,255,255,0.7);transition:all 0.3s;}
        .page-dot.active{background:white;transform:scale(1.3);box-shadow:0 0 8px rgba(255,255,255,0.8);}
        .game-container{position:relative;z-index:1;display:grid;grid-template-columns:repeat(3,1fr);gap:14px;padding:14px;max-width:520px;width:100%;}
        .obj-btn{aspect-ratio:1;border:none;border-radius:22px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:clamp(42px,11vw,68px);transition:transform 0.15s ease;position:relative;overflow:hidden;box-shadow:0 6px 20px rgba(0,0,0,0.12);gap:2px;}
        .obj-btn .obj-name{font-size:clamp(9px,2.3vw,13px);font-weight:800;color:rgba(0,0,0,0.35);letter-spacing:0.5px;}
        .obj-btn:active{transform:scale(0.93);}
        .obj-btn.pop{animation:pop-bounce 0.6s ease;}
        @keyframes pop-bounce{0%{transform:scale(1)}20%{transform:scale(1.25) rotate(-5deg)}40%{transform:scale(1.15) rotate(5deg)}60%{transform:scale(1.2) rotate(-3deg)}80%{transform:scale(1.1) rotate(2deg)}100%{transform:scale(1) rotate(0deg)}}
        .obj-btn:nth-child(1){background:linear-gradient(145deg,#FFE66D,#FFD93D);}
        .obj-btn:nth-child(2){background:linear-gradient(145deg,#FF6B6B,#EE5A24);}
        .obj-btn:nth-child(3){background:linear-gradient(145deg,#4ECDC4,#44BD9E);}
        .obj-btn:nth-child(4){background:linear-gradient(145deg,#A29BFE,#6C5CE7);}
        .obj-btn:nth-child(5){background:linear-gradient(145deg,#FD79A8,#E84393);}
        .obj-btn:nth-child(6){background:linear-gradient(145deg,#FFEAA7,#FDCB6E);}
        .obj-btn:nth-child(7){background:linear-gradient(145deg,#74b9ff,#0984e3);}
        .obj-btn:nth-child(8){background:linear-gradient(145deg,#55efc4,#00b894);}
        .obj-btn:nth-child(9){background:linear-gradient(145deg,#fab1a0,#e17055);}
        .particle{position:fixed;pointer-events:none;z-index:100;font-size:28px;animation:particle-fly 1s ease-out forwards;}
        @keyframes particle-fly{0%{opacity:1;transform:translate(0,0) scale(1) rotate(0deg)}100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(0.3) rotate(360deg)}}
        .sound-label{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:clamp(28px,7vw,50px);font-weight:900;color:white;text-shadow:3px 3px 0 rgba(0,0,0,0.25),-1px -1px 0 rgba(0,0,0,0.1);pointer-events:none;z-index:200;animation:label-pop 1.2s ease-out forwards;}
        @keyframes label-pop{0%{opacity:0;transform:translate(-50%,-50%) scale(0.3)}15%{opacity:1;transform:translate(-50%,-50%) scale(1.2)}30%{transform:translate(-50%,-50%) scale(1)}70%{opacity:1}100%{opacity:0;transform:translate(-50%,-70%) scale(1.1)}}
        .bg-flash{position:fixed;inset:0;pointer-events:none;z-index:50;animation:flash 0.4s ease-out forwards;}
        @keyframes flash{0%{opacity:0.3}100%{opacity:0}}
        .nav-area{position:relative;z-index:1;display:flex;gap:16px;margin-top:8px;}
        .nav-btn{padding:12px 32px;border:none;border-radius:50px;background:rgba(255,255,255,0.7);font-size:26px;cursor:pointer;box-shadow:0 4px 15px rgba(0,0,0,0.1);transition:transform 0.15s;backdrop-filter:blur(5px);}
        .nav-btn:active{transform:scale(0.93);}
        .home-btn{position:fixed;top:12px;left:12px;z-index:20;width:42px;height:42px;border-radius:50%;border:none;background:rgba(255,255,255,0.6);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;text-decoration:none;box-shadow:0 2px 8px rgba(0,0,0,0.1);}
        .cat-title{position:relative;z-index:2;font-size:clamp(16px,4vw,22px);font-weight:800;color:rgba(255,255,255,0.8);text-shadow:1px 1px 0 rgba(0,0,0,0.1);}
        .grass{position:fixed;bottom:0;left:0;right:0;height:35px;background:#7ec881;border-radius:50% 50% 0 0/100% 100% 0 0;z-index:0;pointer-events:none;}
        .ios-unlock{position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.6);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;cursor:pointer;backdrop-filter:blur(5px);}.ios-unlock-emoji{font-size:80px;animation:ios-bounce 1s ease-in-out infinite;}.ios-unlock-text{font-size:24px;font-weight:800;color:white;text-shadow:2px 2px 0 rgba(0,0,0,0.2);}@keyframes ios-bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
    </style>
</head>
<body>
<div class="ios-unlock" id="iosUnlock"><div class="ios-unlock-emoji">🔊</div><div class="ios-unlock-text">Toca para comecar!</div></div>
    <a href="index.html" class="home-btn">🏠</a>
    <div class="cloud" style="width:120px;height:40px;top:8%;animation-duration:25s;animation-delay:-5s;"></div>
    <div class="cloud" style="width:90px;height:30px;top:18%;animation-duration:35s;animation-delay:-15s;"></div>
    <div class="cloud" style="width:150px;height:45px;top:5%;animation-duration:30s;animation-delay:-22s;"></div>

    <div class="cat-title" id="catTitle"></div>
    <div class="page-dots" id="dots"></div>
    <div class="game-container" id="game"></div>
    <div class="nav-area">
        <button class="nav-btn" id="prevBtn">&#9664;</button>
        <button class="nav-btn" id="nextBtn">&#9654;</button>
    </div>
    <div class="grass"></div>

    <script>
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        let ctx;
        function ensureAudio(){if(!ctx)ctx=new AudioCtx();if(ctx.state==='suspended')ctx.resume();}
        // Global iOS resume on any touch
        document.addEventListener('touchend', function() { ensureAudio(); }, true);
        document.addEventListener('click', function() { ensureAudio(); }, true);

        function playSound(freqs, type, duration) {
            ensureAudio();
            const t = ctx.currentTime;
            freqs.forEach((f, i) => {
                const o = ctx.createOscillator();
                const g = ctx.createGain();
                o.type = type || 'sine';
                o.frequency.setValueAtTime(f[0], t + i * 0.12);
                if (f[1]) o.frequency.linearRampToValueAtTime(f[1], t + i * 0.12 + (duration || 0.15));
                g.gain.setValueAtTime(0.25, t + i * 0.12);
                g.gain.exponentialRampToValueAtTime(0.001, t + i * 0.12 + (duration || 0.2));
                o.connect(g).connect(ctx.destination);
                o.start(t + i * 0.12);
                o.stop(t + i * 0.12 + (duration || 0.25));
            });
        }

        // Noise helper
        function noise(dur,freq,Q,vol,t0){
            const n=ctx.createBufferSource();const buf=ctx.createBuffer(1,ctx.sampleRate*dur,ctx.sampleRate);
            const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1);
            n.buffer=buf;const f=ctx.createBiquadFilter();f.type='bandpass';f.frequency.value=freq;f.Q.value=Q;
            const g=ctx.createGain();g.gain.setValueAtTime(vol,t0);g.gain.exponentialRampToValueAtTime(0.001,t0+dur);
            n.connect(f).connect(g).connect(ctx.destination);n.start(t0);n.stop(t0+dur+0.01);
        }
        // Osc helper
        function osc(type,fEnv,gEnv,t0,dur){
            const o=ctx.createOscillator(),g=ctx.createGain();o.type=type;
            o.frequency.setValueAtTime(fEnv[0][1],t0+fEnv[0][0]);
            for(let i=1;i<fEnv.length;i++)o.frequency.linearRampToValueAtTime(fEnv[i][1],t0+fEnv[i][0]);
            g.gain.setValueAtTime(gEnv[0][1],t0+gEnv[0][0]);
            for(let i=1;i<gEnv.length;i++)g.gain.linearRampToValueAtTime(gEnv[i][1],t0+gEnv[i][0]);
            o.connect(g).connect(ctx.destination);o.start(t0);o.stop(t0+dur);
        }

        // Realistic sound effects
        const soundFX = {
            // Door knock - two thumps on wood
            knock() {
                ensureAudio(); const t=ctx.currentTime;
                for(let i=0;i<2;i++){
                    const s=t+i*0.2;
                    osc('triangle',[[0,180],[0.02,100],[0.06,60]],[[0,0.4],[0.02,0.3],[0.08,0]],s,0.1);
                    noise(0.06,800,3,0.2,s);
                }
            },
            // Window sliding open
            window_open() {
                ensureAudio(); const t=ctx.currentTime;
                noise(0.5,2000,1,0.15,t);
                osc('sine',[[0,300],[0.3,500],[0.5,400]],[[0,0],[0.05,0.08],[0.3,0.06],[0.5,0]],t,0.55);
            },
            // Light switch click
            light_click() {
                ensureAudio(); const t=ctx.currentTime;
                osc('square',[[0,2000],[0.01,800]],[[0,0.3],[0.01,0.2],[0.04,0]],t,0.05);
                noise(0.03,5000,8,0.15,t);
            },
            // Snoring / sleeping
            snore() {
                ensureAudio(); const t=ctx.currentTime;
                for(let i=0;i<2;i++){
                    const s=t+i*0.6;
                    osc('sawtooth',[[0,80],[0.2,120],[0.4,80]],[[0,0],[0.05,0.1],[0.2,0.08],[0.4,0]],s,0.45);
                    noise(0.35,200,2,0.06,s+0.05);
                }
            },
            // Chair creak
            chair() {
                ensureAudio(); const t=ctx.currentTime;
                osc('sine',[[0,300],[0.05,350],[0.15,280]],[[0,0.15],[0.05,0.12],[0.2,0]],t,0.22);
                osc('sine',[[0,600],[0.05,700],[0.15,560]],[[0,0.04],[0.05,0.03],[0.2,0]],t,0.22);
            },
            // Shower water
            shower() {
                ensureAudio(); const t=ctx.currentTime;
                noise(0.8,3000,1,0.2,t);
                noise(0.8,6000,2,0.1,t);
                noise(0.6,1000,1.5,0.08,t+0.1);
            },
            // TV turn on beep
            tv_on() {
                ensureAudio(); const t=ctx.currentTime;
                osc('sine',[[0,800],[0.05,1000]],[[0,0],[0.01,0.2],[0.05,0.15],[0.15,0]],t,0.18);
                noise(0.3,2000,1,0.05,t+0.05);
            },
            // Keys jingling
            keys() {
                ensureAudio(); const t=ctx.currentTime;
                for(let i=0;i<4;i++){
                    const s=t+i*0.08;
                    osc('sine',[[0,3000+i*500],[0.05,2000+i*300]],[[0,0.1],[0.02,0.08],[0.06,0]],s,0.08);
                }
            },
            // Clock ticking
            clock() {
                ensureAudio(); const t=ctx.currentTime;
                for(let i=0;i<4;i++){
                    osc('sine',[[0,1800],[0.01,1200]],[[0,0.15],[0.01,0.1],[0.03,0]],t+i*0.3,0.04);
                }
            },
            // Plate/dish ding
            plate() {
                ensureAudio(); const t=ctx.currentTime;
                osc('sine',[[0,1200],[0.3,1000]],[[0,0.2],[0.05,0.15],[0.4,0]],t,0.45);
                osc('sine',[[0,2400],[0.3,2000]],[[0,0.06],[0.05,0.04],[0.3,0]],t,0.35);
            },
            // Spoon clinking
            spoon() {
                ensureAudio(); const t=ctx.currentTime;
                osc('sine',[[0,2500],[0.1,2000]],[[0,0.15],[0.02,0.12],[0.12,0]],t,0.15);
                osc('sine',[[0,5000],[0.1,4000]],[[0,0.04],[0.02,0.03],[0.1,0]],t,0.12);
            },
            // Frying sizzle
            sizzle() {
                ensureAudio(); const t=ctx.currentTime;
                noise(0.7,4000,2,0.2,t);
                noise(0.5,8000,3,0.08,t+0.1);
            },
            // Ice crack
            ice() {
                ensureAudio(); const t=ctx.currentTime;
                osc('square',[[0,3000],[0.02,500]],[[0,0.2],[0.02,0.1],[0.05,0]],t,0.06);
                noise(0.08,6000,5,0.15,t);
            },
            // Sipping tea
            sip() {
                ensureAudio(); const t=ctx.currentTime;
                noise(0.2,1500,3,0.12,t);
                osc('sine',[[0,400],[0.15,300]],[[0,0],[0.02,0.05],[0.15,0]],t,0.18);
            },
            // Pouring water
            pour() {
                ensureAudio(); const t=ctx.currentTime;
                noise(0.6,1500,2,0.15,t);
                for(let i=0;i<5;i++) osc('sine',[[0,400+i*50],[0.05,350+i*30]],[[0,0.03],[0.03,0.02],[0.06,0]],t+i*0.1,0.08);
            },
            // Bottle pop
            bottle_pop() {
                ensureAudio(); const t=ctx.currentTime;
                osc('sine',[[0,300],[0.01,800]],[[0,0.3],[0.01,0.2],[0.06,0]],t,0.08);
                noise(0.05,3000,5,0.2,t+0.01);
            },
            // Sponge squeeze
            sponge() {
                ensureAudio(); const t=ctx.currentTime;
                noise(0.3,800,2,0.12,t);
                osc('sine',[[0,200],[0.2,300]],[[0,0],[0.05,0.04],[0.2,0]],t,0.25);
            },
            // Zipper
            zipper() {
                ensureAudio(); const t=ctx.currentTime;
                for(let i=0;i<8;i++){
                    osc('square',[[0,2000+i*200],[0.02,1500+i*150]],[[0,0.06],[0.01,0.04],[0.03,0]],t+i*0.04,0.04);
                }
            },
            // Shoes tap
            shoes() {
                ensureAudio(); const t=ctx.currentTime;
                for(let i=0;i<3;i++){
                    osc('triangle',[[0,250],[0.02,150]],[[0,0.3],[0.02,0.15],[0.06,0]],t+i*0.22,0.08);
                    noise(0.04,1500,4,0.12,t+i*0.22);
                }
            },
            // Snap elastic
            snap() {
                ensureAudio(); const t=ctx.currentTime;
                osc('sine',[[0,1500],[0.01,600]],[[0,0.25],[0.01,0.15],[0.05,0]],t,0.06);
            },
            // Hat plop
            plop() {
                ensureAudio(); const t=ctx.currentTime;
                osc('sine',[[0,400],[0.05,200]],[[0,0.2],[0.05,0.1],[0.15,0]],t,0.18);
            },
            // Car engine
            car() {
                ensureAudio(); const t=ctx.currentTime;
                const o=ctx.createOscillator(),o2=ctx.createOscillator(),g=ctx.createGain();
                o.type='sawtooth';o2.type='sawtooth';
                o.frequency.setValueAtTime(80,t);o.frequency.linearRampToValueAtTime(150,t+0.3);
                o.frequency.linearRampToValueAtTime(200,t+0.6);o.frequency.linearRampToValueAtTime(120,t+1);
                o2.frequency.setValueAtTime(82,t);o2.frequency.linearRampToValueAtTime(153,t+0.3);
                g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.15,t+0.1);
                g.gain.setValueAtTime(0.15,t+0.7);g.gain.linearRampToValueAtTime(0,t+1);
                o.connect(g).connect(ctx.destination);o2.connect(g);
                o.start(t);o2.start(t);o.stop(t+1.05);o2.stop(t+1.05);
            },
            // Bus horn
            bus_horn() {
                ensureAudio(); const t=ctx.currentTime;
                osc('sawtooth',[[0,220],[0.6,220]],[[0,0],[0.02,0.2],[0.5,0.2],[0.65,0]],t,0.7);
                osc('sawtooth',[[0,277],[0.6,277]],[[0,0],[0.02,0.1],[0.5,0.1],[0.65,0]],t,0.7);
            },
            // Bicycle bell
            bike_bell() {
                ensureAudio(); const t=ctx.currentTime;
                for(let i=0;i<2;i++){
                    osc('sine',[[0,2200],[0.15,2000]],[[0,0.2],[0.02,0.18],[0.2,0]],t+i*0.22,0.25);
                    osc('sine',[[0,4400],[0.15,4000]],[[0,0.05],[0.02,0.04],[0.15,0]],t+i*0.22,0.18);
                }
            },
            // Airplane
            airplane() {
                ensureAudio(); const t=ctx.currentTime;
                noise(1.2,400,1,0.12,t);
                osc('sawtooth',[[0,100],[0.3,180],[0.8,250],[1.2,200]],
                    [[0,0],[0.05,0.1],[0.3,0.12],[0.8,0.1],[1.2,0]],t,1.25);
            },
            // Train
            train() {
                ensureAudio(); const t=ctx.currentTime;
                // Chu chu
                for(let i=0;i<2;i++){
                    const s=t+i*0.4;
                    osc('sawtooth',[[0,300],[0.05,500],[0.15,400]],[[0,0],[0.02,0.2],[0.1,0.15],[0.2,0]],s,0.22);
                    noise(0.15,2000,3,0.1,s);
                }
                // Wheels
                for(let i=0;i<6;i++) osc('triangle',[[0,100],[0.03,80]],[[0,0.08],[0.02,0.05],[0.05,0]],t+i*0.15,0.06);
            },
            // Rocket launch
            rocket() {
                ensureAudio(); const t=ctx.currentTime;
                noise(1.5,300,0.5,0.15,t);
                osc('sawtooth',[[0,50],[0.5,100],[1,200],[1.5,400]],
                    [[0,0],[0.1,0.12],[0.8,0.15],[1.5,0]],t,1.55);
            },
            // Motorcycle
            moto() {
                ensureAudio(); const t=ctx.currentTime;
                const o=ctx.createOscillator(),g=ctx.createGain();
                o.type='sawtooth';
                o.frequency.setValueAtTime(60,t);o.frequency.linearRampToValueAtTime(120,t+0.2);
                o.frequency.linearRampToValueAtTime(200,t+0.5);o.frequency.linearRampToValueAtTime(100,t+0.8);
                g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.15,t+0.05);
                g.gain.setValueAtTime(0.15,t+0.6);g.gain.linearRampToValueAtTime(0,t+0.85);
                o.connect(g).connect(ctx.destination);o.start(t);o.stop(t+0.9);
            },
            // Boat horn
            boat() {
                ensureAudio(); const t=ctx.currentTime;
                osc('sawtooth',[[0,130],[0.8,125]],[[0,0],[0.05,0.2],[0.6,0.2],[0.85,0]],t,0.9);
                osc('sine',[[0,260],[0.8,250]],[[0,0],[0.05,0.08],[0.6,0.08],[0.85,0]],t,0.9);
            },
            // Helicopter
            helicopter() {
                ensureAudio(); const t=ctx.currentTime;
                for(let i=0;i<10;i++){
                    osc('sawtooth',[[0,80],[0.04,60]],[[0,0.12],[0.02,0.08],[0.06,0]],t+i*0.08,0.07);
                    noise(0.04,1000,3,0.06,t+i*0.08);
                }
            },
            // Ball bounce
            ball() {
                ensureAudio(); const t=ctx.currentTime;
                const bounces=[0,0.25,0.42,0.54];
                bounces.forEach((b,i)=>{
                    const f=300-i*40;
                    osc('sine',[[0,f],[0.05,f*0.6]],[[0,0.25-i*0.05],[0.05,0.1],[0.1,0]],t+b,0.12);
                    noise(0.04,1200,5,0.1-i*0.02,t+b);
                });
            },
            // Paint splash
            paint() {
                ensureAudio(); const t=ctx.currentTime;
                noise(0.4,1500,1.5,0.18,t);
                osc('sine',[[0,300],[0.2,200]],[[0,0.05],[0.1,0.03],[0.3,0]],t,0.35);
            },
            // Balloon pop
            balloon() {
                ensureAudio(); const t=ctx.currentTime;
                osc('sine',[[0,1000],[0.005,200]],[[0,0.4],[0.005,0.2],[0.03,0]],t,0.04);
                noise(0.1,3000,2,0.3,t);
            },
            // Dice rolling
            dice() {
                ensureAudio(); const t=ctx.currentTime;
                for(let i=0;i<6;i++){
                    noise(0.03,3000+i*500,8,0.12,t+i*0.06);
                    osc('triangle',[[0,200+i*30],[0.02,150+i*20]],[[0,0.08],[0.02,0.04],[0.04,0]],t+i*0.06,0.05);
                }
            },
            // Crayon scribble
            crayon() {
                ensureAudio(); const t=ctx.currentTime;
                noise(0.5,3000,3,0.08,t);
                for(let i=0;i<5;i++) osc('triangle',[[0,800+i*100],[0.06,600+i*80]],[[0,0.03],[0.04,0.02],[0.07,0]],t+i*0.08,0.08);
            },
            // Kite wind
            kite() {
                ensureAudio(); const t=ctx.currentTime;
                noise(0.8,1000,1,0.1,t);
                osc('sine',[[0,300],[0.4,500],[0.8,350]],[[0,0],[0.1,0.05],[0.5,0.04],[0.8,0]],t,0.85);
            },
            // Yoyo
            yoyo() {
                ensureAudio(); const t=ctx.currentTime;

        let currentPage = 0;

        const particleEmojis = ['⭐','✨','🌟','💫','❤️','🎉','🎶','🎵'];

        function spawnParticles(x, y) {
            for (let i = 0; i < 10; i++) {
                const el = document.createElement('div');
                el.className = 'particle';
                el.textContent = particleEmojis[Math.floor(Math.random() * particleEmojis.length)];
                const angle = (Math.PI * 2 * i) / 10;
                const dist = 70 + Math.random() * 60;
                el.style.left = x + 'px';
                el.style.top = y + 'px';
                el.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
                el.style.setProperty('--ty', Math.sin(angle) * dist + 'px');
                document.body.appendChild(el);
                setTimeout(() => el.remove(), 1000);
            }
        }

        function showLabel(text) {
            const el = document.createElement('div');
            el.className = 'sound-label';
            el.textContent = text;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 1200);
        }

        function flashBg(color) {
            const el = document.createElement('div');
            el.className = 'bg-flash';
            el.style.background = color;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 400);
        }

        function onObjClick(e, obj) {
            const rect = e.currentTarget.getBoundingClientRect();
            const cx = rect.left + rect.width / 2;
            const cy = rect.top + rect.height / 2;

            e.currentTarget.classList.remove('pop');
            void e.currentTarget.offsetWidth;
            e.currentTarget.classList.add('pop');

            // Play sound
            if (soundFX[obj.sound]) soundFX[obj.sound]();

            // Also speak the name
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const u = new SpeechSynthesisUtterance(obj.name);
                u.lang = 'pt-PT';
                u.rate = 0.9;
                u.pitch = 1.2;
                setTimeout(() => window.speechSynthesis.speak(u), 400);
            }

            spawnParticles(cx, cy);
            showLabel(obj.label);
            flashBg('rgba(255,255,255,0.3)');
        }

        function renderDots() {
            const dots = document.getElementById('dots');
            dots.innerHTML = '';
            for (let i = 0; i < objectPages.length; i++) {
                const d = document.createElement('div');
                d.className = 'page-dot' + (i === currentPage ? ' active' : '');
                d.onclick = () => { currentPage = i; renderPage(); };
                dots.appendChild(d);
            }
        }

        function renderPage() {
            const container = document.getElementById('game');
            container.innerHTML = '';
            const page = objectPages[currentPage];

            document.getElementById('catTitle').textContent = page.title;

            page.items.forEach(obj => {
                const btn = document.createElement('button');
                btn.className = 'obj-btn';

                const emojiSpan = document.createElement('span');
                emojiSpan.textContent = obj.emoji;

                const nameSpan = document.createElement('span');
                nameSpan.className = 'obj-name';
                nameSpan.textContent = obj.name;

                btn.appendChild(emojiSpan);
                btn.appendChild(nameSpan);

                btn.addEventListener('click', (e) => {
                    e.preventDefault();
                    onObjClick(e, obj);
                });

                container.appendChild(btn);
            });

            renderDots();
        }

        document.getElementById('nextBtn').addEventListener('click', () => {
            currentPage = (currentPage + 1) % objectPages.length;
            renderPage();
        });
        document.getElementById('prevBtn').addEventListener('click', () => {
            currentPage = (currentPage - 1 + objectPages.length) % objectPages.length;
            renderPage();
        });

        // Swipe support
        let touchStartX = 0;
        document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
        document.addEventListener('touchend', e => {
            const diff = e.changedTouches[0].clientX - touchStartX;
            if (Math.abs(diff) > 60) {
                if (diff < 0) { currentPage = (currentPage + 1) % objectPages.length; renderPage(); }
                else { currentPage = (currentPage - 1 + objectPages.length) % objectPages.length; renderPage(); }
            }
        }, { passive: true });

        renderPage();

        document.addEventListener('gesturestart', e => e.preventDefault());
        document.addEventListener('dblclick', e => e.preventDefault());

            function doUnlock(e) {
                if (e) e.preventDefault();
                try { var audio = new Audio(silentMP3); audio.volume = 0.01; audio.play().catch(function(){}); } catch(err) {}
                var AC = window.AudioContext || window.webkitAudioContext;
                if (!ctx) ctx = new AC();
                if (ctx.state === 'suspended') { ctx.resume(); }
                try { var o = ctx.createOscillator(); var g = ctx.createGain(); g.gain.value = 0.001; o.connect(g); g.connect(ctx.destination); o.start(0); o.stop(ctx.currentTime + 0.05); } catch(err) {}
                unlock.style.display = 'none';
                document.removeEventListener('touchstart', doUnlock, true);
                document.removeEventListener('touchend', doUnlock, true);
                document.removeEventListener('click', doUnlock, true);
            }
            unlock.addEventListener('touchend', doUnlock);
            unlock.addEventListener('click', doUnlock);
            document.addEventListener('touchstart', doUnlock, true);
            document.addEventListener('touchend', doUnlock, true);
