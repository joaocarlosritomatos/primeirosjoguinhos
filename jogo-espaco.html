<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Limpa o Espaço - Primeiros Joguinhos</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0a0a2e">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;}
        body {
            overflow:hidden;
            background:linear-gradient(180deg,#0a0a2e 0%,#16213e 30%,#1a1a4e 60%,#2d1b4e 100%);
            min-height:100vh;min-height:100dvh;
            font-family:'Segoe UI',sans-serif;
            touch-action:none;
        }
        canvas{display:block;width:100vw;height:100vh;height:100dvh;position:absolute;top:0;left:0;}
        #tc{pointer-events:auto;z-index:2;}
        .home-btn{
            position:fixed;top:10px;left:10px;z-index:20;
            width:42px;height:42px;border-radius:50%;border:none;
            background:rgba(255,255,255,0.2);font-size:20px;cursor:pointer;
            display:flex;align-items:center;justify-content:center;text-decoration:none;
        }
        .hud{
            position:fixed;top:12px;right:16px;z-index:20;
            display:flex;gap:14px;align-items:center;
        }
        .hud-item{
            font-size:clamp(16px,4vw,22px);font-weight:800;
            color:white;text-shadow:1px 1px 0 rgba(0,0,0,0.5);
        }
        .msg{
            position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
            z-index:30;font-size:clamp(20px,5vw,32px);font-weight:900;
            color:white;text-shadow:2px 2px 0 rgba(0,0,0,0.5);
            text-align:center;pointer-events:none;
            animation:msg-pop 2s ease-out forwards;
        }
        @keyframes msg-pop{
            0%{opacity:0;transform:translate(-50%,-50%) scale(0.5)}
            15%{opacity:1;transform:translate(-50%,-50%) scale(1.1)}
            30%{transform:translate(-50%,-50%) scale(1)}
            70%{opacity:1}
            100%{opacity:0;transform:translate(-50%,-60%)}
        }
        .particle{
            position:fixed;pointer-events:none;z-index:25;
            font-size:20px;animation:p-fly 1s ease-out forwards;
        }
        @keyframes p-fly{
            0%{opacity:1;transform:translate(0,0) scale(1)}
            100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(0.3)}
        }
        .level-complete{
            position:fixed;inset:0;z-index:50;
            background:rgba(0,0,0,0.7);backdrop-filter:blur(5px);
            display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;
            opacity:0;pointer-events:none;transition:opacity 0.3s;
        }
        .level-complete.show{opacity:1;pointer-events:all;}
        .lc-emoji{font-size:80px;}
        .lc-text{font-size:clamp(24px,6vw,36px);font-weight:900;color:white;text-shadow:2px 2px 0 rgba(0,0,0,0.5);}
        .lc-sub{font-size:clamp(14px,3.5vw,18px);color:rgba(255,255,255,0.7);font-weight:600;}
        .lc-btn{
            padding:14px 40px;border:none;border-radius:50px;
            background:#a29bfe;color:#fff;font-size:clamp(16px,4vw,22px);
            font-weight:800;cursor:pointer;margin-top:8px;
        }
        .lc-btn:active{transform:scale(0.93);}
    </style>
</head>
<body>
    <a href="index.html" class="home-btn">🏠</a>
    <div class="hud">
        <span class="hud-item" id="trashCount">🗑️ 0</span>
        <span class="hud-item" id="levelDisplay">Nivel 1</span>
    </div>
    <canvas id="c"></canvas>
    <canvas id="tc"></canvas>

    <div class="level-complete" id="levelComplete">
        <div class="lc-emoji">🚀</div>
        <div class="lc-text" id="lcText">Espaço mais limpo!</div>
        <div class="lc-sub" id="lcSub">Removeste todo o lixo espacial!</div>
        <button class="lc-btn" id="lcBtn">Proximo nivel!</button>
    </div>

    <script>
        const canvas = document.getElementById('c');
        const c = canvas.getContext('2d');
        const trashCanvas = document.getElementById('tc');
        const tc = trashCanvas.getContext('2d');
        let W, H, dpr;

        // Audio
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        let actx;
        function ensureAudio(){if(!actx)actx=new AudioCtx();if(actx.state==='suspended')actx.resume();}

        function playClean(){
            ensureAudio();const t=actx.currentTime;
            [600,900,1200].forEach((f,i)=>{
                const o=actx.createOscillator(),g=actx.createGain();
                o.type='sine';o.frequency.value=f;
                g.gain.setValueAtTime(0.15,t+i*0.06);
                g.gain.exponentialRampToValueAtTime(0.001,t+i*0.06+0.2);
                o.connect(g).connect(actx.destination);
                o.start(t+i*0.06);o.stop(t+i*0.06+0.25);
            });
        }
        function playWrong(){
            ensureAudio();const t=actx.currentTime;
            const o=actx.createOscillator(),g=actx.createGain();
            o.type='sawtooth';o.frequency.value=200;
            o.frequency.exponentialRampToValueAtTime(100,t+0.15);
            g.gain.setValueAtTime(0.1,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.2);
            o.connect(g).connect(actx.destination);o.start(t);o.stop(t+0.25);
        }
        function playWin(){
            ensureAudio();const t=actx.currentTime;
            [523,659,784,1047,1319].forEach((f,i)=>{
                const o=actx.createOscillator(),g=actx.createGain();
                o.type='sine';o.frequency.value=f;
                g.gain.setValueAtTime(0.18,t+i*0.12);g.gain.exponentialRampToValueAtTime(0.001,t+i*0.12+0.4);
                o.connect(g).connect(actx.destination);o.start(t+i*0.12);o.stop(t+i*0.12+0.45);
            });
        }

        function resize(){
            dpr=window.devicePixelRatio||1;
            W=window.innerWidth;H=window.innerHeight;
            [canvas, trashCanvas].forEach(cv=>{
                cv.width=W*dpr;cv.height=H*dpr;
                cv.style.width=W+'px';cv.style.height=H+'px';
            });
            c.setTransform(dpr,0,0,dpr,0,0);
            tc.setTransform(dpr,0,0,dpr,0,0);
        }
        resize();window.addEventListener('resize',resize);

        // ===== GAME STATE =====
        let level = 1;
        let trashCollected = 0;
        let totalTrashCollected = 0;
        let entities = [];     // UFOs, rockets, planets (moving)
        let trash = [];        // space debris
        let stars = [];        // twinkling background
        let shootingStars = [];
        let planets = [];      // decorative static planets

        // ===== DEFINITIONS =====
        const trashTypes = [
            { emoji: '🛰️', name: 'satelite' },
            { emoji: '🔩', name: 'parafuso' },
            { emoji: '🔧', name: 'chave' },
            { emoji: '⚙️', name: 'engrenagem' },
            { emoji: '📡', name: 'antena' },
            { emoji: '🔦', name: 'lanterna' },
            { emoji: '🧯', name: 'extintor' },
            { emoji: '🔭', name: 'telescopio' },
            { emoji: '💿', name: 'disco' },
            { emoji: '🔋', name: 'bateria' },
        ];

        // ===== INIT STARS =====
        function initStars(){
            stars = [];
            for(let i=0;i<150;i++){
                stars.push({
                    x: Math.random()*W,
                    y: Math.random()*H,
                    r: 0.5+Math.random()*2,
                    twinkle: Math.random()*Math.PI*2,
                    twinkleSpeed: 0.02+Math.random()*0.04,
                    color: ['#fff','#fff','#fff','#ffe0a0','#a0d0ff','#ffcfcf'][Math.floor(Math.random()*6)]
                });
            }
        }

        function initPlanets(){
            planets = [];
            const count = 3 + Math.floor(Math.random()*3);
            const colors = [
                ['#e67e22','#d35400','#a04000'],
                ['#3498db','#2980b9','#1f618d'],
                ['#9b59b6','#8e44ad','#6c3483'],
                ['#e74c3c','#c0392b','#922b21'],
                ['#16a085','#0e6655','#0b5345'],
                ['#f39c12','#d68910','#9c640c'],
            ];
            for(let i=0;i<count;i++){
                const col = colors[Math.floor(Math.random()*colors.length)];
                planets.push({
                    x: Math.random()*W,
                    y: Math.random()*H,
                    r: 30+Math.random()*70,
                    colors: col,
                    hasRing: Math.random()<0.4,
                    craters: Array.from({length:3+Math.floor(Math.random()*4)},()=>({
                        ox:(Math.random()-0.5)*1.4,
                        oy:(Math.random()-0.5)*1.4,
                        rr:0.08+Math.random()*0.15
                    })),
                    driftX: (Math.random()-0.5)*0.05,
                    driftY: (Math.random()-0.5)*0.03,
                });
            }
        }

        // ===== SPAWN =====
        function spawnEntity(){
            const types = ['ufo','rocket','astronaut','asteroid','alien'];
            const type = types[Math.floor(Math.random()*types.length)];
            const fromLeft = Math.random() > 0.5;
            const size = type==='asteroid'?40+Math.random()*30:50+Math.random()*20;
            const baseY = 60 + Math.random()*(H-160);
            entities.push({
                type,
                size,
                x: fromLeft ? -size*2 : W + size*2,
                y: baseY,
                baseY,
                dir: fromLeft ? 1 : -1,
                speed: type==='asteroid'?0.6+Math.random()*0.4 : 0.8+Math.random()*1.0,
                wobble: Math.random()*Math.PI*2,
                wobbleAmp: 8+Math.random()*15,
                wobbleSpeed: 0.015+Math.random()*0.02,
                rotation: 0,
                rotSpeed: type==='asteroid'?(Math.random()-0.5)*0.04 : 0,
                color1: '#'+Math.floor(Math.random()*16777215).toString(16).padStart(6,'0'),
            });
        }

        function spawnTrash(){
            const type = trashTypes[Math.floor(Math.random()*trashTypes.length)];
            trash.push({
                ...type,
                x: 30 + Math.random()*(W-60),
                y: -40 - Math.random()*60,
                r: 30 + Math.random()*15,
                bobble: Math.random()*Math.PI*2,
                bobbleSpeed: 0.02+Math.random()*0.02,
                sinkSpeed: 0.25 + Math.random()*0.35,
                wobbleAmp: 20 + Math.random()*30,
                wobbleSpeed: 0.008 + Math.random()*0.008,
                startX: 0,
                rot: 0,
                rotSpeed: (Math.random()-0.5)*0.03,
                opacity: 1,
                removing: false,
                sunk: false,
            });
            trash[trash.length-1].startX = trash[trash.length-1].x;
        }

        function spawnShootingStar(){
            shootingStars.push({
                x: Math.random()*W*0.5,
                y: -20,
                dx: 4+Math.random()*4,
                dy: 3+Math.random()*3,
                life: 60+Math.random()*40,
                trail: []
            });
        }

        // ===== INIT LEVEL =====
        function initLevel(){
            entities = [];
            trash = [];
            trashCollected = 0;
            document.getElementById('trashCount').textContent = '🗑️ 0';
            document.getElementById('levelDisplay').textContent = 'Nivel ' + level;
            document.getElementById('levelComplete').classList.remove('show');

            const trashCount = 4 + level * 2;
            for(let i=0;i<trashCount;i++){
                spawnTrash();
                trash[trash.length-1].y = -40 - i*100 - Math.random()*40;
            }

            const entityCount = 3 + level;
            for(let i=0;i<entityCount;i++) spawnEntity();

            initPlanets();
            initStars();
        }

        // ===== MESSAGES & PARTICLES =====
        function showMsg(text){
            const el=document.createElement('div');
            el.className='msg';el.textContent=text;
            document.body.appendChild(el);
            setTimeout(()=>el.remove(),2000);
        }
        function spawnCleanParticles(x,y){
            const icons=['✨','⭐','💫','🌟'];
            for(let i=0;i<6;i++){
                const el=document.createElement('div');
                el.className='particle';el.textContent=icons[Math.floor(Math.random()*icons.length)];
                el.style.left=x+'px';el.style.top=y+'px';
                el.style.setProperty('--tx',((Math.random()-0.5)*200)+'px');
                el.style.setProperty('--ty',((Math.random()-0.5)*200-50)+'px');
                document.body.appendChild(el);
                setTimeout(()=>el.remove(),1000);
            }
        }

        // ===== TRASH CANVAS CLICK =====
        trashCanvas.addEventListener('pointerdown',(e)=>{
            e.preventDefault();
            ensureAudio();
            const rect=trashCanvas.getBoundingClientRect();
            const px=e.clientX-rect.left;
            const py=e.clientY-rect.top;

            // Check trash
            for(let i=trash.length-1;i>=0;i--){
                const t=trash[i];
                if(t.removing) continue;
                const dx=px-t.x;
                const dy=py-t.y;
                if(Math.sqrt(dx*dx+dy*dy)<t.r+18){
                    t.removing=true;
                    playClean();
                    spawnCleanParticles(e.clientX, e.clientY);
                    trashCollected++;
                    totalTrashCollected++;
                    document.getElementById('trashCount').textContent='🗑️ '+trashCollected;
                    const msgs=['Boa!','Limpo!','Muito bem!','Fixe!','Genial!'];
                    if(trashCollected%3===0) showMsg(msgs[Math.floor(Math.random()*msgs.length)]+' 🚀');
                    return;
                }
            }

            // Check entities (wrong!)
            for(let i=entities.length-1;i>=0;i--){
                const a=entities[i];
                const dx=px-a.x;
                const dy=py-a.y;
                if(Math.sqrt(dx*dx+dy*dy)<a.size){
                    playWrong();
                    showMsg('Nao! Isso nao e lixo! 👽');
                    a.speed *= 2.5;
                    return;
                }
            }
        });

        document.getElementById('lcBtn').addEventListener('click',()=>{
            level++;
            initLevel();
        });

        // ===== DRAW =====
        function drawBackground(){
            // Stars
            stars.forEach(s=>{
                s.twinkle += s.twinkleSpeed;
                const a = 0.4 + Math.sin(s.twinkle)*0.4;
                c.beginPath();
                c.arc(s.x,s.y,s.r,0,Math.PI*2);
                c.fillStyle = s.color;
                c.globalAlpha = a;
                c.fill();
            });
            c.globalAlpha = 1;

            // Nebula glow
            const grad = c.createRadialGradient(W*0.2,H*0.3,0,W*0.2,H*0.3,W*0.5);
            grad.addColorStop(0,'rgba(162,155,254,0.08)');
            grad.addColorStop(1,'rgba(0,0,0,0)');
            c.fillStyle = grad;
            c.fillRect(0,0,W,H);

            const grad2 = c.createRadialGradient(W*0.8,H*0.7,0,W*0.8,H*0.7,W*0.4);
            grad2.addColorStop(0,'rgba(231,76,60,0.08)');
            grad2.addColorStop(1,'rgba(0,0,0,0)');
            c.fillStyle = grad2;
            c.fillRect(0,0,W,H);
        }

        function drawShootingStars(){
            if(Math.random()<0.005) spawnShootingStar();
            for(let i=shootingStars.length-1;i>=0;i--){
                const s=shootingStars[i];
                s.x+=s.dx; s.y+=s.dy; s.life--;
                s.trail.push({x:s.x,y:s.y});
                if(s.trail.length>15) s.trail.shift();
                if(s.life<=0 || s.y>H){shootingStars.splice(i,1);continue;}

                // Draw trail
                for(let j=0;j<s.trail.length-1;j++){
                    const t1=s.trail[j],t2=s.trail[j+1];
                    c.beginPath();
                    c.moveTo(t1.x,t1.y);
                    c.lineTo(t2.x,t2.y);
                    c.strokeStyle='rgba(255,255,255,'+(j/s.trail.length*0.8)+')';
                    c.lineWidth=2;
                    c.stroke();
                }
                // Head
                c.beginPath();
                c.arc(s.x,s.y,2,0,Math.PI*2);
                c.fillStyle='#fff';
                c.fill();
            }
        }

        function drawPlanets(){
            planets.forEach(p=>{
                p.x += p.driftX;
                p.y += p.driftY;
                if(p.x<-p.r*3) p.x=W+p.r;
                if(p.x>W+p.r*3) p.x=-p.r;
                if(p.y<-p.r*3) p.y=H+p.r;
                if(p.y>H+p.r*3) p.y=-p.r;

                c.save();
                c.translate(p.x,p.y);

                // Ring (behind)
                if(p.hasRing){
                    c.beginPath();
                    c.ellipse(0,0,p.r*1.6,p.r*0.4,0.3,0,Math.PI*2);
                    c.strokeStyle=p.colors[2];
                    c.lineWidth=3;
                    c.globalAlpha=0.5;
                    c.stroke();
                    c.globalAlpha=1;
                }

                // Planet body
                const grad = c.createRadialGradient(-p.r*0.3,-p.r*0.3,0,0,0,p.r);
                grad.addColorStop(0,p.colors[0]);
                grad.addColorStop(0.7,p.colors[1]);
                grad.addColorStop(1,p.colors[2]);
                c.beginPath();
                c.arc(0,0,p.r,0,Math.PI*2);
                c.fillStyle=grad;
                c.fill();

                // Craters
                p.craters.forEach(cr=>{
                    c.beginPath();
                    c.arc(cr.ox*p.r*0.5,cr.oy*p.r*0.5,cr.rr*p.r,0,Math.PI*2);
                    c.fillStyle=p.colors[2];
                    c.globalAlpha=0.5;
                    c.fill();
                    c.globalAlpha=1;
                });

                // Ring (front part)
                if(p.hasRing){
                    c.beginPath();
                    c.ellipse(0,0,p.r*1.6,p.r*0.4,0.3,Math.PI,Math.PI*2);
                    c.strokeStyle=p.colors[0];
                    c.lineWidth=3;
                    c.globalAlpha=0.8;
                    c.stroke();
                    c.globalAlpha=1;
                }

                c.restore();
            });
        }

        function drawEntity(a){
            a.wobble += a.wobbleSpeed;
            a.rotation += a.rotSpeed;
            a.x += a.speed * a.dir;
            a.y = a.baseY + Math.sin(a.wobble)*a.wobbleAmp;

            // Remove if off-screen
            if((a.dir>0 && a.x>W+a.size*2)||(a.dir<0 && a.x<-a.size*2)){
                const idx = entities.indexOf(a);
                if(idx>=0) entities.splice(idx,1);
                return;
            }

            c.save();
            c.translate(a.x,a.y);

            if(a.type==='ufo'){
                // UFO
                c.scale(a.dir,1);
                const S=a.size;
                // Glow below
                const glow=c.createRadialGradient(0,S*0.3,0,0,S*0.3,S*0.8);
                glow.addColorStop(0,'rgba(100,255,150,0.5)');
                glow.addColorStop(1,'rgba(100,255,150,0)');
                c.fillStyle=glow;
                c.fillRect(-S,-S*0.2,S*2,S*1.2);
                // Body
                c.beginPath();
                c.ellipse(0,0,S*0.7,S*0.2,0,0,Math.PI*2);
                c.fillStyle='#7f8c8d';
                c.fill();
                c.strokeStyle='#2c3e50';
                c.lineWidth=2;
                c.stroke();
                // Dome
                c.beginPath();
                c.arc(0,-S*0.1,S*0.4,Math.PI,0);
                c.closePath();
                c.fillStyle='#3498db';
                c.fill();
                c.strokeStyle='#2c3e50';
                c.stroke();
                // Lights
                const lightsOn = Math.floor(a.wobble*3)%2===0;
                for(let i=-2;i<=2;i++){
                    c.beginPath();
                    c.arc(i*S*0.2,S*0.12,S*0.05,0,Math.PI*2);
                    c.fillStyle=lightsOn?'#f1c40f':'#e74c3c';
                    c.fill();
                }

            } else if(a.type==='rocket'){
                c.scale(a.dir,1);
                c.rotate(Math.PI/2); // point forward (right)
                const S=a.size;
                // Flames
                const flameLen = S*0.6 + Math.sin(a.wobble*8)*S*0.1;
                c.beginPath();
                c.moveTo(-S*0.3,S*0.6);
                c.lineTo(0,S*0.6+flameLen);
                c.lineTo(S*0.3,S*0.6);
                c.closePath();
                c.fillStyle='#f39c12';
                c.fill();
                c.beginPath();
                c.moveTo(-S*0.15,S*0.6);
                c.lineTo(0,S*0.6+flameLen*0.6);
                c.lineTo(S*0.15,S*0.6);
                c.closePath();
                c.fillStyle='#f1c40f';
                c.fill();
                // Body
                c.beginPath();
                c.moveTo(0,-S*0.7);
                c.quadraticCurveTo(S*0.4,-S*0.3,S*0.35,S*0.3);
                c.lineTo(S*0.35,S*0.55);
                c.lineTo(-S*0.35,S*0.55);
                c.lineTo(-S*0.35,S*0.3);
                c.quadraticCurveTo(-S*0.4,-S*0.3,0,-S*0.7);
                c.closePath();
                c.fillStyle='#ecf0f1';
                c.fill();
                c.strokeStyle='#95a5a6';
                c.lineWidth=2;
                c.stroke();
                // Window
                c.beginPath();
                c.arc(0,-S*0.15,S*0.12,0,Math.PI*2);
                c.fillStyle='#3498db';
                c.fill();
                c.strokeStyle='#2980b9';
                c.lineWidth=2;
                c.stroke();
                // Red tip
                c.beginPath();
                c.moveTo(0,-S*0.7);
                c.quadraticCurveTo(S*0.15,-S*0.4,0,-S*0.3);
                c.quadraticCurveTo(-S*0.15,-S*0.4,0,-S*0.7);
                c.fillStyle='#e74c3c';
                c.fill();
                // Fins
                c.beginPath();
                c.moveTo(-S*0.35,S*0.3);
                c.lineTo(-S*0.55,S*0.55);
                c.lineTo(-S*0.35,S*0.55);
                c.closePath();
                c.fillStyle='#e74c3c';
                c.fill();
                c.beginPath();
                c.moveTo(S*0.35,S*0.3);
                c.lineTo(S*0.55,S*0.55);
                c.lineTo(S*0.35,S*0.55);
                c.closePath();
                c.fill();

            } else if(a.type==='astronaut'){
                c.scale(a.dir,1);
                const S=a.size;
                const float = Math.sin(a.wobble*2)*3;
                c.translate(0, float);

                // Body (suit)
                c.beginPath();
                c.ellipse(0,S*0.15,S*0.3,S*0.4,0,0,Math.PI*2);
                c.fillStyle='#ecf0f1';
                c.fill();
                c.strokeStyle='#bdc3c7';
                c.lineWidth=2;
                c.stroke();
                // Arms
                c.beginPath();
                c.ellipse(-S*0.4,S*0.1,S*0.1,S*0.25,-0.3,0,Math.PI*2);
                c.fillStyle='#ecf0f1';
                c.fill();
                c.stroke();
                c.beginPath();
                c.ellipse(S*0.4,S*0.1,S*0.1,S*0.25,0.3,0,Math.PI*2);
                c.fill();
                c.stroke();
                // Legs
                c.beginPath();
                c.ellipse(-S*0.15,S*0.55,S*0.1,S*0.2,0,0,Math.PI*2);
                c.fill();
                c.stroke();
                c.beginPath();
                c.ellipse(S*0.15,S*0.55,S*0.1,S*0.2,0,0,Math.PI*2);
                c.fill();
                c.stroke();
                // Helmet
                c.beginPath();
                c.arc(0,-S*0.15,S*0.28,0,Math.PI*2);
                c.fillStyle='#ecf0f1';
                c.fill();
                c.strokeStyle='#bdc3c7';
                c.lineWidth=2;
                c.stroke();
                // Visor
                c.beginPath();
                c.arc(0,-S*0.15,S*0.2,0,Math.PI*2);
                c.fillStyle='#2c3e50';
                c.fill();
                // Visor reflection
                c.beginPath();
                c.ellipse(-S*0.06,-S*0.2,S*0.06,S*0.04,-0.3,0,Math.PI*2);
                c.fillStyle='rgba(255,255,255,0.6)';
                c.fill();
                // Backpack
                c.beginPath();
                c.roundRect(-S*0.12,-S*0.05,S*0.24,S*0.25,3);
                c.fillStyle='#95a5a6';
                c.fill();

            } else if(a.type==='asteroid'){
                c.rotate(a.rotation);
                const S=a.size;
                // Irregular shape
                c.beginPath();
                const sides=8;
                for(let i=0;i<sides;i++){
                    const ang=(i/sides)*Math.PI*2;
                    const r=S*(0.6+Math.sin(ang*3+a.wobble*0.2)*0.15);
                    if(i===0) c.moveTo(Math.cos(ang)*r,Math.sin(ang)*r);
                    else c.lineTo(Math.cos(ang)*r,Math.sin(ang)*r);
                }
                c.closePath();
                c.fillStyle='#7f8c8d';
                c.fill();
                c.strokeStyle='#34495e';
                c.lineWidth=2;
                c.stroke();
                // Craters
                [[-S*0.2,-S*0.1,S*0.12],[S*0.15,S*0.15,S*0.08],[S*0.2,-S*0.2,S*0.1]].forEach(cr=>{
                    c.beginPath();
                    c.arc(cr[0],cr[1],cr[2],0,Math.PI*2);
                    c.fillStyle='#5d6d7e';
                    c.fill();
                });

            } else if(a.type==='alien'){
                c.scale(a.dir,1);
                const S=a.size;
                const bob = Math.sin(a.wobble*2)*2;
                c.translate(0,bob);
                // Body
                c.beginPath();
                c.ellipse(0,S*0.1,S*0.35,S*0.45,0,0,Math.PI*2);
                c.fillStyle='#2ecc71';
                c.fill();
                c.strokeStyle='#27ae60';
                c.lineWidth=2;
                c.stroke();
                // Arms
                c.beginPath();
                c.ellipse(-S*0.4,S*0.1,S*0.08,S*0.2,-0.3,0,Math.PI*2);
                c.fillStyle='#2ecc71';
                c.fill();
                c.beginPath();
                c.ellipse(S*0.4,S*0.1,S*0.08,S*0.2,0.3,0,Math.PI*2);
                c.fill();
                // Head
                c.beginPath();
                c.ellipse(0,-S*0.25,S*0.3,S*0.35,0,0,Math.PI*2);
                c.fillStyle='#2ecc71';
                c.fill();
                c.stroke();
                // Antenna
                c.beginPath();
                c.moveTo(-S*0.1,-S*0.55);
                c.lineTo(-S*0.15,-S*0.75);
                c.moveTo(S*0.1,-S*0.55);
                c.lineTo(S*0.15,-S*0.75);
                c.strokeStyle='#27ae60';
                c.lineWidth=2;
                c.stroke();
                c.beginPath();
                c.arc(-S*0.15,-S*0.75,S*0.05,0,Math.PI*2);
                c.fillStyle='#f1c40f';
                c.fill();
                c.beginPath();
                c.arc(S*0.15,-S*0.75,S*0.05,0,Math.PI*2);
                c.fill();
                // Eyes (big alien)
                c.beginPath();
                c.ellipse(-S*0.1,-S*0.25,S*0.08,S*0.12,-0.2,0,Math.PI*2);
                c.fillStyle='#000';
                c.fill();
                c.beginPath();
                c.ellipse(S*0.1,-S*0.25,S*0.08,S*0.12,0.2,0,Math.PI*2);
                c.fill();
                // Eye shine
                c.beginPath();
                c.arc(-S*0.08,-S*0.3,S*0.03,0,Math.PI*2);
                c.fillStyle='#fff';
                c.fill();
                c.beginPath();
                c.arc(S*0.12,-S*0.3,S*0.03,0,Math.PI*2);
                c.fill();
                // Mouth
                c.beginPath();
                c.arc(0,-S*0.1,S*0.08,0.2,Math.PI-0.2);
                c.strokeStyle='#27ae60';
                c.lineWidth=2;
                c.stroke();
            }

            c.restore();
        }

        function drawEntities(){
            if(Math.random()<0.005 && entities.length<8+level) spawnEntity();
            for(let i=entities.length-1;i>=0;i--){
                drawEntity(entities[i]);
            }
        }

        function drawTrash(){
            tc.clearRect(0,0,W,H);

            trash.forEach(t=>{
                t.bobble+=t.bobbleSpeed;
                t.rot+=t.rotSpeed;

                // Drift slowly (like floating in space)
                if(!t.removing && !t.sunk){
                    t.y += t.sinkSpeed;
                    t.x = t.startX + Math.sin(t.bobble * t.wobbleSpeed * 60) * t.wobbleAmp;
                    if(t.y >= H - 50){
                        t.y = H - 50;
                        t.sunk = true;
                        t.sunkTimer = 120;
                    }
                }

                if(t.sunk && !t.removing){
                    t.sunkTimer--;
                    if(t.sunkTimer <= 0){
                        t.missed = true;
                        t.removing = true;
                    }
                }

                if(t.removing){
                    t.opacity-=0.08;
                    t.y-=2;
                }

                const blinking = t.sunk && !t.removing && t.sunkTimer < 80;
                if(blinking && Math.floor(t.sunkTimer / 4) % 2 === 0){
                    // blink off
                } else {
                    tc.save();
                    tc.globalAlpha=Math.max(0.01,t.opacity);
                    tc.translate(t.x,t.y);
                    tc.rotate(t.rot);

                    tc.font=t.r*1.5+'px serif';
                    tc.textAlign='center';
                    tc.textBaseline='middle';
                    tc.fillText(t.emoji,0,0);

                    tc.restore();
                }
            });

            // Remove faded-out trash
            for(let i=trash.length-1;i>=0;i--){
                if(trash[i].opacity<=0){
                    const wasMissed = trash[i].missed;
                    trash.splice(i,1);
                    if(wasMissed){
                        showMsg('Escapou! 😢');
                    }
                    if(trash.length===0){
                        setTimeout(()=>{
                            playWin();
                            const texts=['Espaço mais limpo!','A galáxia agradece!','Fantastico!','Cosmo feliz!'];
                            document.getElementById('lcText').textContent=texts[Math.floor(Math.random()*texts.length)];
                            document.getElementById('lcSub').textContent=`Removeste ${trashCollected} lixos! Total: ${totalTrashCollected}`;
                            document.getElementById('levelComplete').classList.add('show');
                        },500);
                    }
                }
            }
        }

        // ===== BENDER =====
        let bender = {
            x: -60,
            dir: 1,
            speed: 0.6,
            walk: 0,
            eyeShift: 0,
            eyeTimer: 0,
            mouthTimer: 0,
            puffTimer: 0,
            puffs: [],
        };

        function drawBender(){
            bender.walk += 0.06;
            bender.eyeTimer--;
            bender.mouthTimer--;
            bender.puffTimer--;

            if(bender.eyeTimer<=0){
                bender.eyeShift = (Math.random()-0.5)*2;
                bender.eyeTimer = 60+Math.floor(Math.random()*120);
            }
            if(bender.mouthTimer<=0){
                bender.mouthOpen = Math.random()<0.4;
                bender.mouthTimer = 30+Math.floor(Math.random()*60);
            }

            // Cigar puffs
            if(bender.puffTimer<=0){
                bender.puffTimer = 40+Math.floor(Math.random()*40);
                const pdx = bender.dir===1 ? 1 : -1;
                bender.puffs.push({
                    x: bender.x + pdx*32,
                    y: H - 65,
                    r: 4,
                    life: 60,
                });
            }

            bender.x += bender.speed * bender.dir;
            if(bender.dir===1 && bender.x > W+60){
                bender.dir=-1; bender.speed=0.4+Math.random()*0.4;
            } else if(bender.dir===-1 && bender.x < -60){
                bender.dir=1; bender.speed=0.4+Math.random()*0.4;
            }

            // Draw and update puffs
            for(let i=bender.puffs.length-1;i>=0;i--){
                const p=bender.puffs[i];
                p.y -= 0.5;
                p.x += (Math.random()-0.5)*0.3;
                p.r += 0.15;
                p.life--;
                if(p.life<=0){bender.puffs.splice(i,1);continue;}
                c.beginPath();
                c.arc(p.x,p.y,p.r,0,Math.PI*2);
                c.fillStyle='rgba(200,200,200,'+(p.life/60*0.5)+')';
                c.fill();
            }

            const groundY = H - 20;
            const bounce = Math.abs(Math.sin(bender.walk*2))*2;
            const legSwing = Math.sin(bender.walk*2)*4;

            c.save();
            c.translate(bender.x, groundY - 90 - bounce);
            if(bender.dir===-1) c.scale(-1,1);

            // Metallic grey color
            const bodyColor='#b0b5b8';
            const shineColor='#d6dadd';
            const darkEdge='#5a6268';
            const lineColor='#7c8488';

            // === LEGS (accordion coils) ===
            // Left leg
            c.save();
            c.translate(-8, 72);
            c.rotate(legSwing*0.04);
            // Leg coils
            c.fillStyle=bodyColor;
            c.strokeStyle=lineColor;
            c.lineWidth=1;
            for(let i=0;i<6;i++){
                c.beginPath();
                c.ellipse(0, i*3.2, 4.5, 2, 0, 0, Math.PI*2);
                c.fill();
                c.stroke();
            }
            // Boot
            c.fillStyle=bodyColor;
            c.strokeStyle=darkEdge;
            c.lineWidth=1;
            c.beginPath();
            c.roundRect(-6, 18, 14, 7, 2);
            c.fill();
            c.stroke();
            c.restore();

            // Right leg
            c.save();
            c.translate(8, 72);
            c.rotate(-legSwing*0.04);
            c.fillStyle=bodyColor;
            c.strokeStyle=lineColor;
            c.lineWidth=1;
            for(let i=0;i<6;i++){
                c.beginPath();
                c.ellipse(0, i*3.2, 4.5, 2, 0, 0, Math.PI*2);
                c.fill();
                c.stroke();
            }
            c.fillStyle=bodyColor;
            c.strokeStyle=darkEdge;
            c.lineWidth=1;
            c.beginPath();
            c.roundRect(-6, 18, 14, 7, 2);
            c.fill();
            c.stroke();
            c.restore();

            // === BODY (tall rectangular chest) ===
            const bodyGrad = c.createLinearGradient(-15,0,15,0);
            bodyGrad.addColorStop(0, lineColor);
            bodyGrad.addColorStop(0.35, shineColor);
            bodyGrad.addColorStop(0.65, shineColor);
            bodyGrad.addColorStop(1, lineColor);
            c.fillStyle=bodyGrad;
            c.strokeStyle=darkEdge;
            c.lineWidth=1.5;
            c.beginPath();
            c.roundRect(-15, 0, 30, 72, 4);
            c.fill();
            c.stroke();

            // Chest door (rectangle with knob)
            c.strokeStyle=darkEdge;
            c.lineWidth=1.2;
            c.beginPath();
            c.roundRect(-9, 15, 18, 40, 2);
            c.stroke();
            // Door knob
            c.beginPath();
            c.arc(6, 35, 1.5, 0, Math.PI*2);
            c.fillStyle=darkEdge;
            c.fill();

            // === ARMS (accordion coils) ===
            const armSwing = Math.sin(bender.walk*1.5)*0.15;
            // Left arm (holding cigar)
            c.save();
            c.translate(-15, 10);
            c.rotate(-0.2 + armSwing);
            c.fillStyle=bodyColor;
            c.strokeStyle=lineColor;
            c.lineWidth=1;
            for(let i=0;i<7;i++){
                c.beginPath();
                c.ellipse(0, i*3+2, 3.5, 1.7, 0, 0, Math.PI*2);
                c.fill();
                c.stroke();
            }
            // Hand
            c.fillStyle=bodyColor;
            c.strokeStyle=darkEdge;
            c.lineWidth=1;
            c.beginPath();
            c.arc(0, 25, 4, 0, Math.PI*2);
            c.fill();
            c.stroke();
            c.restore();

            // Right arm (with cigar extended out)
            c.save();
            c.translate(15, 10);
            c.rotate(0.35 - armSwing*0.5);
            c.fillStyle=bodyColor;
            c.strokeStyle=lineColor;
            c.lineWidth=1;
            for(let i=0;i<7;i++){
                c.beginPath();
                c.ellipse(0, i*3+2, 3.5, 1.7, 0, 0, Math.PI*2);
                c.fill();
                c.stroke();
            }
            // Hand
            c.fillStyle=bodyColor;
            c.strokeStyle=darkEdge;
            c.lineWidth=1;
            c.beginPath();
            c.arc(0, 25, 4, 0, Math.PI*2);
            c.fill();
            c.stroke();
            // Cigar
            c.fillStyle='#5d4037';
            c.fillRect(3, 23, 11, 3);
            c.strokeStyle='#3e2723';
            c.lineWidth=0.5;
            c.strokeRect(3, 23, 11, 3);
            // Cigar tip (glowing)
            c.fillStyle='#e74c3c';
            c.fillRect(13, 23, 2, 3);
            c.fillStyle='#f39c12';
            c.beginPath();
            c.arc(15, 24.5, 1, 0, Math.PI*2);
            c.fill();
            c.restore();

            // === NECK ===
            c.fillStyle=bodyColor;
            c.strokeStyle=darkEdge;
            c.lineWidth=1;
            c.beginPath();
            c.roundRect(-5, -5, 10, 8, 1);
            c.fill();
            c.stroke();

            // === HEAD (tall capsule) ===
            const headGrad = c.createLinearGradient(-14,0,14,0);
            headGrad.addColorStop(0, lineColor);
            headGrad.addColorStop(0.35, shineColor);
            headGrad.addColorStop(0.65, shineColor);
            headGrad.addColorStop(1, lineColor);
            c.fillStyle=headGrad;
            c.strokeStyle=darkEdge;
            c.lineWidth=1.5;
            c.beginPath();
            c.roundRect(-14, -40, 28, 38, 13);
            c.fill();
            c.stroke();

            // Head band (horizontal line across forehead area)
            c.strokeStyle=darkEdge;
            c.lineWidth=1;
            c.beginPath();
            c.moveTo(-14, -20);
            c.lineTo(14, -20);
            c.stroke();

            // === ANTENNA ===
            c.strokeStyle=darkEdge;
            c.lineWidth=1.5;
            c.beginPath();
            c.moveTo(0, -40);
            c.lineTo(0, -52);
            c.stroke();
            c.beginPath();
            c.arc(0, -54, 2.5, 0, Math.PI*2);
            c.fillStyle=bodyColor;
            c.fill();
            c.strokeStyle=darkEdge;
            c.lineWidth=1;
            c.stroke();

            // === EYES (two separate white circles with black pupils) ===
            const eyeOffX = bender.eyeShift;
            // Left eye (white)
            c.fillStyle='#fff';
            c.strokeStyle=darkEdge;
            c.lineWidth=1;
            c.beginPath();
            c.ellipse(-5, -30, 3.5, 4.5, 0, 0, Math.PI*2);
            c.fill();
            c.stroke();
            // Right eye (white)
            c.beginPath();
            c.ellipse(5, -30, 3.5, 4.5, 0, 0, Math.PI*2);
            c.fill();
            c.stroke();
            // Pupils
            c.fillStyle='#000';
            c.beginPath();
            c.arc(-5+eyeOffX*0.8, -29, 1.3, 0, Math.PI*2);
            c.fill();
            c.beginPath();
            c.arc(5+eyeOffX*0.8, -29, 1.3, 0, Math.PI*2);
            c.fill();

            // === MOUTH (grin with teeth) ===
            // Mouth outline
            c.fillStyle='#111';
            c.strokeStyle=darkEdge;
            c.lineWidth=1;
            c.beginPath();
            if(bender.mouthOpen){
                c.roundRect(-9, -16, 18, 7, 2);
            } else {
                c.roundRect(-9, -15, 18, 5, 2);
            }
            c.fill();
            c.stroke();
            // Teeth (vertical white lines)
            c.fillStyle='#fff';
            const toothTop = bender.mouthOpen ? -15 : -14;
            const toothBot = bender.mouthOpen ? -10 : -11;
            const toothH = toothBot - toothTop;
            for(let i=-7;i<=7;i+=2){
                c.fillRect(i-0.5, toothTop, 1.3, toothH);
            }

            c.restore();
        }

        // ===== GAME LOOP =====
        function frame(){
            c.clearRect(0,0,W,H);
            drawBackground();
            drawPlanets();
            drawShootingStars();
            drawEntities();
            drawBender();
            drawTrash();
            requestAnimationFrame(frame);
        }

        initLevel();
        frame();

        document.addEventListener('gesturestart',e=>e.preventDefault());
        document.addEventListener('dblclick',e=>e.preventDefault());

        // iOS audio unlock
        document.addEventListener('touchend',ensureAudio,{once:true});
        document.addEventListener('click',ensureAudio,{once:true});
    </script>
</body>
</html>
