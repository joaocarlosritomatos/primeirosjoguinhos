<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Toca nos Animais!</title>

    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#a8edea">

    <!-- Apple PWA Tags (iPad/iPhone) -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Animais">
    <link rel="apple-touch-icon" href="icon-180x180.png">
    <link rel="apple-touch-icon" sizes="152x152" href="icon-152x152.png">
    <link rel="apple-touch-icon" sizes="167x167" href="icon-167x167.png">
    <link rel="apple-touch-icon" sizes="180x180" href="icon-180x180.png">

    <!-- Splash screens iPad -->
    <meta name="apple-mobile-web-app-orientations" content="portrait">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            overflow: hidden;
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 50%, #ffd89b 100%);
            min-height: 100vh;
            min-height: 100dvh;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .cloud {
            position: fixed;
            background: rgba(255,255,255,0.6);
            border-radius: 50px;
            animation: float-cloud linear infinite;
            z-index: 0;
            pointer-events: none;
        }
        .cloud::before, .cloud::after {
            content: '';
            position: absolute;
            background: rgba(255,255,255,0.6);
            border-radius: 50%;
        }
        .cloud::before { width: 60%; height: 80%; top: -40%; left: 20%; }
        .cloud::after { width: 40%; height: 60%; top: -25%; left: 55%; }

        @keyframes float-cloud {
            from { transform: translateX(110vw); }
            to { transform: translateX(-200px); }
        }

        .page-dots {
            position: relative;
            z-index: 2;
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }
        .page-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: rgba(255,255,255,0.4);
            border: 2px solid rgba(255,255,255,0.7);
            transition: all 0.3s;
        }
        .page-dot.active {
            background: white;
            transform: scale(1.3);
            box-shadow: 0 0 8px rgba(255,255,255,0.8);
        }

        .game-container {
            position: relative;
            z-index: 1;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 14px;
            padding: 14px;
            max-width: 520px;
            width: 100%;
        }

        .animal-btn {
            aspect-ratio: 1;
            border: none;
            border-radius: 22px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: clamp(42px, 11vw, 68px);
            transition: transform 0.15s ease;
            position: relative;
            overflow: hidden;
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
            gap: 2px;
        }

        .animal-btn .animal-name {
            font-size: clamp(10px, 2.5vw, 14px);
            font-weight: 800;
            color: rgba(0,0,0,0.35);
            letter-spacing: 0.5px;
        }

        .animal-btn:active { transform: scale(0.93); }

        .animal-btn.pop { animation: pop-bounce 0.6s ease; }

        @keyframes pop-bounce {
            0%   { transform: scale(1); }
            20%  { transform: scale(1.25) rotate(-5deg); }
            40%  { transform: scale(1.15) rotate(5deg); }
            60%  { transform: scale(1.2) rotate(-3deg); }
            80%  { transform: scale(1.1) rotate(2deg); }
            100% { transform: scale(1) rotate(0deg); }
        }

        /* 9 cores por grelha */
        .animal-btn:nth-child(1) { background: linear-gradient(145deg, #FFE66D, #FFD93D); }
        .animal-btn:nth-child(2) { background: linear-gradient(145deg, #FF6B6B, #EE5A24); }
        .animal-btn:nth-child(3) { background: linear-gradient(145deg, #4ECDC4, #44BD9E); }
        .animal-btn:nth-child(4) { background: linear-gradient(145deg, #A29BFE, #6C5CE7); }
        .animal-btn:nth-child(5) { background: linear-gradient(145deg, #FD79A8, #E84393); }
        .animal-btn:nth-child(6) { background: linear-gradient(145deg, #FFEAA7, #FDCB6E); }
        .animal-btn:nth-child(7) { background: linear-gradient(145deg, #74b9ff, #0984e3); }
        .animal-btn:nth-child(8) { background: linear-gradient(145deg, #55efc4, #00b894); }
        .animal-btn:nth-child(9) { background: linear-gradient(145deg, #fab1a0, #e17055); }

        .particle {
            position: fixed;
            pointer-events: none;
            z-index: 100;
            font-size: 28px;
            animation: particle-fly 1s ease-out forwards;
        }

        @keyframes particle-fly {
            0%   { opacity: 1; transform: translate(0, 0) scale(1) rotate(0deg); }
            100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0.3) rotate(360deg); }
        }

        .sound-label {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: clamp(36px, 9vw, 64px);
            font-weight: 900;
            color: white;
            text-shadow: 3px 3px 0 rgba(0,0,0,0.25), -1px -1px 0 rgba(0,0,0,0.1);
            pointer-events: none;
            z-index: 200;
            animation: label-pop 1.2s ease-out forwards;
        }

        @keyframes label-pop {
            0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.3); }
            15%  { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
            30%  { transform: translate(-50%, -50%) scale(1); }
            70%  { opacity: 1; }
            100% { opacity: 0; transform: translate(-50%, -70%) scale(1.1); }
        }

        .bg-flash {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 50;
            animation: flash 0.4s ease-out forwards;
        }

        @keyframes flash {
            0%   { opacity: 0.3; }
            100% { opacity: 0; }
        }

        .nav-area {
            position: relative;
            z-index: 1;
            display: flex;
            gap: 16px;
            margin-top: 8px;
        }

        .nav-btn {
            padding: 12px 32px;
            border: none;
            border-radius: 50px;
            background: rgba(255,255,255,0.7);
            font-size: 26px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.15s;
            backdrop-filter: blur(5px);
        }

        .nav-btn:active { transform: scale(0.93); }

        .grass {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 35px;
            background: #7ec881;
            border-radius: 50% 50% 0 0 / 100% 100% 0 0;
            z-index: 0;
            pointer-events: none;
        }

        /* ===== PARADE ANIMALS ===== */
        .parade-animal {
            position: fixed;
            pointer-events: none;
            z-index: 3;
            font-size: clamp(36px, 9vw, 55px);
            animation: parade-run var(--duration) linear forwards;
            filter: drop-shadow(0 3px 6px rgba(0,0,0,0.2));
        }

        /* Correr da esquerda para a direita */
        @keyframes parade-run {
            0%   { transform: translateX(-80px) scaleX(var(--dir)) translateY(0); opacity: 1; }
            5%   { opacity: 1; }
            90%  { opacity: 1; }
            100% { transform: translateX(calc(100vw + 80px)) scaleX(var(--dir)) translateY(0); opacity: 0; }
        }

        /* Voar com ondulacao */
        .parade-animal.fly {
            animation: parade-fly var(--duration) linear forwards;
        }
        @keyframes parade-fly {
            0%   { transform: translateX(-80px) scaleX(var(--dir)) translateY(0); opacity: 1; }
            10%  { transform: translateX(calc(10vw)) scaleX(var(--dir)) translateY(-20px); }
            20%  { transform: translateX(calc(20vw)) scaleX(var(--dir)) translateY(8px); }
            30%  { transform: translateX(calc(30vw)) scaleX(var(--dir)) translateY(-25px); }
            40%  { transform: translateX(calc(40vw)) scaleX(var(--dir)) translateY(5px); }
            50%  { transform: translateX(calc(50vw)) scaleX(var(--dir)) translateY(-18px); }
            60%  { transform: translateX(calc(60vw)) scaleX(var(--dir)) translateY(10px); }
            70%  { transform: translateX(calc(70vw)) scaleX(var(--dir)) translateY(-22px); }
            80%  { transform: translateX(calc(80vw)) scaleX(var(--dir)) translateY(3px); }
            90%  { transform: translateX(calc(90vw)) scaleX(var(--dir)) translateY(-15px); opacity: 1; }
            100% { transform: translateX(calc(100vw + 80px)) scaleX(var(--dir)) translateY(0); opacity: 0; }
        }

        /* Nadar com ondulacao suave */
        .parade-animal.swim {
            animation: parade-swim var(--duration) linear forwards;
        }
        @keyframes parade-swim {
            0%   { transform: translateX(-80px) scaleX(var(--dir)) translateY(0) rotate(0deg); opacity: 1; }
            12%  { transform: translateX(calc(12vw)) scaleX(var(--dir)) translateY(-8px) rotate(-3deg); }
            25%  { transform: translateX(calc(25vw)) scaleX(var(--dir)) translateY(8px) rotate(3deg); }
            37%  { transform: translateX(calc(37vw)) scaleX(var(--dir)) translateY(-6px) rotate(-2deg); }
            50%  { transform: translateX(calc(50vw)) scaleX(var(--dir)) translateY(6px) rotate(2deg); }
            62%  { transform: translateX(calc(62vw)) scaleX(var(--dir)) translateY(-8px) rotate(-3deg); }
            75%  { transform: translateX(calc(75vw)) scaleX(var(--dir)) translateY(8px) rotate(3deg); }
            87%  { transform: translateX(calc(87vw)) scaleX(var(--dir)) translateY(-4px) rotate(-1deg); }
            100% { transform: translateX(calc(100vw + 80px)) scaleX(var(--dir)) translateY(0) rotate(0deg); opacity: 0; }
        }

        /* Saltar */
        .parade-animal.hop {
            animation: parade-hop var(--duration) linear forwards;
        }
        @keyframes parade-hop {
            0%   { transform: translateX(-80px) scaleX(var(--dir)) translateY(0); opacity: 1; }
            5%   { transform: translateX(calc(5vw)) scaleX(var(--dir)) translateY(-40px) scale(1.1); }
            10%  { transform: translateX(calc(10vw)) scaleX(var(--dir)) translateY(0) scale(0.95); }
            15%  { transform: translateX(calc(15vw)) scaleX(var(--dir)) translateY(0); }
            20%  { transform: translateX(calc(20vw)) scaleX(var(--dir)) translateY(-45px) scale(1.1); }
            25%  { transform: translateX(calc(25vw)) scaleX(var(--dir)) translateY(0) scale(0.95); }
            30%  { transform: translateX(calc(30vw)) scaleX(var(--dir)) translateY(0); }
            35%  { transform: translateX(calc(35vw)) scaleX(var(--dir)) translateY(-38px) scale(1.1); }
            40%  { transform: translateX(calc(40vw)) scaleX(var(--dir)) translateY(0) scale(0.95); }
            45%  { transform: translateX(calc(45vw)) scaleX(var(--dir)) translateY(0); }
            50%  { transform: translateX(calc(50vw)) scaleX(var(--dir)) translateY(-42px) scale(1.1); }
            55%  { transform: translateX(calc(55vw)) scaleX(var(--dir)) translateY(0) scale(0.95); }
            60%  { transform: translateX(calc(60vw)) scaleX(var(--dir)) translateY(0); }
            65%  { transform: translateX(calc(65vw)) scaleX(var(--dir)) translateY(-36px) scale(1.1); }
            70%  { transform: translateX(calc(70vw)) scaleX(var(--dir)) translateY(0) scale(0.95); }
            75%  { transform: translateX(calc(75vw)) scaleX(var(--dir)) translateY(0); }
            80%  { transform: translateX(calc(80vw)) scaleX(var(--dir)) translateY(-40px) scale(1.1); }
            85%  { transform: translateX(calc(85vw)) scaleX(var(--dir)) translateY(0) scale(0.95); }
            90%  { transform: translateX(calc(90vw)) scaleX(var(--dir)) translateY(0); opacity: 1; }
            95%  { transform: translateX(calc(95vw)) scaleX(var(--dir)) translateY(-30px) scale(1.05); }
            100% { transform: translateX(calc(100vw + 80px)) scaleX(var(--dir)) translateY(0); opacity: 0; }
        }

        /* Rastejar (cobra) */
        .parade-animal.slither {
            animation: parade-slither var(--duration) linear forwards;
        }
        @keyframes parade-slither {
            0%   { transform: translateX(-80px) scaleX(var(--dir)) translateY(0) rotate(0deg); opacity: 1; }
            8%   { transform: translateX(calc(8vw)) scaleX(var(--dir)) translateY(-3px) rotate(8deg); }
            16%  { transform: translateX(calc(16vw)) scaleX(var(--dir)) translateY(3px) rotate(-8deg); }
            24%  { transform: translateX(calc(24vw)) scaleX(var(--dir)) translateY(-3px) rotate(8deg); }
            32%  { transform: translateX(calc(32vw)) scaleX(var(--dir)) translateY(3px) rotate(-8deg); }
            40%  { transform: translateX(calc(40vw)) scaleX(var(--dir)) translateY(-3px) rotate(8deg); }
            48%  { transform: translateX(calc(48vw)) scaleX(var(--dir)) translateY(3px) rotate(-8deg); }
            56%  { transform: translateX(calc(56vw)) scaleX(var(--dir)) translateY(-3px) rotate(8deg); }
            64%  { transform: translateX(calc(64vw)) scaleX(var(--dir)) translateY(3px) rotate(-8deg); }
            72%  { transform: translateX(calc(72vw)) scaleX(var(--dir)) translateY(-3px) rotate(8deg); }
            80%  { transform: translateX(calc(80vw)) scaleX(var(--dir)) translateY(3px) rotate(-8deg); }
            88%  { transform: translateX(calc(88vw)) scaleX(var(--dir)) translateY(-3px) rotate(8deg); }
            100% { transform: translateX(calc(100vw + 80px)) scaleX(var(--dir)) translateY(0) rotate(0deg); opacity: 0; }
        }

        /* Andar pesado (elefante, urso) */
        .parade-animal.stomp {
            animation: parade-stomp var(--duration) linear forwards;
        }
        @keyframes parade-stomp {
            0%   { transform: translateX(-80px) scaleX(var(--dir)) translateY(0) rotate(0deg); opacity: 1; }
            4%   { transform: translateX(calc(4vw)) scaleX(var(--dir)) translateY(-5px) rotate(-2deg); }
            8%   { transform: translateX(calc(8vw)) scaleX(var(--dir)) translateY(3px) rotate(2deg) scaleY(0.95); }
            12%  { transform: translateX(calc(12vw)) scaleX(var(--dir)) translateY(0) rotate(0deg); }
            16%  { transform: translateX(calc(16vw)) scaleX(var(--dir)) translateY(-5px) rotate(-2deg); }
            20%  { transform: translateX(calc(20vw)) scaleX(var(--dir)) translateY(3px) rotate(2deg) scaleY(0.95); }
            24%  { transform: translateX(calc(24vw)) scaleX(var(--dir)) translateY(0) rotate(0deg); }
            28%  { transform: translateX(calc(28vw)) scaleX(var(--dir)) translateY(-5px) rotate(-2deg); }
            32%  { transform: translateX(calc(32vw)) scaleX(var(--dir)) translateY(3px) rotate(2deg) scaleY(0.95); }
            36%  { transform: translateX(calc(36vw)) scaleX(var(--dir)) translateY(0) rotate(0deg); }
            50%  { transform: translateX(calc(50vw)) scaleX(var(--dir)) translateY(-5px) rotate(-2deg); }
            54%  { transform: translateX(calc(54vw)) scaleX(var(--dir)) translateY(3px) rotate(2deg) scaleY(0.95); }
            58%  { transform: translateX(calc(58vw)) scaleX(var(--dir)) translateY(0); }
            72%  { transform: translateX(calc(72vw)) scaleX(var(--dir)) translateY(-5px) rotate(-2deg); }
            76%  { transform: translateX(calc(76vw)) scaleX(var(--dir)) translateY(3px) rotate(2deg) scaleY(0.95); }
            80%  { transform: translateX(calc(80vw)) scaleX(var(--dir)) translateY(0); }
            100% { transform: translateX(calc(100vw + 80px)) scaleX(var(--dir)) translateY(0) rotate(0deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="cloud" style="width:120px;height:40px;top:8%;animation-duration:25s;animation-delay:-5s;"></div>
    <div class="cloud" style="width:90px;height:30px;top:18%;animation-duration:35s;animation-delay:-15s;"></div>
    <div class="cloud" style="width:150px;height:45px;top:5%;animation-duration:30s;animation-delay:-22s;"></div>

    <div class="page-dots" id="dots"></div>
    <div class="game-container" id="game"></div>
    <div class="nav-area">
        <button class="nav-btn" id="prevBtn" onclick="prevPage()">&#9664;</button>
        <button class="nav-btn" id="nextBtn" onclick="nextPage()">&#9654;</button>
    </div>

    <div class="grass"></div>

    <script>
        // ========== AUDIO ENGINE ==========
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        let ctx;

        function ensureAudio() {
            if (!ctx) ctx = new AudioCtx();
            if (ctx.state === 'suspended') ctx.resume();
        }

        // Helper: create white noise buffer
        function noiseBuffer(duration) {
            const len = ctx.sampleRate * duration;
            const buf = ctx.createBuffer(1, len, ctx.sampleRate);
            const data = buf.getChannelData(0);
            for (let i = 0; i < len; i++) data[i] = Math.random() * 2 - 1;
            return buf;
        }

        // Helper: play noise through a bandpass filter
        function filteredNoise(freq, Q, duration, volume, startTime) {
            const src = ctx.createBufferSource();
            src.buffer = noiseBuffer(duration + 0.1);
            const bp = ctx.createBiquadFilter();
            bp.type = 'bandpass';
            bp.frequency.value = freq;
            bp.Q.value = Q;
            const g = ctx.createGain();
            g.gain.setValueAtTime(volume, startTime);
            g.gain.linearRampToValueAtTime(0, startTime + duration);
            src.connect(bp).connect(g).connect(ctx.destination);
            src.start(startTime);
            src.stop(startTime + duration + 0.05);
            return { src, filter: bp, gain: g };
        }

        // Helper: simple oscillator with envelope
        function osc(type, freqEnv, gainEnv, startTime, duration) {
            const o = ctx.createOscillator();
            const g = ctx.createGain();
            o.type = type;
            const t0 = startTime;
            // freq envelope: array of [time_offset, value]
            o.frequency.setValueAtTime(freqEnv[0][1], t0 + freqEnv[0][0]);
            for (let i = 1; i < freqEnv.length; i++) {
                o.frequency.linearRampToValueAtTime(freqEnv[i][1], t0 + freqEnv[i][0]);
            }
            // gain envelope
            g.gain.setValueAtTime(gainEnv[0][1], t0 + gainEnv[0][0]);
            for (let i = 1; i < gainEnv.length; i++) {
                g.gain.linearRampToValueAtTime(gainEnv[i][1], t0 + gainEnv[i][0]);
            }
            o.connect(g).connect(ctx.destination);
            o.start(t0);
            o.stop(t0 + duration);
            return { osc: o, gain: g };
        }

        // Helper: oscillator -> filter -> destination
        function oscFiltered(type, freqEnv, gainEnv, filterType, filterFreq, filterQ, startTime, duration) {
            const o = ctx.createOscillator();
            const f = ctx.createBiquadFilter();
            const g = ctx.createGain();
            o.type = type;
            f.type = filterType;
            f.frequency.value = filterFreq;
            f.Q.value = filterQ;
            const t0 = startTime;
            o.frequency.setValueAtTime(freqEnv[0][1], t0 + freqEnv[0][0]);
            for (let i = 1; i < freqEnv.length; i++)
                o.frequency.linearRampToValueAtTime(freqEnv[i][1], t0 + freqEnv[i][0]);
            g.gain.setValueAtTime(gainEnv[0][1], t0 + gainEnv[0][0]);
            for (let i = 1; i < gainEnv.length; i++)
                g.gain.linearRampToValueAtTime(gainEnv[i][1], t0 + gainEnv[i][0]);
            o.connect(f).connect(g).connect(ctx.destination);
            o.start(t0);
            o.stop(t0 + duration);
            return { osc: o, filter: f, gain: g };
        }

        // ========== ANIMAL SOUNDS ==========
        const sounds = {
            dog() {
                const t = ctx.currentTime;
                // Two barks with harmonic richness + noise burst
                for (let i = 0; i < 2; i++) {
                    const s = t + i * 0.28;
                    // Vocal formant
                    osc('sawtooth', [[0,480],[0.03,380],[0.12,320]], [[0,0.35],[0.03,0.4],[0.12,0.1],[0.18,0]], s, 0.2);
                    // Second harmonic
                    osc('sawtooth', [[0,960],[0.03,760],[0.12,640]], [[0,0.12],[0.03,0.15],[0.12,0.03],[0.18,0]], s, 0.2);
                    // Breathy noise
                    filteredNoise(1200, 2, 0.12, 0.15, s);
                }
            },

            cat() {
                const t = ctx.currentTime;
                // "Miaow" with formant sweep
                osc('sine', [[0,600],[0.08,900],[0.25,1000],[0.5,800],[0.7,500]], [[0,0],[0.02,0.3],[0.15,0.35],[0.5,0.25],[0.8,0]], t, 0.85);
                osc('sine', [[0,1200],[0.08,1800],[0.25,2000],[0.5,1600],[0.7,1000]], [[0,0],[0.02,0.08],[0.15,0.1],[0.5,0.06],[0.8,0]], t, 0.85);
                // Subtle nasal buzz
                oscFiltered('sawtooth', [[0,300],[0.08,450],[0.5,400],[0.7,250]],
                    [[0,0],[0.02,0.06],[0.15,0.08],[0.5,0.04],[0.8,0]],
                    'bandpass', 900, 5, t, 0.85);
            },

            cow() {
                const t = ctx.currentTime;
                // Deep "mooo" with vibrato
                const o1 = ctx.createOscillator();
                const o2 = ctx.createOscillator();
                const lfo = ctx.createOscillator();
                const lfoG = ctx.createGain();
                const g1 = ctx.createGain();
                const g2 = ctx.createGain();
                o1.type = 'sawtooth'; o2.type = 'sawtooth';
                o1.frequency.setValueAtTime(130, t);
                o1.frequency.linearRampToValueAtTime(145, t + 0.3);
                o1.frequency.linearRampToValueAtTime(140, t + 0.8);
                o1.frequency.linearRampToValueAtTime(125, t + 1.3);
                o2.frequency.setValueAtTime(260, t);
                o2.frequency.linearRampToValueAtTime(290, t + 0.3);
                o2.frequency.linearRampToValueAtTime(280, t + 0.8);
                o2.frequency.linearRampToValueAtTime(250, t + 1.3);
                lfo.frequency.value = 5;
                lfoG.gain.value = 4;
                lfo.connect(lfoG);
                lfoG.connect(o1.frequency);
                lfoG.connect(o2.frequency);
                g1.gain.setValueAtTime(0, t);
                g1.gain.linearRampToValueAtTime(0.35, t + 0.15);
                g1.gain.setValueAtTime(0.35, t + 0.9);

                { emoji: '🐮', sound: 'Muuuu!',       color: '#44BD9E', play: 'cow',     name: 'VACA',     move: 'stomp' },
                { emoji: '🐷', sound: 'Oinc Oinc!',   color: '#6C5CE7', play: 'pig',     name: 'PORCO',    move: 'run' },
                { emoji: '🐔', sound: 'Có Có Có!',    color: '#e74c3c', play: 'chicken', name: 'GALINHA',  move: 'hop' },
                { emoji: '🐸', sound: 'Croac!',       color: '#27ae60', play: 'frog',    name: 'RA',       move: 'hop' },
                { emoji: '🦁', sound: 'ROAR!',        color: '#e67e22', play: 'lion',    name: 'LEAO',     move: 'stomp' },
                { emoji: '🐴', sound: 'Ihhhh!',       color: '#8e6d47', play: 'horse',   name: 'CAVALO',   move: 'run' },
                { emoji: '🦆', sound: 'Qua Qua!',     color: '#3498db', play: 'duck',    name: 'PATO',     move: 'swim' },
            ],
            [
                { emoji: '🐑', sound: 'Beee!',        color: '#bdc3c7', play: 'sheep',    name: 'OVELHA',   move: 'run' },
                { emoji: '🐝', sound: 'Bzzzz!',       color: '#f1c40f', play: 'bee',      name: 'ABELHA',   move: 'fly' },
                { emoji: '🦉', sound: 'Uhu Uhu!',     color: '#8e44ad', play: 'owl',      name: 'CORUJA',   move: 'fly' },
                { emoji: '🐘', sound: 'Tuuut!',       color: '#636e72', play: 'elephant',  name: 'ELEFANTE', move: 'stomp' },
                { emoji: '🐒', sound: 'Uh Uh Ah!',    color: '#d35400', play: 'monkey',    name: 'MACACO',   move: 'hop' },
                { emoji: '🐦', sound: 'Piu Piu!',     color: '#74b9ff', play: 'bird',      name: 'PASSARO',  move: 'fly' },
                { emoji: '🐺', sound: 'Auuuuu!',      color: '#2d3436', play: 'wolf',      name: 'LOBO',     move: 'run' },
                { emoji: '🐍', sound: 'Ssssss!',      color: '#00b894', play: 'snake',     name: 'COBRA',    move: 'slither' },
                { emoji: '🐬', sound: 'Click Click!',  color: '#0984e3', play: 'dolphin',   name: 'GOLFINHO', move: 'swim' },
            ],
            [
                { emoji: '🐓', sound: 'Cocoroco!',    color: '#e17055', play: 'rooster',  name: 'GALO',     move: 'hop' },
                { emoji: '🐐', sound: 'Meee!',        color: '#a29bfe', play: 'goat',     name: 'CABRA',    move: 'hop' },
                { emoji: '🦗', sound: 'Cri Cri!',     color: '#55efc4', play: 'cricket',  name: 'GRILO',    move: 'hop' },
                { emoji: '🐋', sound: 'Woooo!',       color: '#0984e3', play: 'whale',    name: 'BALEIA',   move: 'swim' },
                { emoji: '🦜', sound: 'Squawk!',      color: '#fd79a8', play: 'parrot',   name: 'PAPAGAIO', move: 'fly' },
                { emoji: '🦃', sound: 'Glu Glu!',     color: '#d63031', play: 'turkey',   name: 'PERU',     move: 'run' },
                { emoji: '🫏', sound: 'Hi Ho!',       color: '#b2bec3', play: 'donkey',   name: 'BURRO',    move: 'run' },
                { emoji: '🦭', sound: 'Arf Arf!',     color: '#dfe6e9', play: 'seal',     name: 'FOCA',     move: 'swim' },
                { emoji: '🐻', sound: 'Grrrr!',       color: '#6c5ce7', play: 'bear',     name: 'URSO',     move: 'stomp' },
            ]
        ];

        let currentPage = 0;

        // ========== PARTICLES & EFFECTS ==========
        const particleEmojis = ['⭐', '✨', '🌟', '💫', '❤️', '🎉', '🎶', '🎵'];

        function spawnParticles(x, y) {
            for (let i = 0; i < 10; i++) {
                const el = document.createElement('div');
                el.className = 'particle';
                el.textContent = particleEmojis[Math.floor(Math.random() * particleEmojis.length)];
                const angle = (Math.PI * 2 * i) / 10;
                const dist = 70 + Math.random() * 60;
                el.style.left = x + 'px';
                el.style.top = y + 'px';
                el.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
                el.style.setProperty('--ty', Math.sin(angle) * dist + 'px');
                document.body.appendChild(el);
                setTimeout(() => el.remove(), 1000);
            }
        }

        function showLabel(text) {
            const el = document.createElement('div');
            el.className = 'sound-label';
            el.textContent = text;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 1200);
        }

        function flashBg(color) {
            const el = document.createElement('div');
            el.className = 'bg-flash';
            el.style.background = color;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 400);
        }

        // ========== ANIMAL PARADE ==========
        function spawnParade(animal) {
            // Limpar parade anterior
            document.querySelectorAll('.parade-animal').forEach(el => el.remove());

            const moveType = animal.move || 'run';
            const count = moveType === 'stomp' ? 3 : (moveType === 'swim' ? 5 : 6);

            // Posicao Y base depende do tipo de movimento
            const vh = window.innerHeight;
            let baseY;
            if (moveType === 'fly')     baseY = vh * 0.25;  // voam mais alto
            else if (moveType === 'swim') baseY = vh * 0.82; // nadam em baixo
            else                          baseY = vh * 0.78; // correm na relva

            for (let i = 0; i < count; i++) {
                const el = document.createElement('div');
                el.className = 'parade-animal ' + moveType;
                el.textContent = animal.emoji;

                // Velocidade e delay diferentes para cada animal
                const duration = 2.5 + Math.random() * 1.5;
                const delay = i * (0.25 + Math.random() * 0.3);
                const yOffset = (Math.random() - 0.5) * 40;
                const sizeVar = 0.8 + Math.random() * 0.5;

                el.style.setProperty('--duration', duration + 's');
                el.style.setProperty('--dir', '1');
                el.style.top = (baseY + yOffset) + 'px';
                el.style.left = '0px';
                el.style.animationDelay = delay + 's';
                el.style.fontSize = (parseFloat(getComputedStyle(el).fontSize) || 45) * sizeVar + 'px';
                el.style.opacity = '0';

                document.body.appendChild(el);

                // Remover apos animacao
                const totalTime = (duration + delay) * 1000 + 200;
                setTimeout(() => el.remove(), totalTime);
            }
        }

        // ========== CLICK HANDLER ==========
        function onAnimalClick(e, animal) {
            const rect = e.currentTarget.getBoundingClientRect();
            const cx = rect.left + rect.width / 2;
            const cy = rect.top + rect.height / 2;

            e.currentTarget.classList.remove('pop');
            void e.currentTarget.offsetWidth;
            e.currentTarget.classList.add('pop');

            ensureAudio();
            sounds[animal.play]();

            spawnParticles(cx, cy);
            showLabel(animal.sound);
            flashBg(animal.color + '44');
            spawnParade(animal);
        }

        // ========== RENDER ==========
        function renderDots() {
            const dots = document.getElementById('dots');
            dots.innerHTML = '';
            for (let i = 0; i < animalPages.length; i++) {
                const d = document.createElement('div');
                d.className = 'page-dot' + (i === currentPage ? ' active' : '');
                d.onclick = () => { currentPage = i; renderPage(); };
                dots.appendChild(d);
            }
        }

        function renderPage() {
            const container = document.getElementById('game');
            container.innerHTML = '';
            const animals = animalPages[currentPage];

            animals.forEach(animal => {
                const btn = document.createElement('button');
                btn.className = 'animal-btn';

                const emojiSpan = document.createElement('span');
                emojiSpan.textContent = animal.emoji;

                const nameSpan = document.createElement('span');
                nameSpan.className = 'animal-name';
                nameSpan.textContent = animal.name;

                btn.appendChild(emojiSpan);
                btn.appendChild(nameSpan);
                btn.setAttribute('aria-label', animal.sound);

                btn.addEventListener('pointerdown', (e) => {
                    e.preventDefault();
                    onAnimalClick(e, animal);
                });

                container.appendChild(btn);
            });

            renderDots();
        }

        function nextPage() {
            currentPage = (currentPage + 1) % animalPages.length;
            renderPage();
        }

        function prevPage() {
            currentPage = (currentPage - 1 + animalPages.length) % animalPages.length;
            renderPage();
        }

        // Swipe support
        let touchStartX = 0;
        document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
        document.addEventListener('touchend', e => {
            const diff = e.changedTouches[0].clientX - touchStartX;
            if (Math.abs(diff) > 60) {
                if (diff < 0) nextPage();
                else prevPage();
            }
        }, { passive: true });

        renderPage();

        document.addEventListener('gesturestart', e => e.preventDefault());
        document.addEventListener('dblclick', e => e.preventDefault());

        // ========== SERVICE WORKER (PWA) ==========
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js')
                .then(() => console.log('SW registado!'))
                .catch(err => console.log('SW erro:', err));
        }
    </script>
