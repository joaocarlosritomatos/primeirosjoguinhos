<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">

    <title>Colorir Desenhos - Primeiros Joguinhos</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#dfe6e9">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;}
        body{overflow:hidden;background:#e8e8e8;min-height:100vh;min-height:100dvh;font-family:'Segoe UI',sans-serif;display:flex;flex-direction:column;touch-action:none;}
        .top-bar{display:flex;align-items:center;gap:6px;padding:6px 10px;background:white;box-shadow:0 2px 8px rgba(0,0,0,0.08);z-index:10;flex-wrap:wrap;justify-content:center;}
        .home-btn{width:36px;height:36px;border-radius:50%;border:none;background:rgba(0,0,0,0.06);font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;text-decoration:none;flex-shrink:0;}
        .cat-btn{padding:5px 12px;border:none;border-radius:14px;font-size:clamp(11px,2.8vw,14px);font-weight:700;cursor:pointer;background:rgba(0,0,0,0.06);color:#2d3436;transition:background 0.2s;flex-shrink:0;}
        .cat-btn.active{background:#2d3436;color:white;}
        .drawing-list{display:flex;gap:6px;padding:4px 10px;background:rgba(0,0,0,0.03);overflow-x:auto;z-index:5;align-items:center;}
        .drawing-thumb{width:50px;height:50px;border-radius:10px;border:2px solid transparent;background:white;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0;transition:border-color 0.2s;}
        .drawing-thumb.active{border-color:#2d3436;transform:scale(1.1);}
        .svg-area{display:flex;align-items:center;justify-content:center;padding:8px;overflow:hidden;height:calc(100vh - 150px);}
        .svg-area svg{background:white;border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,0.12);max-width:90%;max-height:100%;}
        .svg-area svg path[data-fill],
        .svg-area svg ellipse[data-fill],
        .svg-area svg circle[data-fill],
        .svg-area svg rect[data-fill],
        .svg-area svg polygon[data-fill]{cursor:pointer;transition:fill 0.15s;}
        .color-bar{display:flex;align-items:center;gap:5px;padding:8px 10px;background:white;box-shadow:0 -2px 8px rgba(0,0,0,0.08);z-index:10;justify-content:center;flex-wrap:wrap;}
        .color-btn{width:34px;height:34px;border-radius:50%;border:3px solid transparent;cursor:pointer;transition:transform 0.15s;flex-shrink:0;}
        .color-btn.active{border-color:#2d3436;transform:scale(1.2);}
        .color-btn:active{transform:scale(0.9);}
        .divider{width:1px;height:26px;background:rgba(0,0,0,0.1);margin:0 2px;flex-shrink:0;}
        .ios-unlock{position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.6);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;cursor:pointer;backdrop-filter:blur(5px);}.ios-unlock-emoji{font-size:80px;animation:ios-bounce 1s ease-in-out infinite;}.ios-unlock-text{font-size:24px;font-weight:800;color:white;text-shadow:2px 2px 0 rgba(0,0,0,0.2);}@keyframes ios-bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
    </style>
</head>

        let currentCat=Object.keys(drawings)[0];

        function buildUI(){
            const topBar=document.getElementById('topBar');
            topBar.innerHTML='<a href="index.html" class="home-btn">🏠</a><div class="divider"></div>';
            Object.keys(drawings).forEach(cat=>{
                const btn=document.createElement('button');
                btn.className='cat-btn'+(cat===currentCat?' active':'');
                btn.textContent=cat;
                btn.addEventListener('click',()=>{currentCat=cat;currentDrawing=0;buildUI();loadDrawing();});
                topBar.appendChild(btn);
            });

            const list=document.getElementById('drawingList');
            list.innerHTML='';
            drawings[currentCat].forEach((d,i)=>{
                const thumb=document.createElement('button');
                thumb.className='drawing-thumb'+(i===currentDrawing?' active':'');
                thumb.textContent=d.icon;
                thumb.addEventListener('click',()=>{currentDrawing=i;buildUI();loadDrawing();});
                list.appendChild(thumb);
            });

            const colorBar=document.getElementById('colorBar');
            colorBar.innerHTML='';
            colors.forEach(col=>{
                const btn=document.createElement('button');
                btn.className='color-btn'+(col===currentColor?' active':'');
                btn.style.background=col;
                if(col==='#ecf0f1')btn.style.borderColor='#ccc';
                btn.addEventListener('click',()=>{
                    currentColor=col;
                    document.querySelectorAll('.color-btn').forEach(b=>b.classList.remove('active'));
                    btn.classList.add('active');
                });
                colorBar.appendChild(btn);
            });
        }

        function loadDrawing(){
            const d=drawings[currentCat][currentDrawing];
            document.getElementById('svgArea').innerHTML=d.svg;
            // Add click handlers to fillable regions
            document.querySelectorAll('[data-fill]').forEach(el=>{
                el.addEventListener('click',()=>{
                    el.setAttribute('fill',currentColor);
                    playFill();
                });
            });
        }

        buildUI();
        loadDrawing();

        document.addEventListener('gesturestart',e=>e.preventDefault());
        document.addEventListener('dblclick',e=>e.preventDefault());
