<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Primeiros Joguinhos - Jogos para Bebés e Crianças</title>
    <meta name="description" content="Jogos divertidos e educativos para bebés e crianças pequenas. Toca, brinca e aprende!">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Joguinhos">
    <meta name="theme-color" content="#a8edea">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-180x180.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            min-height: 100vh;
            min-height: 100dvh;
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 50%, #ffd89b 100%);
            font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* Nuvens */
        .cloud {
            position: fixed;
            background: rgba(255,255,255,0.5);
            border-radius: 50px;
            animation: float-cloud linear infinite;
            z-index: 0;
            pointer-events: none;
        }
        .cloud::before, .cloud::after {
            content: '';
            position: absolute;
            background: rgba(255,255,255,0.5);
            border-radius: 50%;
        }
        .cloud::before { width: 60%; height: 80%; top: -40%; left: 20%; }
        .cloud::after { width: 40%; height: 60%; top: -25%; left: 55%; }
        @keyframes float-cloud {
            from { transform: translateX(110vw); }
            to { transform: translateX(-200px); }
        }

        header {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 40px 20px 20px;
        }

        .logo-emoji {
            font-size: clamp(50px, 12vw, 80px);
            animation: bounce-logo 2s ease-in-out infinite;
        }

        @keyframes bounce-logo {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        h1 {
            font-size: clamp(28px, 7vw, 48px);
            font-weight: 900;
            color: #fff;
            text-shadow: 3px 3px 0 rgba(0,0,0,0.12);
            margin: 10px 0 5px;
            line-height: 1.1;
        }

        .subtitle {
            font-size: clamp(14px, 3.5vw, 20px);
            color: rgba(255,255,255,0.85);
            font-weight: 600;
            text-shadow: 1px 1px 0 rgba(0,0,0,0.08);
        }

        .games-grid {
            position: relative;
            z-index: 1;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 18px;
            padding: 30px 20px;
            max-width: 600px;
            width: 100%;
        }

        .game-card {
            background: rgba(255,255,255,0.85);
            border-radius: 24px;
            padding: 24px 16px 18px;
            text-align: center;
            text-decoration: none;
            color: #333;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .game-card:hover, .game-card:active {
            transform: scale(1.05) translateY(-4px);
            box-shadow: 0 12px 35px rgba(0,0,0,0.15);
        }

        .game-card .card-emoji {
            font-size: clamp(45px, 11vw, 65px);
            line-height: 1;
        }

        .game-card .card-title {
            font-size: clamp(14px, 3.5vw, 18px);
            font-weight: 800;
            color: #444;
        }

        .game-card .card-age {
            font-size: clamp(10px, 2.5vw, 13px);
            color: #999;
            font-weight: 600;
        }

        .game-card.coming-soon {
            opacity: 0.5;
            pointer-events: none;
        }

        .game-card.coming-soon .card-title::after {
            content: ' (em breve)';
            font-size: 10px;
            color: #aaa;
        }

        .grass {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 40px;
            background: #7ec881;
            border-radius: 50% 50% 0 0 / 100% 100% 0 0;
            z-index: 0;
            pointer-events: none;
        }

        footer {
            position: relative;
            z-index: 1;
            padding: 20px;
            text-align: center;
            color: rgba(255,255,255,0.6);
            font-size: 12px;
            margin-bottom: 50px;
        }
    </style>
</head>
<body>

    <div class="cloud" style="width:120px;height:40px;top:6%;animation-duration:25s;animation-delay:-5s;"></div>
    <div class="cloud" style="width:90px;height:30px;top:15%;animation-duration:35s;animation-delay:-15s;"></div>
    <div class="cloud" style="width:150px;height:45px;top:3%;animation-duration:30s;animation-delay:-22s;"></div>

    <header>
        <div class="logo-emoji">🧸</div>
        <h1>Primeiros Joguinhos</h1>
        <p class="subtitle">Jogos divertidos para os mais pequeninos!</p>
    </header>

    <div class="games-grid">
        <a href="jogo-animais.html" class="game-card">
            <span class="card-emoji">🐶🐱🐮</span>
            <span class="card-title">Toca nos Animais</span>
            <span class="card-age">1-3 anos</span>
        </a>

        <a href="#" class="game-card coming-soon">
            <span class="card-emoji">🔴🟡🔵</span>
            <span class="card-title">Cores e Formas</span>
            <span class="card-age">1-3 anos</span>
        </a>

        <a href="#" class="game-card coming-soon">
            <span class="card-emoji">🫧🫧🫧</span>
            <span class="card-title">Bolhas de Sabao</span>
            <span class="card-age">1-2 anos</span>
        </a>

        <a href="#" class="game-card coming-soon">
            <span class="card-emoji">🎹🎵🎶</span>
            <span class="card-title">Piano de Cores</span>
            <span class="card-age">1-3 anos</span>
        </a>

        <a href="#" class="game-card coming-soon">
            <span class="card-emoji">🧩🔷🔶</span>
            <span class="card-title">Puzzle Simples</span>
            <span class="card-age">2-4 anos</span>
        </a>

        <a href="#" class="game-card coming-soon">
            <span class="card-emoji">🔢1️⃣2️⃣</span>
            <span class="card-title">Primeiros Numeros</span>
            <span class="card-age">2-4 anos</span>
        </a>
    </div>

    <footer>
        Primeiros Joguinhos &copy; 2026
    </footer>

    <div class="grass"></div>

    <script>
    </script>
</body>
</html>
