<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Primeiros Joguinhos - Jogos para Bebés e Crianças</title>
    <meta name="description" content="Jogos divertidos e educativos para bebés e crianças pequenas. Toca, brinca e aprende!">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Joguinhos">
    <meta name="theme-color" content="#a8edea">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-180x180.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            min-height: 100vh;
            min-height: 100dvh;
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 50%, #ffd89b 100%);
            font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* Nuvens */
        .cloud {
            position: fixed;
            background: rgba(255,255,255,0.5);
            border-radius: 50px;
            animation: float-cloud linear infinite;
            z-index: 0;
            pointer-events: none;
        }
        .cloud::before, .cloud::after {
            content: '';
            position: absolute;
            background: rgba(255,255,255,0.5);
            border-radius: 50%;
        }
        .cloud::before { width: 60%; height: 80%; top: -40%; left: 20%; }
        .cloud::after { width: 40%; height: 60%; top: -25%; left: 55%; }
        @keyframes float-cloud {
            from { transform: translateX(110vw); }
            to { transform: translateX(-200px); }
        }

        header {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 40px 20px 20px;
        }

        .logo-emoji {
            font-size: clamp(50px, 12vw, 80px);
            animation: bounce-logo 2s ease-in-out infinite;
        }

        @keyframes bounce-logo {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        h1 {
            font-size: clamp(28px, 7vw, 48px);
            font-weight: 900;
            color: #fff;
            text-shadow: 3px 3px 0 rgba(0,0,0,0.12);
            margin: 10px 0 5px;
            line-height: 1.1;
        }

        .subtitle {
            font-size: clamp(14px, 3.5vw, 20px);
            color: rgba(255,255,255,0.85);
            font-weight: 600;
            text-shadow: 1px 1px 0 rgba(0,0,0,0.08);
        }

        .games-grid {
            position: relative;
            z-index: 1;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 14px;
            padding: 20px;
            max-width: 560px;
            width: 100%;
        }

        .game-card {
            border-radius: 24px;
            padding: 14px 8px 12px;
            text-align: center;
            text-decoration: none;
            color: white;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            aspect-ratio: 1;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .game-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(255,255,255,0.08);
            border-radius: 24px;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .game-card:hover::before, .game-card:active::before { opacity: 1; }

        .game-card:hover, .game-card:active {
            transform: scale(1.08) translateY(-4px);
        }

        /* Individual card colors */
        .game-card:nth-child(1)  { background: linear-gradient(145deg, #55efc4, #00b894); box-shadow: 0 6px 20px rgba(0,184,148,0.35); }
        .game-card:nth-child(2)  { background: linear-gradient(145deg, #fd79a8, #e84393); box-shadow: 0 6px 20px rgba(232,67,147,0.35); }
        .game-card:nth-child(3)  { background: linear-gradient(145deg, #74b9ff, #0984e3); box-shadow: 0 6px 20px rgba(9,132,227,0.35); }
        .game-card:nth-child(4)  { background: linear-gradient(145deg, #a29bfe, #6c5ce7); box-shadow: 0 6px 20px rgba(108,92,231,0.35); }
        .game-card:nth-child(5)  { background: linear-gradient(145deg, #00b894, #006266); box-shadow: 0 6px 20px rgba(0,98,102,0.35); }
        .game-card:nth-child(6)  { background: linear-gradient(145deg, #ffa502, #e67e22); box-shadow: 0 6px 20px rgba(230,126,34,0.35); }
        .game-card:nth-child(7)  { background: linear-gradient(145deg, #74b9ff, #2980b9); box-shadow: 0 6px 20px rgba(41,128,185,0.35); }
        .game-card:nth-child(8)  { background: linear-gradient(145deg, #c39bff, #8e44ad); box-shadow: 0 6px 20px rgba(142,68,173,0.35); }
        .game-card:nth-child(9)  { background: linear-gradient(145deg, #45aaf2, #1B1464); box-shadow: 0 6px 20px rgba(27,20,100,0.35); }
        .game-card:nth-child(10) { background: linear-gradient(145deg, #ffd93d, #f39c12); box-shadow: 0 6px 20px rgba(243,156,18,0.35); }
        .game-card:nth-child(11) { background: linear-gradient(145deg, #ff6b6b, #ee5a24); box-shadow: 0 6px 20px rgba(238,90,36,0.35); }
        .game-card:nth-child(12) { background: linear-gradient(145deg, #55efc4, #1abc9c); box-shadow: 0 6px 20px rgba(26,188,156,0.35); }

        .game-card .card-icon {
            pointer-events: none;
        }

        .game-card .card-title {
            font-size: clamp(11px, 2.8vw, 15px);
            font-weight: 800;
            color: white;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.25);
        }

        .game-card .card-age {
            font-size: clamp(8px, 2vw, 11px);
            color: rgba(255,255,255,0.75);
            font-weight: 700;
            background: rgba(0,0,0,0.15);
            padding: 2px 8px;
            border-radius: 10px;
        }

        .game-card.coming-soon {
            opacity: 0.5;
            pointer-events: none;
        }

        .game-card.coming-soon .card-title::after {
            content: ' (em breve)';
            font-size: 10px;
            color: #aaa;
        }

        .grass {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: #7ec881;
            border-radius: 50% 50% 0 0 / 100% 100% 0 0;
            z-index: 5;
            pointer-events: none;
        }
        .grass-dark {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 30px;
            background: #6abf69;
            z-index: 4;
            pointer-events: none;
        }

        /* Minhoca */
        .worm-zone {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 80px;
            z-index: 6;
            pointer-events: none;
            overflow: hidden;
        }
        /* Each hole is a container that clips the worm */
        .worm-spot {
            position: absolute;
            bottom: 8px;
            width: 50px;
            height: 70px;
            overflow: hidden;
        }
        .worm-hole-shadow {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 0px;
            height: 0px;
            background: radial-gradient(ellipse, #3a6b30 0%, #2d5a25 50%, transparent 72%);
            border-radius: 50%;
            transition: width 0.35s ease, height 0.35s ease;
            z-index: 2;
        }
        .worm-spot.active .worm-hole-shadow {
            width: 46px;
            height: 18px;
        }
        .worm-body {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%) translateY(70px);
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 1;
        }
        .worm-spot.active .worm-body {
            animation: worm-peek 3s ease-in-out forwards;
        }
        .worm-head {
            width: 26px;
            height: 26px;
            background: #e84393;
            border-radius: 50%;
            position: relative;
            flex-shrink: 0;
        }
        .worm-head::before, .worm-head::after {
            content: '';
            position: absolute;
            width: 8px;
            height: 8px;
            background: white;
            border-radius: 50%;
            top: 5px;
        }
        .worm-head::before { left: 3px; }
        .worm-head::after { right: 3px; }
        .worm-eye-l, .worm-eye-r {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #2d3436;
            border-radius: 50%;
            top: 7px;
            z-index: 3;
        }
        .worm-eye-l { left: 5px; }
        .worm-eye-r { right: 5px; }
        .worm-segment {
            width: 22px;
            height: 13px;
            border-radius: 50%;
            margin-top: -4px;
            flex-shrink: 0;
        }
        .worm-seg-1 { background: #fd79a8; }
        .worm-seg-2 { background: #e84393; }

        @keyframes worm-peek {
            0%   { transform: translateX(-50%) translateY(70px); }
            12%  { transform: translateX(-50%) translateY(8px); }
            20%  { transform: translateX(-50%) translateY(8px) rotate(-10deg); }
            30%  { transform: translateX(-50%) translateY(8px) rotate(10deg); }
            40%  { transform: translateX(-50%) translateY(8px) rotate(-6deg); }
            50%  { transform: translateX(-50%) translateY(5px); }
            60%  { transform: translateX(-50%) translateY(5px) rotate(5deg); }
            70%  { transform: translateX(-50%) translateY(8px) rotate(0deg); }
            82%  { transform: translateX(-50%) translateY(70px); }
            100% { transform: translateX(-50%) translateY(70px); }
        }

        footer {
            position: relative;
            z-index: 1;
            padding: 20px;
            text-align: center;
            color: rgba(255,255,255,0.6);
            font-size: 12px;
            margin-bottom: 60px;
        }
    </style>
</head>
<body>

    <div class="cloud" style="width:120px;height:40px;top:6%;animation-duration:25s;animation-delay:-5s;"></div>
    <div class="cloud" style="width:90px;height:30px;top:15%;animation-duration:35s;animation-delay:-15s;"></div>
    <div class="cloud" style="width:150px;height:45px;top:3%;animation-duration:30s;animation-delay:-22s;"></div>

    <header>
        <div class="logo-emoji">🧸</div>
        <h1>Primeiros Joguinhos</h1>
        <p class="subtitle">Jogos divertidos para os mais pequeninos!</p>
    </header>

    <div class="games-grid" id="gamesGrid"></div>

    <script>
    // Game card data
    const games = [
        { href:'jogo-animais.html', title:'Toca nos Animais', age:'1-3 anos', draw: drawAnimals },
        { href:'jogo-cores.html', title:'Cores e Formas', age:'1-3 anos', draw: drawCores },
        { href:'jogo-bolhas.html', title:'Bolhas de Sabao', age:'1-2 anos', draw: drawBolhas },
        { href:'jogo-piano.html', title:'Piano de Cores', age:'1-3 anos', draw: drawPiano },
        { href:'jogo-cobra.html', title:'Cobrinha', age:'3+ anos', draw: drawCobra },
        { href:'jogo-puzzle.html', title:'Puzzle Simples', age:'2-4 anos', draw: drawPuzzle },
        { href:'jogo-numeros.html', title:'Primeiros Numeros', age:'2-4 anos', draw: drawNumeros },
        { href:'jogo-ingles.html', title:'Aprende Ingles', age:'3+ anos', draw: drawIngles },
        { href:'jogo-oceano.html', title:'Limpa o Oceano', age:'2+ anos', draw: drawOceano },
        { href:'jogo-objetos.html', title:'Objetos do Dia', age:'1-3 anos', draw: drawObjetos },
        { href:'jogo-pintar.html', title:'Pintar', age:'1+ anos', draw: drawPintar },
        { href:'jogo-colorir.html', title:'Colorir', age:'2+ anos', draw: drawColorir },
        { href:'jogo-historias.html', title:'Historias', age:'2+ anos', draw: drawHistorias },
    ];

    // ===== CARD ILLUSTRATIONS =====
    function drawAnimals(c,w,h){
        // Cute cat face
        c.fillStyle='#ff9f43';
        c.beginPath();c.arc(w*0.5,h*0.42,w*0.3,0,Math.PI*2);c.fill();
        // Ears
        c.beginPath();c.moveTo(w*0.25,h*0.22);c.lineTo(w*0.18,h*0.02);c.lineTo(w*0.38,h*0.18);c.fill();
        c.beginPath();c.moveTo(w*0.75,h*0.22);c.lineTo(w*0.82,h*0.02);c.lineTo(w*0.62,h*0.18);c.fill();
        // Inner ears
        c.fillStyle='#ffcccc';
        c.beginPath();c.moveTo(w*0.27,h*0.22);c.lineTo(w*0.22,h*0.08);c.lineTo(w*0.36,h*0.2);c.fill();
        c.beginPath();c.moveTo(w*0.73,h*0.22);c.lineTo(w*0.78,h*0.08);c.lineTo(w*0.64,h*0.2);c.fill();
        // Eyes
        c.fillStyle='#2d3436';
        c.beginPath();c.ellipse(w*0.38,h*0.38,w*0.05,w*0.07,0,0,Math.PI*2);c.fill();
        c.beginPath();c.ellipse(w*0.62,h*0.38,w*0.05,w*0.07,0,0,Math.PI*2);c.fill();
        c.fillStyle='white';
        c.beginPath();c.arc(w*0.4,h*0.36,w*0.02,0,Math.PI*2);c.fill();
        c.beginPath();c.arc(w*0.64,h*0.36,w*0.02,0,Math.PI*2);c.fill();
        // Nose
        c.fillStyle='#ff6b6b';
        c.beginPath();c.moveTo(w*0.5,h*0.47);c.lineTo(w*0.47,h*0.44);c.lineTo(w*0.53,h*0.44);c.fill();
        // Mouth
        c.strokeStyle='#e17055';c.lineWidth=2;
        c.beginPath();c.moveTo(w*0.5,h*0.47);c.quadraticCurveTo(w*0.44,h*0.53,w*0.4,h*0.51);c.stroke();
        c.beginPath();c.moveTo(w*0.5,h*0.47);c.quadraticCurveTo(w*0.56,h*0.53,w*0.6,h*0.51);c.stroke();
        // Whiskers
        c.strokeStyle='rgba(0,0,0,0.3)';c.lineWidth=1.5;
        c.beginPath();c.moveTo(w*0.2,h*0.44);c.lineTo(w*0.38,h*0.46);c.stroke();
        c.beginPath();c.moveTo(w*0.18,h*0.5);c.lineTo(w*0.37,h*0.49);c.stroke();
        c.beginPath();c.moveTo(w*0.8,h*0.44);c.lineTo(w*0.62,h*0.46);c.stroke();
        c.beginPath();c.moveTo(w*0.82,h*0.5);c.lineTo(w*0.63,h*0.49);c.stroke();
    }
    function drawCores(c,w,h){
        const shapes=[
            {x:0.3,y:0.25,r:0.15,col:'#ff6b6b'},
            {x:0.65,y:0.2,r:0.12,col:'#ffd93d'},
            {x:0.5,y:0.45,r:0.14,col:'#74b9ff'},
        ];
        shapes.forEach(s=>{c.fillStyle=s.col;c.beginPath();c.arc(w*s.x,h*s.y,w*s.r,0,Math.PI*2);c.fill();});
        // Triangle
        c.fillStyle='#55efc4';
        c.beginPath();c.moveTo(w*0.25,h*0.65);c.lineTo(w*0.45,h*0.65);c.lineTo(w*0.35,h*0.45);c.closePath();c.fill();
        // Square
        c.fillStyle='#a29bfe';
        c.fillRect(w*0.55,h*0.5,w*0.2,w*0.2);
    }
    function drawBolhas(c,w,h){
        const bubbles=[[0.3,0.2,0.14],[0.6,0.35,0.18],[0.35,0.55,0.11],[0.7,0.15,0.09],[0.5,0.1,0.07],[0.2,0.42,0.08]];
        const cols=['rgba(255,107,107,0.35)','rgba(116,185,255,0.4)','rgba(162,155,254,0.35)','rgba(253,121,168,0.35)','rgba(85,239,196,0.35)','rgba(255,234,167,0.4)'];
        bubbles.forEach(([bx,by,br],i)=>{
            c.beginPath();c.arc(w*bx,h*by,w*br,0,Math.PI*2);
            c.fillStyle=cols[i%cols.length];c.fill();
            c.strokeStyle=cols[i%cols.length].replace('0.35','0.6').replace('0.4','0.7');c.lineWidth=2;c.stroke();
            // Highlight
            c.beginPath();c.ellipse(w*bx-w*br*0.25,h*by-w*br*0.3,w*br*0.3,w*br*0.15,-0.5,0,Math.PI*2);
            c.fillStyle='rgba(255,255,255,0.5)';c.fill();
        });
    }
    function drawPiano(c,w,h){
        const keys=['#ff6b6b','#ffa502','#ffd93d','#55efc4','#74b9ff','#a29bfe','#fd79a8'];
        const kw=w*0.11;
        keys.forEach((col,i)=>{
            const x=w*0.08+i*(kw+w*0.02);
            c.fillStyle=col;
            c.beginPath();
            c.roundRect(x,h*0.1,kw,h*0.55,0,0,w*0.02,w*0.02);
            c.fill();
            // Shadow
            c.fillStyle='rgba(0,0,0,0.1)';
            c.fillRect(x,h*0.5,kw,h*0.15);
        });
        // Music notes
        c.fillStyle='rgba(0,0,0,0.2)';
        c.font=(w*0.12)+'px serif';
        c.fillText('\u266A',w*0.2,h*0.85);
        c.fillText('\u266B',w*0.55,h*0.8);
    }
    function drawCobra(c,w,h){
        // Snake body
        c.strokeStyle='#55efc4';c.lineWidth=w*0.08;c.lineCap='round';
        c.beginPath();c.moveTo(w*0.15,h*0.55);c.bezierCurveTo(w*0.3,h*0.2,w*0.5,h*0.7,w*0.7,h*0.3);c.stroke();
        // Head
        c.fillStyle='#00b894';
        c.beginPath();c.arc(w*0.7,h*0.28,w*0.1,0,Math.PI*2);c.fill();
        // Eye
        c.fillStyle='white';c.beginPath();c.arc(w*0.73,h*0.25,w*0.04,0,Math.PI*2);c.fill();
        c.fillStyle='#2d3436';c.beginPath();c.arc(w*0.74,h*0.25,w*0.02,0,Math.PI*2);c.fill();
        // Tongue
        c.strokeStyle='#ff6b6b';c.lineWidth=2;
        c.beginPath();c.moveTo(w*0.78,h*0.28);c.lineTo(w*0.85,h*0.25);c.stroke();
        c.beginPath();c.moveTo(w*0.78,h*0.28);c.lineTo(w*0.85,h*0.31);c.stroke();
        // Apple
        c.fillStyle='#ff6b6b';c.beginPath();c.arc(w*0.3,h*0.6,w*0.08,0,Math.PI*2);c.fill();
        c.fillStyle='#27ae60';c.fillRect(w*0.29,h*0.5,w*0.02,h*0.04);
    }
    function drawPuzzle(c,w,h){
        const cols=['#ff6b6b','#ffd93d','#74b9ff','#55efc4'];
        const gap=3;
        cols.forEach((col,i)=>{
            const x=(i%2)*(w*0.42+gap)+w*0.08;
            const y=Math.floor(i/2)*(h*0.35+gap)+h*0.08;
            c.fillStyle=col;
            c.beginPath();c.roundRect(x,y,w*0.4,h*0.32,[w*0.04]);c.fill();
        });
        // Puzzle lines
        c.strokeStyle='rgba(255,255,255,0.6)';c.lineWidth=3;c.setLineDash([]);
        c.beginPath();c.moveTo(w*0.5,h*0.08);c.lineTo(w*0.5,h*0.75);c.stroke();
        c.beginPath();c.moveTo(w*0.08,h*0.42);c.lineTo(w*0.92,h*0.42);c.stroke();
    }
    function drawNumeros(c,w,h){
        c.font='bold '+(w*0.3)+'px sans-serif';c.textAlign='center';c.textBaseline='middle';
        c.fillStyle='#ff6b6b';c.fillText('1',w*0.25,h*0.3);
        c.fillStyle='#ffd93d';c.fillText('2',w*0.6,h*0.25);
        c.fillStyle='#74b9ff';c.fillText('3',w*0.4,h*0.55);
        // Small dots
        c.fillStyle='#55efc4';
        c.beginPath();c.arc(w*0.75,h*0.55,w*0.04,0,Math.PI*2);c.fill();
        c.beginPath();c.arc(w*0.8,h*0.45,w*0.04,0,Math.PI*2);c.fill();
        c.beginPath();c.arc(w*0.85,h*0.55,w*0.04,0,Math.PI*2);c.fill();
    }
    function drawIngles(c,w,h){
        c.font='bold '+(w*0.18)+'px sans-serif';c.textAlign='center';c.textBaseline='middle';
        // ABC blocks
        const letters=[{l:'A',x:0.22,y:0.25,col:'#ff6b6b'},{l:'B',x:0.5,y:0.3,col:'#ffd93d'},{l:'C',x:0.78,y:0.25,col:'#74b9ff'}];
        letters.forEach(({l,x,y,col})=>{
            c.fillStyle=col;c.beginPath();c.roundRect(w*x-w*0.12,h*y-w*0.12,w*0.24,w*0.24,[w*0.04]);c.fill();
            c.fillStyle='white';c.fillText(l,w*x,h*y+w*0.01);
        });
        // Small flag
        c.fillStyle='#e74c3c';c.fillRect(w*0.35,h*0.6,w*0.3,h*0.04);
        c.fillStyle='white';c.fillRect(w*0.35,h*0.64,w*0.3,h*0.04);
        c.fillStyle='#2980b9';c.fillRect(w*0.35,h*0.68,w*0.3,h*0.04);
    }
    function drawOceano(c,w,h){
        // Water
        c.fillStyle='rgba(9,132,227,0.15)';c.fillRect(0,0,w,h);
        // Fish
        c.fillStyle='#ff6b6b';
        c.beginPath();c.ellipse(w*0.55,h*0.3,w*0.15,w*0.08,0,0,Math.PI*2);c.fill();
        // Tail
        c.beginPath();c.moveTo(w*0.4,h*0.3);c.lineTo(w*0.3,h*0.2);c.lineTo(w*0.3,h*0.4);c.closePath();c.fill();
        // Eye
        c.fillStyle='white';c.beginPath();c.arc(w*0.62,h*0.27,w*0.03,0,Math.PI*2);c.fill();
        c.fillStyle='#2d3436';c.beginPath();c.arc(w*0.63,h*0.27,w*0.015,0,Math.PI*2);c.fill();
        // Seaweed
        c.strokeStyle='#00b894';c.lineWidth=3;c.lineCap='round';
        c.beginPath();c.moveTo(w*0.15,h*0.7);c.quadraticCurveTo(w*0.2,h*0.5,w*0.13,h*0.35);c.stroke();
        c.beginPath();c.moveTo(w*0.8,h*0.7);c.quadraticCurveTo(w*0.75,h*0.55,w*0.82,h*0.4);c.stroke();
        // Bubbles
        c.strokeStyle='rgba(255,255,255,0.4)';c.lineWidth=1.5;
        [0.4,0.6,0.35].forEach((bx,i)=>{c.beginPath();c.arc(w*bx,h*(0.45+i*0.08),w*0.02,0,Math.PI*2);c.stroke();});
        // Trash
        c.fillStyle='rgba(255,100,100,0.5)';
        c.fillRect(w*0.6,h*0.55,w*0.12,w*0.08);
    }
    function drawObjetos(c,w,h){
        // Simple house
        c.fillStyle='#ff7675';c.fillRect(w*0.15,h*0.3,w*0.35,h*0.35);
        c.fillStyle='#d63031';c.beginPath();c.moveTo(w*0.1,h*0.33);c.lineTo(w*0.32,h*0.1);c.lineTo(w*0.55,h*0.33);c.closePath();c.fill();
        c.fillStyle='#74b9ff';c.fillRect(w*0.22,h*0.38,w*0.08,h*0.08);
        c.fillStyle='#6c5ce7';c.fillRect(w*0.35,h*0.42,w*0.08,h*0.23);
        // Car
        c.fillStyle='#0984e3';
        c.beginPath();c.roundRect(w*0.55,h*0.4,w*0.35,h*0.15,[w*0.03]);c.fill();
        c.fillStyle='#74b9ff';
        c.beginPath();c.roundRect(w*0.62,h*0.3,w*0.2,h*0.12,[w*0.03,w*0.03,0,0]);c.fill();
        c.fillStyle='#2d3436';
        c.beginPath();c.arc(w*0.65,h*0.58,w*0.04,0,Math.PI*2);c.fill();
        c.beginPath();c.arc(w*0.82,h*0.58,w*0.04,0,Math.PI*2);c.fill();
    }
    function drawPintar(c,w,h){
        // Palette
        c.fillStyle='#dfe6e9';
        c.beginPath();c.ellipse(w*0.45,h*0.4,w*0.3,w*0.22,0,0,Math.PI*2);c.fill();
        // Paint spots
        const spots=[{x:0.3,y:0.3,col:'#ff6b6b'},{x:0.5,y:0.25,col:'#ffd93d'},{x:0.6,y:0.35,col:'#74b9ff'},{x:0.35,y:0.48,col:'#55efc4'},{x:0.55,y:0.5,col:'#a29bfe'}];
        spots.forEach(s=>{c.fillStyle=s.col;c.beginPath();c.arc(w*s.x,h*s.y,w*0.04,0,Math.PI*2);c.fill();});
        // Brush
        c.strokeStyle='#d35400';c.lineWidth=w*0.03;c.lineCap='round';
        c.beginPath();c.moveTo(w*0.7,h*0.15);c.lineTo(w*0.55,h*0.55);c.stroke();
        c.fillStyle='#e84393';
        c.beginPath();c.arc(w*0.55,h*0.57,w*0.04,0,Math.PI*2);c.fill();
    }
    function drawColorir(c,w,h){
        // Crayon
        c.fillStyle='#e74c3c';
        c.beginPath();c.roundRect(w*0.15,h*0.15,w*0.12,h*0.45,[w*0.03]);c.fill();
        c.fillStyle='#c0392b';c.beginPath();c.moveTo(w*0.15,h*0.15);c.lineTo(w*0.21,h*0.05);c.lineTo(w*0.27,h*0.15);c.closePath();c.fill();
        // Another crayon
        c.fillStyle='#3498db';
        c.beginPath();c.roundRect(w*0.35,h*0.2,w*0.12,h*0.4,[w*0.03]);c.fill();
        c.fillStyle='#2980b9';c.beginPath();c.moveTo(w*0.35,h*0.2);c.lineTo(w*0.41,h*0.1);c.lineTo(w*0.47,h*0.2);c.closePath();c.fill();
        // Scribble
        c.strokeStyle='#e74c3c';c.lineWidth=3;c.lineCap='round';
        c.beginPath();c.moveTo(w*0.55,h*0.5);c.bezierCurveTo(w*0.65,h*0.2,w*0.85,h*0.5,w*0.75,h*0.65);c.stroke();
        c.strokeStyle='#3498db';
        c.beginPath();c.moveTo(w*0.6,h*0.6);c.bezierCurveTo(w*0.7,h*0.35,w*0.9,h*0.55,w*0.8,h*0.3);c.stroke();
    }

    function drawHistorias(c,w,h){
        // Open book
        c.fillStyle='#8B4513';
        c.beginPath();c.roundRect(w*0.1,h*0.15,w*0.38,h*0.55,[w*0.02,0,0,w*0.02]);c.fill();
        c.fillStyle='#a0522d';
        c.beginPath();c.roundRect(w*0.52,h*0.15,w*0.38,h*0.55,[0,w*0.02,w*0.02,0]);c.fill();
        // Pages
        c.fillStyle='#fff8e7';
        c.fillRect(w*0.14,h*0.19,w*0.32,h*0.47);
        c.fillRect(w*0.54,h*0.19,w*0.32,h*0.47);
        // Text lines
        c.fillStyle='rgba(0,0,0,0.12)';
        for(let i=0;i<4;i++){
            c.fillRect(w*0.18,h*0.25+i*h*0.09,w*0.24,h*0.02);
            c.fillRect(w*0.58,h*0.25+i*h*0.09,w*0.24,h*0.02);
        }
        // Spine
        c.fillStyle='#6b3410';c.fillRect(w*0.48,h*0.14,w*0.04,h*0.57);
        // Stars
        c.fillStyle='#ffd93d';c.font=(w*0.08)+'px serif';
        c.fillText('\u2605',w*0.3,h*0.45);
        c.fillText('\u2605',w*0.65,h*0.42);
    }

    // Build cards
    const grid = document.getElementById('gamesGrid');
    games.forEach(game => {
        const a = document.createElement('a');
        a.href = game.href;
        a.className = 'game-card';

        const cvs = document.createElement('canvas');
        cvs.width = 200;
        cvs.height = 140;
        cvs.className = 'card-icon';
        cvs.style.cssText = 'width:100%;height:auto;border-radius:12px;';
        const ctx = cvs.getContext('2d');
        game.draw(ctx, 200, 140);

        const title = document.createElement('span');
        title.className = 'card-title';
        title.textContent = game.title;

        const age = document.createElement('span');
        age.className = 'card-age';
        age.textContent = game.age;

        a.appendChild(cvs);
        a.appendChild(title);
        a.appendChild(age);
        grid.appendChild(a);
    });
    </script>

    <script>
        // Worm animation - each spot has its own worm hidden by overflow
        const spots = document.querySelectorAll('.worm-spot');
        let lastSpot = -1;

        function peekWorm() {
            // Pick a different spot
            let next;
            do { next = Math.floor(Math.random() * spots.length); }
            while (next === lastSpot);
            lastSpot = next;

            const spot = spots[next];

            // Activate: hole opens + worm peeks
            spot.classList.add('active');

            // Remove after animation ends (hole closes + worm hidden)
            setTimeout(() => {
                spot.classList.remove('active');
            }, 3100);

            // Next peek
            setTimeout(peekWorm, 3800 + Math.random() * 2500);
        }

        setTimeout(peekWorm, 1500);
    </script>
