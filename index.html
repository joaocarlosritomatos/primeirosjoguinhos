<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Primeiros Joguinhos - Jogos para Bebés e Crianças</title>
    <meta name="description" content="Jogos divertidos e educativos para bebés e crianças pequenas. Toca, brinca e aprende!">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Joguinhos">
    <meta name="theme-color" content="#a8edea">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-180x180.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            min-height: 100vh;
            min-height: 100dvh;
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 50%, #ffd89b 100%);
            font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* Nuvens */
        .cloud {
            position: fixed;
            background: rgba(255,255,255,0.5);
            border-radius: 50px;
            animation: float-cloud linear infinite;
            z-index: 0;
            pointer-events: none;
        }
        .cloud::before, .cloud::after {
            content: '';
            position: absolute;
            background: rgba(255,255,255,0.5);
            border-radius: 50%;
        }
        .cloud::before { width: 60%; height: 80%; top: -40%; left: 20%; }
        .cloud::after { width: 40%; height: 60%; top: -25%; left: 55%; }
        @keyframes float-cloud {
            from { transform: translateX(110vw); }
            to { transform: translateX(-200px); }
        }

        header {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 40px 20px 20px;
        }

        .logo-emoji {
            font-size: clamp(50px, 12vw, 80px);
            animation: bounce-logo 2s ease-in-out infinite;
        }

        @keyframes bounce-logo {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        h1 {
            font-size: clamp(28px, 7vw, 48px);
            font-weight: 900;
            color: #fff;
            text-shadow: 3px 3px 0 rgba(0,0,0,0.12);
            margin: 10px 0 5px;
            line-height: 1.1;
        }

        .subtitle {
            font-size: clamp(14px, 3.5vw, 20px);
            color: rgba(255,255,255,0.85);
            font-weight: 600;
            text-shadow: 1px 1px 0 rgba(0,0,0,0.08);
        }

        .games-grid {
            position: relative;
            z-index: 1;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 14px;
            padding: 20px;
            max-width: 560px;
            width: 100%;
        }

        .game-card {
            border-radius: 24px;
            padding: 14px 8px 12px;
            text-align: center;
            text-decoration: none;
            color: white;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            aspect-ratio: 1;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .game-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(255,255,255,0.08);
            border-radius: 24px;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .game-card:hover::before, .game-card:active::before { opacity: 1; }

        .game-card:hover, .game-card:active {
            transform: scale(1.08) translateY(-4px);
        }

        /* Individual card colors */
        .game-card:nth-child(1)  { background: linear-gradient(145deg, #55efc4, #00b894); box-shadow: 0 6px 20px rgba(0,184,148,0.35); }
        .game-card:nth-child(2)  { background: linear-gradient(145deg, #fd79a8, #e84393); box-shadow: 0 6px 20px rgba(232,67,147,0.35); }
        .game-card:nth-child(3)  { background: linear-gradient(145deg, #74b9ff, #0984e3); box-shadow: 0 6px 20px rgba(9,132,227,0.35); }
        .game-card:nth-child(4)  { background: linear-gradient(145deg, #a29bfe, #6c5ce7); box-shadow: 0 6px 20px rgba(108,92,231,0.35); }
        .game-card:nth-child(5)  { background: linear-gradient(145deg, #00b894, #006266); box-shadow: 0 6px 20px rgba(0,98,102,0.35); }
        .game-card:nth-child(6)  { background: linear-gradient(145deg, #ffa502, #e67e22); box-shadow: 0 6px 20px rgba(230,126,34,0.35); }
        .game-card:nth-child(7)  { background: linear-gradient(145deg, #74b9ff, #2980b9); box-shadow: 0 6px 20px rgba(41,128,185,0.35); }
        .game-card:nth-child(8)  { background: linear-gradient(145deg, #c39bff, #8e44ad); box-shadow: 0 6px 20px rgba(142,68,173,0.35); }
        .game-card:nth-child(9)  { background: linear-gradient(145deg, #45aaf2, #1B1464); box-shadow: 0 6px 20px rgba(27,20,100,0.35); }
        .game-card:nth-child(10) { background: linear-gradient(145deg, #ffd93d, #f39c12); box-shadow: 0 6px 20px rgba(243,156,18,0.35); }
        .game-card:nth-child(11) { background: linear-gradient(145deg, #ff6b6b, #ee5a24); box-shadow: 0 6px 20px rgba(238,90,36,0.35); }
        .game-card:nth-child(12) { background: linear-gradient(145deg, #55efc4, #1abc9c); box-shadow: 0 6px 20px rgba(26,188,156,0.35); }

        .game-card .card-icon {
            pointer-events: none;
        }

        .game-card .card-title {
            font-size: clamp(11px, 2.8vw, 15px);
            font-weight: 800;
            color: white;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.25);
        }

        .game-card .card-age {
            font-size: clamp(8px, 2vw, 11px);
            color: rgba(255,255,255,0.75);
            font-weight: 700;
            background: rgba(0,0,0,0.15);
            padding: 2px 8px;
            border-radius: 10px;
        }

        .game-card.coming-soon {
            opacity: 0.5;
            pointer-events: none;
        }

        .game-card.coming-soon .card-title::after {
            content: ' (em breve)';
            font-size: 10px;
            color: #aaa;
        }

        .grass {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: #7ec881;
            border-radius: 50% 50% 0 0 / 100% 100% 0 0;
            z-index: 5;
            pointer-events: none;
        }
        .grass-dark {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 30px;
            background: #6abf69;
            z-index: 4;
            pointer-events: none;
        }

        /* Minhoca */
        .worm-zone {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 80px;
            z-index: 6;
            pointer-events: none;
            overflow: hidden;
        }
        /* Each hole is a container that clips the worm */
        .worm-spot {
            position: absolute;
            bottom: 8px;
            width: 50px;
            height: 70px;
            overflow: hidden;
        }
        .worm-hole-shadow {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 0px;
            height: 0px;
            background: radial-gradient(ellipse, #3a6b30 0%, #2d5a25 50%, transparent 72%);
            border-radius: 50%;
            transition: width 0.35s ease, height 0.35s ease;
            z-index: 2;
        }
        .worm-spot.active .worm-hole-shadow {
            width: 46px;
            height: 18px;
        }
        .worm-body {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%) translateY(70px);
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 1;
        }
        .worm-spot.active .worm-body {
            animation: worm-peek 3s ease-in-out forwards;
        }
        .worm-head {
            width: 26px;
            height: 26px;
            background: #e84393;
            border-radius: 50%;
            position: relative;
            flex-shrink: 0;
        }
        .worm-head::before, .worm-head::after {
            content: '';
            position: absolute;
            width: 8px;
            height: 8px;
            background: white;
            border-radius: 50%;
            top: 5px;
        }
        .worm-head::before { left: 3px; }
        .worm-head::after { right: 3px; }
        .worm-eye-l, .worm-eye-r {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #2d3436;
            border-radius: 50%;
            top: 7px;
            z-index: 3;
        }
        .worm-eye-l { left: 5px; }
        .worm-eye-r { right: 5px; }
        .worm-segment {
            width: 22px;
            height: 13px;
            border-radius: 50%;
            margin-top: -4px;
            flex-shrink: 0;
        }
        .worm-seg-1 { background: #fd79a8; }
        .worm-seg-2 { background: #e84393; }

        @keyframes worm-peek {
            0%   { transform: translateX(-50%) translateY(70px); }
            12%  { transform: translateX(-50%) translateY(8px); }
            20%  { transform: translateX(-50%) translateY(8px) rotate(-10deg); }
            30%  { transform: translateX(-50%) translateY(8px) rotate(10deg); }
            40%  { transform: translateX(-50%) translateY(8px) rotate(-6deg); }
            50%  { transform: translateX(-50%) translateY(5px); }
            60%  { transform: translateX(-50%) translateY(5px) rotate(5deg); }
            70%  { transform: translateX(-50%) translateY(8px) rotate(0deg); }
            82%  { transform: translateX(-50%) translateY(70px); }
            100% { transform: translateX(-50%) translateY(70px); }
        }

        footer {
            position: relative;
            z-index: 1;
            padding: 20px;
            text-align: center;
            color: rgba(255,255,255,0.6);
            font-size: 12px;
            margin-bottom: 60px;
        }

        .music-btn {
            position: fixed;
            top: 15px;
            right: 15px;
            z-index: 20;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            background: rgba(255,255,255,0.85);
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            font-size: 22px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
        }
        .music-btn:hover { transform: scale(1.1); }
        .music-btn.off { opacity: 0.5; }
    </style>
</head>
<body>

    <div class="cloud" style="width:120px;height:40px;top:6%;animation-duration:25s;animation-delay:-5s;"></div>
    <div class="cloud" style="width:90px;height:30px;top:15%;animation-duration:35s;animation-delay:-15s;"></div>
    <div class="cloud" style="width:150px;height:45px;top:3%;animation-duration:30s;animation-delay:-22s;"></div>

    <header>
        <div class="logo-emoji">🧸</div>
        <h1>Primeiros Joguinhos</h1>
        <p class="subtitle">Jogos divertidos para os mais pequeninos!</p>
    </header>

    <div class="games-grid" id="gamesGrid"></div>

    <script>
    // Game card data
    const games = [
        { href:'jogo-animais.html', title:'Toca nos Animais', age:'1-3 anos', draw: drawAnimals },
        { href:'jogo-cores.html', title:'Cores e Formas', age:'1-3 anos', draw: drawCores },
        { href:'jogo-bolhas.html', title:'Bolhas de Sabao', age:'1-2 anos', draw: drawBolhas },
        { href:'jogo-piano.html', title:'Piano de Cores', age:'1-3 anos', draw: drawPiano },
        { href:'jogo-cobra.html', title:'Cobrinha', age:'3+ anos', draw: drawCobra },
        { href:'jogo-puzzle.html', title:'Puzzle Simples', age:'2-4 anos', draw: drawPuzzle },
        { href:'jogo-numeros.html', title:'Primeiros Numeros', age:'2-4 anos', draw: drawNumeros },
        { href:'jogo-ingles.html', title:'Aprende Ingles', age:'3+ anos', draw: drawIngles },
        { href:'jogo-oceano.html', title:'Limpa o Oceano', age:'2+ anos', draw: drawOceano },
        { href:'jogo-objetos.html', title:'Objetos do Dia', age:'1-3 anos', draw: drawObjetos },
        { href:'jogo-pintar.html', title:'Pintar', age:'1+ anos', draw: drawPintar },
        { href:'jogo-colorir.html', title:'Colorir', age:'2+ anos', draw: drawColorir },
        { href:'jogo-historias.html', title:'Historias', age:'2+ anos', draw: drawHistorias },
    ];

    // ===== CARD ILLUSTRATIONS =====
    function drawAnimals(c,w,h){
        // Cute cat face
        c.fillStyle='#ff9f43';
        c.beginPath();c.arc(w*0.5,h*0.42,w*0.3,0,Math.PI*2);c.fill();
        // Ears
        c.beginPath();c.moveTo(w*0.25,h*0.22);c.lineTo(w*0.18,h*0.02);c.lineTo(w*0.38,h*0.18);c.fill();
        c.beginPath();c.moveTo(w*0.75,h*0.22);c.lineTo(w*0.82,h*0.02);c.lineTo(w*0.62,h*0.18);c.fill();
        // Inner ears
        c.fillStyle='#ffcccc';
        c.beginPath();c.moveTo(w*0.27,h*0.22);c.lineTo(w*0.22,h*0.08);c.lineTo(w*0.36,h*0.2);c.fill();
        c.beginPath();c.moveTo(w*0.73,h*0.22);c.lineTo(w*0.78,h*0.08);c.lineTo(w*0.64,h*0.2);c.fill();
        // Eyes
        c.fillStyle='#2d3436';
        c.beginPath();c.ellipse(w*0.38,h*0.38,w*0.05,w*0.07,0,0,Math.PI*2);c.fill();
        c.beginPath();c.ellipse(w*0.62,h*0.38,w*0.05,w*0.07,0,0,Math.PI*2);c.fill();
        c.fillStyle='white';
        c.beginPath();c.arc(w*0.4,h*0.36,w*0.02,0,Math.PI*2);c.fill();
        c.beginPath();c.arc(w*0.64,h*0.36,w*0.02,0,Math.PI*2);c.fill();
        // Nose
        c.fillStyle='#ff6b6b';
        c.beginPath();c.moveTo(w*0.5,h*0.47);c.lineTo(w*0.47,h*0.44);c.lineTo(w*0.53,h*0.44);c.fill();
        // Mouth
        c.strokeStyle='#e17055';c.lineWidth=2;
        c.beginPath();c.moveTo(w*0.5,h*0.47);c.quadraticCurveTo(w*0.44,h*0.53,w*0.4,h*0.51);c.stroke();
        c.beginPath();c.moveTo(w*0.5,h*0.47);c.quadraticCurveTo(w*0.56,h*0.53,w*0.6,h*0.51);c.stroke();
        // Whiskers
        c.strokeStyle='rgba(0,0,0,0.3)';c.lineWidth=1.5;
        c.beginPath();c.moveTo(w*0.2,h*0.44);c.lineTo(w*0.38,h*0.46);c.stroke();
        c.beginPath();c.moveTo(w*0.18,h*0.5);c.lineTo(w*0.37,h*0.49);c.stroke();
        c.beginPath();c.moveTo(w*0.8,h*0.44);c.lineTo(w*0.62,h*0.46);c.stroke();
        c.beginPath();c.moveTo(w*0.82,h*0.5);c.lineTo(w*0.63,h*0.49);c.stroke();
    }
    function drawCores(c,w,h){
        const shapes=[
            {x:0.3,y:0.25,r:0.15,col:'#ff6b6b'},
            {x:0.65,y:0.2,r:0.12,col:'#ffd93d'},
            {x:0.5,y:0.45,r:0.14,col:'#74b9ff'},
        ];
        shapes.forEach(s=>{c.fillStyle=s.col;c.beginPath();c.arc(w*s.x,h*s.y,w*s.r,0,Math.PI*2);c.fill();});
        // Triangle
        c.fillStyle='#55efc4';
        c.beginPath();c.moveTo(w*0.25,h*0.65);c.lineTo(w*0.45,h*0.65);c.lineTo(w*0.35,h*0.45);c.closePath();c.fill();
        // Square
        c.fillStyle='#a29bfe';
        c.fillRect(w*0.55,h*0.5,w*0.2,w*0.2);
    }
    function drawBolhas(c,w,h){
        const bubbles=[[0.3,0.2,0.14],[0.6,0.35,0.18],[0.35,0.55,0.11],[0.7,0.15,0.09],[0.5,0.1,0.07],[0.2,0.42,0.08]];
        const cols=['rgba(255,107,107,0.35)','rgba(116,185,255,0.4)','rgba(162,155,254,0.35)','rgba(253,121,168,0.35)','rgba(85,239,196,0.35)','rgba(255,234,167,0.4)'];
        bubbles.forEach(([bx,by,br],i)=>{
            c.beginPath();c.arc(w*bx,h*by,w*br,0,Math.PI*2);
            c.fillStyle=cols[i%cols.length];c.fill();
            c.strokeStyle=cols[i%cols.length].replace('0.35','0.6').replace('0.4','0.7');c.lineWidth=2;c.stroke();
            // Highlight
            c.beginPath();c.ellipse(w*bx-w*br*0.25,h*by-w*br*0.3,w*br*0.3,w*br*0.15,-0.5,0,Math.PI*2);
            c.fillStyle='rgba(255,255,255,0.5)';c.fill();
        });
    }
    function drawPiano(c,w,h){
        const keys=['#ff6b6b','#ffa502','#ffd93d','#55efc4','#74b9ff','#a29bfe','#fd79a8'];
        const kw=w*0.11;
        keys.forEach((col,i)=>{
            const x=w*0.08+i*(kw+w*0.02);
            c.fillStyle=col;
            c.beginPath();
            c.roundRect(x,h*0.1,kw,h*0.55,0,0,w*0.02,w*0.02);
            c.fill();
            // Shadow
            c.fillStyle='rgba(0,0,0,0.1)';
            c.fillRect(x,h*0.5,kw,h*0.15);
        });
        // Music notes
        c.fillStyle='rgba(0,0,0,0.2)';
        c.font=(w*0.12)+'px serif';
        c.fillText('\u266A',w*0.2,h*0.85);
        c.fillText('\u266B',w*0.55,h*0.8);
    }
    function drawCobra(c,w,h){
        // Snake body
        c.strokeStyle='#55efc4';c.lineWidth=w*0.08;c.lineCap='round';
        c.beginPath();c.moveTo(w*0.15,h*0.55);c.bezierCurveTo(w*0.3,h*0.2,w*0.5,h*0.7,w*0.7,h*0.3);c.stroke();
        // Head
        c.fillStyle='#00b894';
        c.beginPath();c.arc(w*0.7,h*0.28,w*0.1,0,Math.PI*2);c.fill();
        // Eye
        c.fillStyle='white';c.beginPath();c.arc(w*0.73,h*0.25,w*0.04,0,Math.PI*2);c.fill();
        c.fillStyle='#2d3436';c.beginPath();c.arc(w*0.74,h*0.25,w*0.02,0,Math.PI*2);c.fill();
        // Tongue
        c.strokeStyle='#ff6b6b';c.lineWidth=2;
        c.beginPath();c.moveTo(w*0.78,h*0.28);c.lineTo(w*0.85,h*0.25);c.stroke();
        c.beginPath();c.moveTo(w*0.78,h*0.28);c.lineTo(w*0.85,h*0.31);c.stroke();
        // Apple
        c.fillStyle='#ff6b6b';c.beginPath();c.arc(w*0.3,h*0.6,w*0.08,0,Math.PI*2);c.fill();
        c.fillStyle='#27ae60';c.fillRect(w*0.29,h*0.5,w*0.02,h*0.04);
    }
    function drawPuzzle(c,w,h){
        const cols=['#ff6b6b','#ffd93d','#74b9ff','#55efc4'];
        const gap=3;
        cols.forEach((col,i)=>{
            const x=(i%2)*(w*0.42+gap)+w*0.08;
            const y=Math.floor(i/2)*(h*0.35+gap)+h*0.08;
            c.fillStyle=col;
            c.beginPath();c.roundRect(x,y,w*0.4,h*0.32,[w*0.04]);c.fill();
        });
        // Puzzle lines
        c.strokeStyle='rgba(255,255,255,0.6)';c.lineWidth=3;c.setLineDash([]);
        c.beginPath();c.moveTo(w*0.5,h*0.08);c.lineTo(w*0.5,h*0.75);c.stroke();
        c.beginPath();c.moveTo(w*0.08,h*0.42);c.lineTo(w*0.92,h*0.42);c.stroke();
    }
    function drawNumeros(c,w,h){
        c.font='bold '+(w*0.3)+'px sans-serif';c.textAlign='center';c.textBaseline='middle';
        c.fillStyle='#ff6b6b';c.fillText('1',w*0.25,h*0.3);
        c.fillStyle='#ffd93d';c.fillText('2',w*0.6,h*0.25);
        c.fillStyle='#74b9ff';c.fillText('3',w*0.4,h*0.55);
        // Small dots
        c.fillStyle='#55efc4';
        c.beginPath();c.arc(w*0.75,h*0.55,w*0.04,0,Math.PI*2);c.fill();
        c.beginPath();c.arc(w*0.8,h*0.45,w*0.04,0,Math.PI*2);c.fill();
        c.beginPath();c.arc(w*0.85,h*0.55,w*0.04,0,Math.PI*2);c.fill();
    }
    function drawIngles(c,w,h){
        c.font='bold '+(w*0.18)+'px sans-serif';c.textAlign='center';c.textBaseline='middle';
        // ABC blocks
        const letters=[{l:'A',x:0.22,y:0.25,col:'#ff6b6b'},{l:'B',x:0.5,y:0.3,col:'#ffd93d'},{l:'C',x:0.78,y:0.25,col:'#74b9ff'}];
        letters.forEach(({l,x,y,col})=>{
            c.fillStyle=col;c.beginPath();c.roundRect(w*x-w*0.12,h*y-w*0.12,w*0.24,w*0.24,[w*0.04]);c.fill();
            c.fillStyle='white';c.fillText(l,w*x,h*y+w*0.01);
        });
        // Small flag
        c.fillStyle='#e74c3c';c.fillRect(w*0.35,h*0.6,w*0.3,h*0.04);
        c.fillStyle='white';c.fillRect(w*0.35,h*0.64,w*0.3,h*0.04);

    function drawColorir(c,w,h){

    <script>
    // Calm children's lullaby using Web Audio API
    (function(){
        let audioCtx = null;
        let playing = false;
        let nextNoteTime = 0;
        let noteIndex = 0;
        let schedulerTimer = null;
        let gainNode = null;
        let masterGain = null;

        // Gentle pentatonic melody notes (frequencies in Hz)
        // C major pentatonic scale across octaves for a calm lullaby
        const C4=261.63,D4=293.66,E4=329.63,G4=392,A4=440;
        const C5=523.25,D5=587.33,E5=659.25,G5=784,A5=880;

        // Calm melody pattern - Twinkle Twinkle / lullaby feel
        const melody = [
            [C4,0.6],[C4,0.6],[G4,0.6],[G4,0.6],[A4,0.6],[A4,0.6],[G4,1.0],
            [E4,0.6],[E4,0.6],[D4,0.6],[D4,0.6],[C4,1.2],[0,0.4],
            [G4,0.6],[G4,0.6],[E4,0.6],[E4,0.6],[D4,0.6],[D4,0.6],[C4,1.0],
            [G4,0.6],[G4,0.6],[E4,0.6],[E4,0.6],[D4,0.6],[D4,0.6],[C4,1.0],[0,0.6],
            [C4,0.6],[E4,0.6],[G4,0.8],[E4,0.6],[C5,0.8],[A4,0.6],[G4,1.0],
            [E4,0.6],[D4,0.6],[C4,0.8],[D4,0.6],[E4,0.8],[C4,1.2],[0,0.6],
        ];

        function initAudio(){
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            masterGain = audioCtx.createGain();
            masterGain.gain.value = 0.12;
            masterGain.connect(audioCtx.destination);
        }

        function playNote(freq, duration, time){
            if(freq === 0) return; // rest

            // Soft sine wave
            const osc = audioCtx.createOscillator();
            osc.type = 'sine';
            osc.frequency.value = freq;

            const g = audioCtx.createGain();
            g.gain.setValueAtTime(0, time);
            g.gain.linearRampToValueAtTime(0.5, time + 0.08);
            g.gain.setValueAtTime(0.5, time + duration * 0.6);
            g.gain.linearRampToValueAtTime(0, time + duration * 0.95);

            osc.connect(g);
            g.connect(masterGain);

            osc.start(time);
            osc.stop(time + duration);

            // Soft harmony (octave above, very quiet)
            const osc2 = audioCtx.createOscillator();
            osc2.type = 'sine';
            osc2.frequency.value = freq * 2;

            const g2 = audioCtx.createGain();
            g2.gain.setValueAtTime(0, time);
            g2.gain.linearRampToValueAtTime(0.1, time + 0.1);
            g2.gain.setValueAtTime(0.1, time + duration * 0.5);
            g2.gain.linearRampToValueAtTime(0, time + duration * 0.9);

            osc2.connect(g2);
            g2.connect(masterGain);

            osc2.start(time);
            osc2.stop(time + duration);
        }

        function scheduler(){
            while(nextNoteTime < audioCtx.currentTime + 0.3){
                const [freq, dur] = melody[noteIndex % melody.length];
                playNote(freq, dur * 0.9, nextNoteTime);
                nextNoteTime += dur;
                noteIndex++;
            }
            schedulerTimer = setTimeout(scheduler, 100);
        }

        function startMusic(){
            if(!audioCtx) initAudio();
            if(audioCtx.state === 'suspended') audioCtx.resume();
            nextNoteTime = audioCtx.currentTime;
            noteIndex = 0;
            scheduler();
            playing = true;
            document.getElementById('musicBtn').textContent = '🔊';
            document.getElementById('musicBtn').classList.remove('off');
        }

        function stopMusic(){
            if(schedulerTimer) clearTimeout(schedulerTimer);
            schedulerTimer = null;
            playing = false;
            document.getElementById('musicBtn').textContent = '🔇';
            document.getElementById('musicBtn').classList.add('off');
        }

        document.getElementById('musicBtn').addEventListener('click', function(){
            if(playing) stopMusic();
            else startMusic();
        });
    })();
    </script>

    <!-- Stitch Canvas -->
    <canvas id="stitchCanvas" style="position:fixed;bottom:20px;left:0;width:100%;height:120px;z-index:7;"></canvas>

    <script>
    (function(){
        const sc = document.getElementById('stitchCanvas');
        const ctx = sc.getContext('2d');
        function resizeStitch(){ sc.width=window.innerWidth; sc.height=120; }
        resizeStitch();
        window.addEventListener('resize', resizeStitch);

        const stitch = {
            x: -60,
            dir: 1,
            speed: 1.2,
            walk: 0,
            blink: 0,
            blinkTimer: 150,
            earWiggle: 0,
            speechTimer: 0,
        };

        // Stitch real audio
        const stitchAudio = new Audio('stitch-hi.mp3');

        // Stitch voice - speech synthesis for Angel
        function stitchSay(text){
            if('speechSynthesis' in window){
                speechSynthesis.cancel();
                const u = new SpeechSynthesisUtterance(text);
                u.lang = 'pt-PT';
                u.pitch = 1.8;
                u.rate = 1.3;
                u.volume = 1;
                speechSynthesis.speak(u);
            }
        }

        function playStitchAudio(){
            stitchAudio.currentTime = 0;
            stitchAudio.play().catch(()=>{});
        }

        let hoverCooldown = false;

        // Click/tap on Stitch to show speech bubble + real audio
        sc.addEventListener('click', function(e){
            const rect = sc.getBoundingClientRect();
            const cx = (e.clientX - rect.left) * (sc.width / rect.width);
            const cy = (e.clientY - rect.top) * (sc.height / rect.height);
            const dx = cx - stitch.x;
            const dy = cy - 70;
            if(dx*dx + dy*dy < 40*40){
                stitch.speechTimer = 180;
                stitch.speechText = 'Hi!';
                playStitchAudio();
            }
        });

        // Hover over Stitch plays real audio
        sc.addEventListener('mousemove', function(e){
            const rect = sc.getBoundingClientRect();
            const cx = (e.clientX - rect.left) * (sc.width / rect.width);
            const cy = (e.clientY - rect.top) * (sc.height / rect.height);
            const dx = cx - stitch.x;
            const dy = cy - 70;
            if(dx*dx + dy*dy < 40*40){
                sc.style.cursor = 'pointer';
                if(!hoverCooldown && stitch.speechTimer <= 0){
                    hoverCooldown = true;
                    stitch.speechTimer = 150;
                    stitch.speechText = 'Olá primo!';
                    playStitchAudio();
                    setTimeout(()=>{ hoverCooldown = false; }, 5000);
                }
            } else {
                sc.style.cursor = 'default';
            }
        });

        function drawStitchBody(){
            stitch.walk += 0.07;
            stitch.earWiggle += 0.05;
            stitch.blinkTimer--;
            if(stitch.blinkTimer<=0){ stitch.blink=8; stitch.blinkTimer=120+Math.floor(Math.random()*200); }
            if(stitch.blink>0) stitch.blink--;

            stitch.x += stitch.speed * stitch.dir;
            if(stitch.dir===1 && stitch.x > sc.width+60){
                stitch.dir=-1; stitch.speed=0.8+Math.random()*0.6;
            } else if(stitch.dir===-1 && stitch.x < -60){
                stitch.dir=1; stitch.speed=0.8+Math.random()*0.6;
            }

            const bounce = Math.abs(Math.sin(stitch.walk*2))*4;
            const legSwing = Math.sin(stitch.walk*2)*5;
            const armSwing = Math.sin(stitch.walk*1.5)*0.3;
            const blinking = stitch.blink > 0;

            ctx.save();
            ctx.translate(stitch.x, 70 - bounce);
            if(stitch.dir===-1) ctx.scale(-1,1);

            // === LEGS ===
            // Left leg
            ctx.save();
            ctx.translate(-8, 18);
            ctx.rotate(legSwing*0.06);
            ctx.fillStyle='#2954a3';
            ctx.beginPath();
            ctx.ellipse(0,6,5,8,0,0,Math.PI*2);
            ctx.fill();
            // Foot
            ctx.fillStyle='#1e3f7a';
            ctx.beginPath();
            ctx.ellipse(2,14,7,4,0.2,0,Math.PI*2);
            ctx.fill();
            // Claws
            ctx.fillStyle='#ddd';
            for(let i=-1;i<=1;i++){
                ctx.beginPath();
                ctx.ellipse(6+i*3,16,1.5,2,0,0,Math.PI*2);
                ctx.fill();
            }
            ctx.restore();
            // Right leg
            ctx.save();
            ctx.translate(8, 18);
            ctx.rotate(-legSwing*0.06);
            ctx.fillStyle='#2954a3';
            ctx.beginPath();
            ctx.ellipse(0,6,5,8,0,0,Math.PI*2);
            ctx.fill();
            ctx.fillStyle='#1e3f7a';
            ctx.beginPath();
            ctx.ellipse(2,14,7,4,0.2,0,Math.PI*2);
            ctx.fill();
            ctx.fillStyle='#ddd';
            for(let i=-1;i<=1;i++){
                ctx.beginPath();
                ctx.ellipse(6+i*3,16,1.5,2,0,0,Math.PI*2);
                ctx.fill();
            }
            ctx.restore();

            // === BODY ===
            ctx.fillStyle='#2954a3';
            ctx.beginPath();
            ctx.ellipse(0,8,14,14,0,0,Math.PI*2);
            ctx.fill();

            // Belly patch (lighter blue)
            ctx.fillStyle='#6cb4ee';
            ctx.beginPath();
            ctx.ellipse(0,12,8,8,0,0,Math.PI*2);
            ctx.fill();

            // === ARMS ===
            // Left arm
            ctx.save();
            ctx.translate(-14, 2);
            ctx.rotate(-0.4+armSwing);
            ctx.fillStyle='#2954a3';
            ctx.beginPath();
            ctx.ellipse(0,8,4,10,0.1,0,Math.PI*2);
            ctx.fill();
            // Hand/claws
            ctx.fillStyle='#1e3f7a';
            ctx.beginPath();
            ctx.ellipse(-1,18,5,3,0,0,Math.PI*2);
            ctx.fill();
            ctx.restore();
            // Right arm
            ctx.save();
            ctx.translate(14, 2);
            ctx.rotate(0.4-armSwing);
            ctx.fillStyle='#2954a3';
            ctx.beginPath();
            ctx.ellipse(0,8,4,10,-0.1,0,Math.PI*2);
            ctx.fill();
            ctx.fillStyle='#1e3f7a';
            ctx.beginPath();
            ctx.ellipse(1,18,5,3,0,0,Math.PI*2);
            ctx.fill();
            ctx.restore();

            // === HEAD ===
            ctx.fillStyle='#2954a3';
            ctx.beginPath();
            ctx.ellipse(0,-10,16,14,0,0,Math.PI*2);
            ctx.fill();

            // === EARS (big floppy) ===
            const earW = Math.sin(stitch.earWiggle)*0.08;
            // Left ear
            ctx.save();
            ctx.translate(-12,-18);
            ctx.rotate(-0.8+earW);
            ctx.fillStyle='#2954a3';
            ctx.beginPath();
            ctx.ellipse(0,-14,7,18,0,0,Math.PI*2);
            ctx.fill();
            // Inner ear
            ctx.fillStyle='#d95ba3';
            ctx.beginPath();
            ctx.ellipse(0,-14,4,13,0,0,Math.PI*2);
            ctx.fill();
            // Ear notch
            ctx.fillStyle='#2954a3';
            ctx.beginPath();
            ctx.ellipse(0,-26,4,3,0,0,Math.PI*2);
            ctx.fill();
            ctx.restore();
            // Right ear
            ctx.save();
            ctx.translate(12,-18);
            ctx.rotate(0.8-earW);
            ctx.fillStyle='#2954a3';
            ctx.beginPath();
            ctx.ellipse(0,-14,7,18,0,0,Math.PI*2);
            ctx.fill();
            ctx.fillStyle='#d95ba3';
            ctx.beginPath();
            ctx.ellipse(0,-14,4,13,0,0,Math.PI*2);
            ctx.fill();
            ctx.fillStyle='#2954a3';
            ctx.beginPath();
            ctx.ellipse(0,-26,4,3,0,0,Math.PI*2);
            ctx.fill();
            ctx.restore();

            // === FACE ===
            // Eye area (lighter)
            ctx.fillStyle='#6cb4ee';
            ctx.beginPath();
            ctx.ellipse(0,-12,12,8,0,0,Math.PI*2);
            ctx.fill();

            // Eyes
            if(!blinking){
                // Left eye
                ctx.fillStyle='#111';
                ctx.beginPath();
                ctx.ellipse(-5,-12,3.5,4.5,0,0,Math.PI*2);
                ctx.fill();
                ctx.fillStyle='#fff';
                ctx.beginPath();
                ctx.arc(-4,-13.5,1.5,0,Math.PI*2);
                ctx.fill();
                // Right eye
                ctx.fillStyle='#111';
                ctx.beginPath();
                ctx.ellipse(5,-12,3.5,4.5,0,0,Math.PI*2);
                ctx.fill();
                ctx.fillStyle='#fff';
                ctx.beginPath();
                ctx.arc(6,-13.5,1.5,0,Math.PI*2);
                ctx.fill();
            } else {
                ctx.strokeStyle='#111';
                ctx.lineWidth=2;
                ctx.beginPath();
                ctx.moveTo(-8,-12); ctx.lineTo(-2,-12);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(2,-12); ctx.lineTo(8,-12);
                ctx.stroke();
            }

            // Nose
            ctx.fillStyle='#1e3f7a';
            ctx.beginPath();
            ctx.ellipse(0,-8,3,2,0,0,Math.PI*2);
            ctx.fill();

            // Mouth - big smile
            ctx.beginPath();
            ctx.arc(0,-5,7,0.15,Math.PI-0.15);
            ctx.strokeStyle='#1e3f7a';
            ctx.lineWidth=1.8;
            ctx.stroke();

            // Dark markings on back of head
            ctx.strokeStyle='#1a3d78';
            ctx.lineWidth=2;
            // Center stripe
            ctx.beginPath();
            ctx.moveTo(0,-24);
            ctx.quadraticCurveTo(0,-18,0,-10);
            ctx.stroke();

            ctx.restore();
        }

        // ===== ANGEL (LILO - pink Stitch) =====
        const angel = {
            x: sc.width + 60,
            dir: -1,
            speed: 1.0,
            walk: 0,
            blink: 0,
            blinkTimer: 180,
            earWiggle: 0,
            speechTimer: 0,
            speechText: '',
        };

        let angelHoverCooldown = false;

        sc.addEventListener('click', function(e){
            const rect = sc.getBoundingClientRect();
            const cx = (e.clientX - rect.left) * (sc.width / rect.width);
            const cy = (e.clientY - rect.top) * (sc.height / rect.height);
            const dx = cx - angel.x;
            const dy = cy - 70;
            if(dx*dx + dy*dy < 40*40){
                angel.speechTimer = 180;
                angel.speechText = 'Olá, sou a Angel!';
                stitchSay('Olá, sou a Angel!');
            }
        });

        sc.addEventListener('mousemove', function(e){
            const rect = sc.getBoundingClientRect();
            const cx = (e.clientX - rect.left) * (sc.width / rect.width);
            const cy = (e.clientY - rect.top) * (sc.height / rect.height);
            const dx = cx - angel.x;
            const dy = cy - 70;
            if(dx*dx + dy*dy < 40*40){
                sc.style.cursor = 'pointer';
                if(!angelHoverCooldown && angel.speechTimer <= 0){
                    angelHoverCooldown = true;
                    angel.speechTimer = 150;
                    angel.speechText = 'Olá primo!';
                    stitchSay('Olá primo!');
                    setTimeout(()=>{ angelHoverCooldown = false; }, 5000);
                }
            }
        });

        function drawAngel(){
            angel.walk += 0.07;
            angel.earWiggle += 0.05;
            angel.blinkTimer--;
            if(angel.blinkTimer<=0){ angel.blink=8; angel.blinkTimer=120+Math.floor(Math.random()*200); }
            if(angel.blink>0) angel.blink--;

            angel.x += angel.speed * angel.dir;
            if(angel.dir===1 && angel.x > sc.width+60){
                angel.dir=-1; angel.speed=0.7+Math.random()*0.5;
            } else if(angel.dir===-1 && angel.x < -60){
                angel.dir=1; angel.speed=0.7+Math.random()*0.5;
            }

            const bounce = Math.abs(Math.sin(angel.walk*2))*4;
            const legSwing = Math.sin(angel.walk*2)*5;
            const armSwing = Math.sin(angel.walk*1.5)*0.3;
            const blinking = angel.blink > 0;

            const mainColor = '#d94f9e';
            const darkColor = '#a83279';
            const lightColor = '#f0a0cc';
            const bellyColor = '#f5c6de';
            const innerEar = '#f7d26b';

            ctx.save();
            ctx.translate(angel.x, 70 - bounce);
            if(angel.dir===-1) ctx.scale(-1,1);

            // Legs
            ctx.save();
            ctx.translate(-8, 18);
            ctx.rotate(legSwing*0.06);
            ctx.fillStyle=mainColor;
            ctx.beginPath(); ctx.ellipse(0,6,5,8,0,0,Math.PI*2); ctx.fill();
            ctx.fillStyle=darkColor;
            ctx.beginPath(); ctx.ellipse(2,14,7,4,0.2,0,Math.PI*2); ctx.fill();
            ctx.fillStyle='#ddd';
            for(let i=-1;i<=1;i++){ ctx.beginPath(); ctx.ellipse(6+i*3,16,1.5,2,0,0,Math.PI*2); ctx.fill(); }
            ctx.restore();
            ctx.save();
            ctx.translate(8, 18);
            ctx.rotate(-legSwing*0.06);
            ctx.fillStyle=mainColor;
            ctx.beginPath(); ctx.ellipse(0,6,5,8,0,0,Math.PI*2); ctx.fill();
            ctx.fillStyle=darkColor;
            ctx.beginPath(); ctx.ellipse(2,14,7,4,0.2,0,Math.PI*2); ctx.fill();
            ctx.fillStyle='#ddd';
            for(let i=-1;i<=1;i++){ ctx.beginPath(); ctx.ellipse(6+i*3,16,1.5,2,0,0,Math.PI*2); ctx.fill(); }
            ctx.restore();

            // Body
            ctx.fillStyle=mainColor;
            ctx.beginPath(); ctx.ellipse(0,8,14,14,0,0,Math.PI*2); ctx.fill();
            ctx.fillStyle=bellyColor;
            ctx.beginPath(); ctx.ellipse(0,12,8,8,0,0,Math.PI*2); ctx.fill();

            // Arms
            ctx.save();
            ctx.translate(-14, 2); ctx.rotate(-0.4+armSwing);
            ctx.fillStyle=mainColor;
            ctx.beginPath(); ctx.ellipse(0,8,4,10,0.1,0,Math.PI*2); ctx.fill();
            ctx.fillStyle=darkColor;
            ctx.beginPath(); ctx.ellipse(-1,18,5,3,0,0,Math.PI*2); ctx.fill();
            ctx.restore();
            ctx.save();
            ctx.translate(14, 2); ctx.rotate(0.4-armSwing);
            ctx.fillStyle=mainColor;
            ctx.beginPath(); ctx.ellipse(0,8,4,10,-0.1,0,Math.PI*2); ctx.fill();
            ctx.fillStyle=darkColor;
            ctx.beginPath(); ctx.ellipse(1,18,5,3,0,0,Math.PI*2); ctx.fill();
            ctx.restore();

            // Head
            ctx.fillStyle=mainColor;
            ctx.beginPath(); ctx.ellipse(0,-10,16,14,0,0,Math.PI*2); ctx.fill();

            // Ears
            const earW = Math.sin(angel.earWiggle)*0.08;
            ctx.save();
            ctx.translate(-12,-18); ctx.rotate(-0.8+earW);
            ctx.fillStyle=mainColor;
            ctx.beginPath(); ctx.ellipse(0,-14,7,18,0,0,Math.PI*2); ctx.fill();
            ctx.fillStyle=innerEar;
            ctx.beginPath(); ctx.ellipse(0,-14,4,13,0,0,Math.PI*2); ctx.fill();
            ctx.fillStyle=mainColor;
            ctx.beginPath(); ctx.ellipse(0,-26,4,3,0,0,Math.PI*2); ctx.fill();
            ctx.restore();
            ctx.save();
            ctx.translate(12,-18); ctx.rotate(0.8-earW);
            ctx.fillStyle=mainColor;
            ctx.beginPath(); ctx.ellipse(0,-14,7,18,0,0,Math.PI*2); ctx.fill();
            ctx.fillStyle=innerEar;
            ctx.beginPath(); ctx.ellipse(0,-14,4,13,0,0,Math.PI*2); ctx.fill();
            ctx.fillStyle=mainColor;
            ctx.beginPath(); ctx.ellipse(0,-26,4,3,0,0,Math.PI*2); ctx.fill();
            ctx.restore();

            // Face
            ctx.fillStyle=bellyColor;
            ctx.beginPath(); ctx.ellipse(0,-12,12,8,0,0,Math.PI*2); ctx.fill();

            // Eyes
            if(!blinking){
                ctx.fillStyle='#111';
                ctx.beginPath(); ctx.ellipse(-5,-12,3.5,4.5,0,0,Math.PI*2); ctx.fill();
                ctx.fillStyle='#fff';
                ctx.beginPath(); ctx.arc(-4,-13.5,1.5,0,Math.PI*2); ctx.fill();
                ctx.fillStyle='#111';
                ctx.beginPath(); ctx.ellipse(5,-12,3.5,4.5,0,0,Math.PI*2); ctx.fill();
                ctx.fillStyle='#fff';
                ctx.beginPath(); ctx.arc(6,-13.5,1.5,0,Math.PI*2); ctx.fill();
            } else {
                ctx.strokeStyle='#111'; ctx.lineWidth=2;
                ctx.beginPath(); ctx.moveTo(-8,-12); ctx.lineTo(-2,-12); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(2,-12); ctx.lineTo(8,-12); ctx.stroke();
            }

            // Eyelashes (longer, more feminine)
            ctx.strokeStyle='#111'; ctx.lineWidth=1;
            for(let i=-1;i<=1;i++){
                ctx.beginPath(); ctx.moveTo(-6+i*2,-18); ctx.lineTo(-7+i*2.5,-22); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(6+i*2,-18); ctx.lineTo(7+i*2.5,-22); ctx.stroke();
            }

            // Nose
            ctx.fillStyle=darkColor;
            ctx.beginPath(); ctx.ellipse(0,-8,3,2,0,0,Math.PI*2); ctx.fill();

            // Mouth
            ctx.beginPath(); ctx.arc(0,-5,7,0.15,Math.PI-0.15);
            ctx.strokeStyle=darkColor; ctx.lineWidth=1.8; ctx.stroke();

            // Head marking
            ctx.strokeStyle='#b03d80'; ctx.lineWidth=2;
            ctx.beginPath(); ctx.moveTo(0,-24); ctx.quadraticCurveTo(0,-18,0,-10); ctx.stroke();

            // Antenna/curl on top (distinguishes Angel)
            ctx.strokeStyle=mainColor; ctx.lineWidth=3;
            ctx.beginPath();
            ctx.moveTo(0,-24);
            ctx.quadraticCurveTo(-8,-34,-3,-38);
            ctx.quadraticCurveTo(4,-40,2,-32);
            ctx.stroke();
            ctx.fillStyle=lightColor;
            ctx.beginPath(); ctx.arc(-1,-37,3,0,Math.PI*2); ctx.fill();

            ctx.restore();

            // Speech bubble for Angel
            if(angel.speechTimer > 0){
                angel.speechTimer--;
                const alpha = angel.speechTimer < 20 ? angel.speechTimer/20 : 1;
                const bx = angel.x;
                const by = 70 - bounce;
                const bubbleY = by - 55;
                const text = angel.speechText || 'Olá, sou a Angel!';

                ctx.save();
                ctx.globalAlpha = alpha;
                ctx.fillStyle = '#fff';
                ctx.strokeStyle = '#d94f9e';
                ctx.lineWidth = 2;
                ctx.beginPath();
                const bw = 110, bh = 32, br = 10;
                ctx.roundRect(bx - bw/2, bubbleY - bh/2, bw, bh, br);
                ctx.fill(); ctx.stroke();

                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.moveTo(bx - 6, bubbleY + bh/2 - 2);
                ctx.lineTo(bx, bubbleY + bh/2 + 10);
                ctx.lineTo(bx + 6, bubbleY + bh/2 - 2);
                ctx.closePath(); ctx.fill();
                ctx.beginPath();
                ctx.moveTo(bx - 6, bubbleY + bh/2 - 1);
                ctx.lineTo(bx, bubbleY + bh/2 + 10);
                ctx.lineTo(bx + 6, bubbleY + bh/2 - 1);
                ctx.strokeStyle = '#d94f9e'; ctx.lineWidth = 2; ctx.stroke();
                ctx.fillStyle = '#fff';
                ctx.fillRect(bx - 7, bubbleY + bh/2 - 4, 14, 5);

                ctx.fillStyle = '#d94f9e';
                ctx.font = 'bold 14px "Segoe UI", Arial, sans-serif';
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText(text, bx, bubbleY);
                ctx.restore();
            }
        }

        function drawAll(){
            ctx.clearRect(0,0,sc.width,sc.height);
            drawStitchBody();
            drawAngel();

            // Stitch speech bubble
            if(stitch.speechTimer > 0){
                stitch.speechTimer--;
                const alpha = stitch.speechTimer < 20 ? stitch.speechTimer/20 : 1;
                const bounce = Math.abs(Math.sin(stitch.walk*2))*4;
                const bx = stitch.x;
                const by = 70 - bounce;
                const bubbleY = by - 55;
                const text = stitch.speechText || 'Olá, sou o Stitch!';

                ctx.save();
                ctx.globalAlpha = alpha;
                ctx.fillStyle = '#fff';
                ctx.strokeStyle = '#2954a3';
                ctx.lineWidth = 2;
                ctx.beginPath();
                const bw = 110, bh = 32, br = 10;
                ctx.roundRect(bx - bw/2, bubbleY - bh/2, bw, bh, br);
                ctx.fill(); ctx.stroke();

                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.moveTo(bx - 6, bubbleY + bh/2 - 2);
                ctx.lineTo(bx, bubbleY + bh/2 + 10);
                ctx.lineTo(bx + 6, bubbleY + bh/2 - 2);
                ctx.closePath(); ctx.fill();
                ctx.beginPath();
                ctx.moveTo(bx - 6, bubbleY + bh/2 - 1);
                ctx.lineTo(bx, bubbleY + bh/2 + 10);
                ctx.lineTo(bx + 6, bubbleY + bh/2 - 1);
                ctx.strokeStyle = '#2954a3'; ctx.lineWidth = 2; ctx.stroke();
                ctx.fillStyle = '#fff';
                ctx.fillRect(bx - 7, bubbleY + bh/2 - 4, 14, 5);

                ctx.fillStyle = '#2954a3';
                ctx.font = 'bold 14px "Segoe UI", Arial, sans-serif';
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText(text, bx, bubbleY);
                ctx.restore();
            }

            requestAnimationFrame(drawAll);
        }

        drawAll();
    })();
    </script>

    <script>
        // Worm animation - each spot has its own worm hidden by overflow
        const spots = document.querySelectorAll('.worm-spot');
        let lastSpot = -1;

        function peekWorm() {
            // Pick a different spot
            let next;
            do { next = Math.floor(Math.random() * spots.length); }
            while (next === lastSpot);
            lastSpot = next;

            const spot = spots[next];

            // Activate: hole opens + worm peeks
            spot.classList.add('active');

            // Remove after animation ends (hole closes + worm hidden)
            setTimeout(() => {
                spot.classList.remove('active');
            }, 3100);

            // Next peek
            setTimeout(peekWorm, 3800 + Math.random() * 2500);
        }

        setTimeout(peekWorm, 1500);
    </script>
</body>
