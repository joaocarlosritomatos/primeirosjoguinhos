<!DOCTYPE html>
<html><head><title>Gerar Icones</title></head>
<body>
<h2>Clica no botao para gerar os icones PNG</h2>
<button onclick="generate()">Gerar Icones</button>
<div id="output"></div>
<script>
function generate() {
    const sizes = [152, 167, 180, 192, 512];
    const output = document.getElementById('output');
    output.innerHTML = '';

    sizes.forEach(size => {
        const canvas = document.createElement('canvas');
        canvas.width = size;
        canvas.height = size;
        const c = canvas.getContext('2d');

        // Background gradient
        const grad = c.createLinearGradient(0, 0, size, size);
        grad.addColorStop(0, '#a8edea');
        grad.addColorStop(0.5, '#fed6e3');
        grad.addColorStop(1, '#ffd89b');

        // Rounded rect
        const r = size * 0.195;
        c.beginPath();
        c.moveTo(r, 0);
        c.lineTo(size - r, 0);
        c.quadraticCurveTo(size, 0, size, r);
        c.lineTo(size, size - r);
        c.quadraticCurveTo(size, size, size - r, size);
        c.lineTo(r, size);
        c.quadraticCurveTo(0, size, 0, size - r);
        c.lineTo(0, r);
        c.quadraticCurveTo(0, 0, r, 0);
        c.closePath();
        c.fillStyle = grad;
        c.fill();

        // Emojis
        c.textAlign = 'center';
        c.textBaseline = 'middle';
        c.font = `${size * 0.28}px serif`;
        c.fillText('\u{1F436}', size * 0.5, size * 0.32);
        c.font = `${size * 0.2}px serif`;
        c.fillText('\u{1F431}', size * 0.3, size * 0.62);
        c.fillText('\u{1F42E}', size * 0.7, size * 0.62);
        c.font = `${size * 0.13}px serif`;
        c.fillText('\u{1F438}\u{1F981}\u{1F434}', size * 0.5, size * 0.85);

        // Download link
        const link = document.createElement('a');
        link.download = `icon-${size}x${size}.png`;
        link.href = canvas.toDataURL('image/png');
        link.textContent = `Descarregar icon-${size}x${size}.png`;
        link.style.display = 'block';
        link.style.margin = '10px';
        link.style.fontSize = '18px';
        output.appendChild(link);
        output.appendChild(canvas);
        canvas.style.display = 'block';
        canvas.style.margin = '10px';
        canvas.style.border = '1px solid #ccc';
    });
}
</script>
</body>
</html>
