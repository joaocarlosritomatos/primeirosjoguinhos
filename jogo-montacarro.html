<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Monta o Carro - Primeiros Joguinhos</title>
    <meta name="description" content="Arrasta as peças para construir o carro! Jogo infantil educativo para crianças 2-4 anos.">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#74b9ff">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;}
        body {
            overflow:hidden;
            background:linear-gradient(180deg,#a8edea 0%,#fed6e3 60%,#b8e994 100%);
            min-height:100vh;min-height:100dvh;
            font-family:'Segoe UI',sans-serif;
            touch-action:none;
        }
        canvas{display:block;width:100vw;height:100vh;height:100dvh;position:absolute;top:0;left:0;}
        .home-btn{
            position:fixed;top:10px;left:10px;z-index:20;
            width:42px;height:42px;border-radius:50%;border:none;
            background:rgba(255,255,255,0.6);font-size:20px;cursor:pointer;
            display:flex;align-items:center;justify-content:center;text-decoration:none;
        }
        .hud{
            position:fixed;top:12px;right:16px;z-index:20;
            display:flex;gap:14px;align-items:center;
        }
        .hud-item{
            padding:6px 14px;border-radius:20px;
            background:rgba(255,255,255,0.5);
            font-size:clamp(14px,3.5vw,18px);font-weight:800;
            color:#2d3436;
        }
        .msg{
            position:fixed;top:40%;left:50%;transform:translate(-50%,-50%);
            z-index:30;font-size:clamp(24px,6vw,42px);font-weight:900;
            color:white;text-shadow:3px 3px 0 rgba(0,0,0,0.25);
            text-align:center;pointer-events:none;
            animation:msg-pop 2.5s ease-out forwards;
        }
        @keyframes msg-pop{
            0%{opacity:0;transform:translate(-50%,-50%) scale(0.5) rotate(-10deg)}
            20%{opacity:1;transform:translate(-50%,-50%) scale(1.15) rotate(5deg)}
            40%{transform:translate(-50%,-50%) scale(1) rotate(0)}
            80%{opacity:1}
            100%{opacity:0;transform:translate(-50%,-70%) scale(0.9)}
        }
        .confetti{
            position:fixed;pointer-events:none;z-index:25;
            font-size:32px;animation:confetti-fall 1.8s ease-out forwards;
        }
        @keyframes confetti-fall{
            0%{opacity:1;transform:translate(0,0) scale(0.5) rotate(0deg)}
            100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(1.2) rotate(var(--rot))}
        }
        .instruction{
            position:fixed;bottom:16px;left:50%;transform:translateX(-50%);
            z-index:15;padding:10px 22px;border-radius:24px;
            background:rgba(255,255,255,0.85);
            font-size:clamp(13px,3vw,16px);font-weight:700;color:#2d3436;
            box-shadow:0 4px 10px rgba(0,0,0,0.1);
            pointer-events:none;
            text-align:center;
            max-width:92vw;
        }
    </style>
</head>
<body>
    <a href="index.html" class="home-btn">🏠</a>
    <div class="hud">
        <span class="hud-item" id="carsBuilt">🚗 0</span>
    </div>
    <canvas id="c"></canvas>
    <div class="instruction" id="instruction">Arrasta as peças para o sítio certo! 🔧</div>

    <script>
    (function(){
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        let W, H, dpr;
        let carsBuilt = 0;
        let carDriving = false;
        let driveX = 0;
        let nextCarTimer = 0;

        // ===== AUDIO =====
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        let actx;
        function ensureAudio(){
            if(!actx) actx = new AudioCtx();
            if(actx.state==='suspended') actx.resume();
        }

        function playPop(){
            ensureAudio();const t=actx.currentTime;
            const o=actx.createOscillator(),g=actx.createGain();
            o.type='sine';
            o.frequency.setValueAtTime(600,t);
            o.frequency.exponentialRampToValueAtTime(1200,t+0.1);
            g.gain.setValueAtTime(0.2,t);
            g.gain.exponentialRampToValueAtTime(0.001,t+0.2);
            o.connect(g).connect(actx.destination);
            o.start(t);o.stop(t+0.25);
        }
        function playSnap(){
            ensureAudio();const t=actx.currentTime;
            [800,1200].forEach((f,i)=>{
                const o=actx.createOscillator(),g=actx.createGain();
                o.type='triangle';o.frequency.value=f;
                g.gain.setValueAtTime(0.15,t+i*0.05);
                g.gain.exponentialRampToValueAtTime(0.001,t+i*0.05+0.15);
                o.connect(g).connect(actx.destination);
                o.start(t+i*0.05);o.stop(t+i*0.05+0.2);
            });
        }
        function playWrong(){
            ensureAudio();const t=actx.currentTime;
            const o=actx.createOscillator(),g=actx.createGain();
            o.type='sawtooth';o.frequency.value=180;
            o.frequency.exponentialRampToValueAtTime(90,t+0.2);
            g.gain.setValueAtTime(0.08,t);
            g.gain.exponentialRampToValueAtTime(0.001,t+0.25);
            o.connect(g).connect(actx.destination);
            o.start(t);o.stop(t+0.3);
        }
        function playHorn(){
            ensureAudio();const t=actx.currentTime;
            [0, 0.28].forEach(d=>{
                const o=actx.createOscillator(),g=actx.createGain();
                o.type='square';o.frequency.value=380;
                const o2=actx.createOscillator(),g2=actx.createGain();
                o2.type='square';o2.frequency.value=300;
                g.gain.setValueAtTime(0.12,t+d);
                g.gain.linearRampToValueAtTime(0,t+d+0.22);
                g2.gain.setValueAtTime(0.1,t+d);
                g2.gain.linearRampToValueAtTime(0,t+d+0.22);
                o.connect(g).connect(actx.destination);
                o2.connect(g2).connect(actx.destination);
                o.start(t+d);o.stop(t+d+0.25);
                o2.start(t+d);o2.stop(t+d+0.25);
            });
        }
        function playEngine(){
            ensureAudio();const t=actx.currentTime;
            const o=actx.createOscillator(),g=actx.createGain();
            o.type='sawtooth';
            o.frequency.setValueAtTime(80,t);
            o.frequency.exponentialRampToValueAtTime(180,t+1.2);
            g.gain.setValueAtTime(0.1,t);
            g.gain.setValueAtTime(0.1,t+1.0);
            g.gain.exponentialRampToValueAtTime(0.001,t+1.4);
            o.connect(g).connect(actx.destination);
            o.start(t);o.stop(t+1.5);
        }
        function playWin(){
            ensureAudio();const t=actx.currentTime;
            [523,659,784,1047,1319].forEach((f,i)=>{
                const o=actx.createOscillator(),g=actx.createGain();
                o.type='triangle';o.frequency.value=f;
                g.gain.setValueAtTime(0.15,t+i*0.1);
                g.gain.exponentialRampToValueAtTime(0.001,t+i*0.1+0.3);
                o.connect(g).connect(actx.destination);
                o.start(t+i*0.1);o.stop(t+i*0.1+0.35);
            });
        }
        function speak(text){
            if('speechSynthesis' in window){
                speechSynthesis.cancel();
                const u = new SpeechSynthesisUtterance(text);
                u.lang='pt-PT';u.rate=0.95;u.pitch=1.1;u.volume=1;
                speechSynthesis.speak(u);
            }
        }

        // ===== CANVAS SETUP =====
        function resize(){
            dpr = window.devicePixelRatio || 1;
            W = window.innerWidth;
            H = window.innerHeight;
            canvas.width = W*dpr;
            canvas.height = H*dpr;
            canvas.style.width = W+'px';
            canvas.style.height = H+'px';
            ctx.setTransform(dpr,0,0,dpr,0,0);
            if(!carDriving) setupCar();
        }

        // ===== CAR TYPES =====
        const carTypes = [
            {
                name: 'carro vermelho',
                body: '#e74c3c', dark: '#a93226', shade: '#c0392b',
                hasStripe: false
            },
            {
                name: 'carro azul',
                body: '#3498db', dark: '#1f618d', shade: '#2874a6',
                hasStripe: false
            },
            {
                name: 'taxi amarelo',
                body: '#f1c40f', dark: '#b9770e', shade: '#d4ac0d',
                hasStripe: true, stripeColor: '#000'
            },
            {
                name: 'carrinha verde',
                body: '#27ae60', dark: '#196f3d', shade: '#229954',
                hasStripe: false
            },
            {
                name: 'carro rosa',
                body: '#ff6b9d', dark: '#c2185b', shade: '#e84393',
                hasStripe: false
            },
            {
                name: 'carro de corrida',
                body: '#9b59b6', dark: '#6c3483', shade: '#884ea0',
                hasStripe: true, stripeColor: '#fff'
            }
        ];

        // ===== GAME STATE =====
        let car = null;      // current car
        let parts = [];      // draggable parts
        let centerX, centerY, S;

        function setupCar(){
            const carIdx = carsBuilt % carTypes.length;
            car = { ...carTypes[carIdx] };

            centerX = W/2;
            centerY = H*0.42;
            S = Math.min(W, H) * 0.12;
            if(S < 60) S = 60;
            if(S > 110) S = 110;

            // Define part slots (relative to carCenter)
            // All parts: wheels, windshield, door, headlight
            parts = [
                {
                    id: 'wheel1', type: 'wheel',
                    slotX: centerX - S*0.8, slotY: centerY + S*0.55,
                    r: S*0.3,
                    placed: false
                },
                {
                    id: 'wheel2', type: 'wheel',
                    slotX: centerX + S*0.8, slotY: centerY + S*0.55,
                    r: S*0.3,
                    placed: false
                },
                {
                    id: 'windshield', type: 'windshield',
                    slotX: centerX - S*0.15, slotY: centerY - S*0.5,
                    r: S*0.45,
                    placed: false
                },
                {
                    id: 'door', type: 'door',
                    slotX: centerX + S*0.25, slotY: centerY + S*0.1,
                    r: S*0.35,
                    placed: false
                },
                {
                    id: 'headlight', type: 'headlight',
                    slotX: centerX + S*1.2, slotY: centerY + S*0.15,
                    r: S*0.15,
                    placed: false
                }
            ];

            // Shuffle + place parts in a tray below the car
            const trayY = H * 0.78;
            const shuffled = [...parts].sort(()=>Math.random()-0.5);
            const spacing = Math.min(W/6, S*1.6);
            const startX = W/2 - spacing*2;

            shuffled.forEach((p, i) => {
                const realPart = parts.find(x => x.id === p.id);
                realPart.x = startX + i*spacing;
                realPart.y = trayY;
                realPart.startX = realPart.x;
                realPart.startY = realPart.y;
                realPart.dragging = false;
                realPart.wobble = Math.random()*Math.PI*2;
                realPart.scale = 1;
                realPart.justPlaced = 0;
            });

            carDriving = false;
            driveX = 0;
        }

        // ===== DRAWING =====
        function drawBackground(){
            // Sky
            const sky = ctx.createLinearGradient(0,0,0,H*0.7);
            sky.addColorStop(0, '#a8edea');
            sky.addColorStop(1, '#fed6e3');
            ctx.fillStyle = sky;
            ctx.fillRect(0, 0, W, H*0.7);

            // Sun
            ctx.fillStyle = '#ffd93d';
            ctx.beginPath();
            ctx.arc(W*0.88, H*0.12, W*0.045, 0, Math.PI*2);
            ctx.fill();
            ctx.globalAlpha = 0.3;
            ctx.beginPath();
            ctx.arc(W*0.88, H*0.12, W*0.08, 0, Math.PI*2);
            ctx.fill();
            ctx.globalAlpha = 1;

            // Clouds
            ctx.fillStyle = 'rgba(255,255,255,0.85)';
            drawCloud(W*0.15, H*0.1, Math.max(30, W*0.05));
            drawCloud(W*0.6, H*0.18, Math.max(25, W*0.04));

            // Grass/ground
            ctx.fillStyle = '#8ecc59';
            ctx.fillRect(0, H*0.7, W, H*0.3);
            // Grass blades
            ctx.strokeStyle = '#6dab3c';
            ctx.lineWidth = 2;
            for(let i=0; i<50; i++){
                const gx = (i/50)*W + Math.sin(i*5)*20;
                const gy = H*0.7 + 4;
                ctx.beginPath();
                ctx.moveTo(gx, gy);
                ctx.lineTo(gx+2, gy-8);
                ctx.stroke();
            }

            // Road
            ctx.fillStyle = '#4a4a4a';
            ctx.fillRect(0, H*0.66, W, H*0.12);
            ctx.fillStyle = '#3d3d3d';
            ctx.fillRect(0, H*0.66, W, 3);
            ctx.fillRect(0, H*0.78-3, W, 3);
            // Road dashes
            ctx.fillStyle = '#fff';
            const dashY = H*0.72;
            for(let i=0; i<10; i++){
                ctx.fillRect(i*W/10 + W*0.02, dashY, W*0.05, 4);
            }

            // Tray background (part shelf)
            const trayGrad = ctx.createLinearGradient(0, H*0.78, 0, H);
            trayGrad.addColorStop(0, 'rgba(255,255,255,0.35)');
            trayGrad.addColorStop(1, 'rgba(255,255,255,0.65)');
            ctx.fillStyle = trayGrad;
            ctx.fillRect(0, H*0.82, W, H*0.18);
        }

        function drawCloud(x, y, r){
            ctx.beginPath();
            ctx.arc(x, y, r, 0, Math.PI*2);
            ctx.arc(x+r*0.8, y-r*0.1, r*0.9, 0, Math.PI*2);
            ctx.arc(x+r*1.6, y, r*0.8, 0, Math.PI*2);
            ctx.arc(x+r*0.4, y+r*0.2, r*0.7, 0, Math.PI*2);
            ctx.fill();
        }

        // ----- Draw empty car chassis -----
        function drawCarChassis(offsetX){
            offsetX = offsetX || 0;
            const cx = centerX + offsetX;
            const cy = centerY;

            ctx.save();

            // Shadow
            ctx.fillStyle = 'rgba(0,0,0,0.2)';
            ctx.beginPath();
            ctx.ellipse(cx, cy + S*0.95, S*1.5, S*0.12, 0, 0, Math.PI*2);
            ctx.fill();

            // Main body (lower)
            ctx.fillStyle = car.body;
            ctx.strokeStyle = car.dark;
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.roundRect(cx - S*1.3, cy - S*0.2, S*2.6, S*0.8, [S*0.15]);
            ctx.fill();
            ctx.stroke();

            // Cabin (upper) - curved
            ctx.beginPath();
            ctx.moveTo(cx - S*0.8, cy - S*0.2);
            ctx.quadraticCurveTo(cx - S*0.65, cy - S*0.75, cx - S*0.25, cy - S*0.8);
            ctx.lineTo(cx + S*0.5, cy - S*0.8);
            ctx.quadraticCurveTo(cx + S*0.85, cy - S*0.75, cx + S*1.0, cy - S*0.2);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();

            // Shadow under cabin
            ctx.fillStyle = car.shade;
            ctx.beginPath();
            ctx.ellipse(cx, cy - S*0.25, S*0.9, S*0.05, 0, 0, Math.PI*2);
            ctx.fill();

            // Stripe
            if(car.hasStripe){
                ctx.fillStyle = car.stripeColor;
                if(car.stripeColor === '#fff'){
                    // Racing stripe (horizontal across)
                    ctx.fillRect(cx - S*1.3, cy - S*0.05, S*2.6, S*0.15);
                } else {
                    // Taxi checker
                    for(let i=0; i<9; i++){
                        if(i%2===0){
                            ctx.fillRect(cx - S*1.3 + i*S*0.29, cy + S*0.25, S*0.15, S*0.08);
                        } else {
                            ctx.fillRect(cx - S*1.3 + i*S*0.29, cy + S*0.33, S*0.15, S*0.08);
                        }
                    }
                }
            }

            // Tail light
            ctx.fillStyle = '#e74c3c';
            ctx.strokeStyle = car.dark;
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.ellipse(cx - S*1.2, cy + S*0.1, S*0.1, S*0.12, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.stroke();

            // === EMPTY SLOTS (shown where parts go) ===
            parts.forEach(p => {
                if(p.placed) return;
                drawEmptySlot(p);
            });

            ctx.restore();
        }

        function drawEmptySlot(p){
            const glow = Math.abs(Math.sin(performance.now()/400));
            ctx.save();
            ctx.translate(p.slotX, p.slotY);

            if(p.type === 'wheel'){
                // Dashed circle for wheel slot
                ctx.strokeStyle = `rgba(255,255,255,${0.4+glow*0.4})`;
                ctx.lineWidth = 3;
                ctx.setLineDash([8, 6]);
                ctx.beginPath();
                ctx.arc(0, 0, p.r, 0, Math.PI*2);
                ctx.stroke();
                ctx.setLineDash([]);
                // Semi-transparent hole
                ctx.fillStyle = 'rgba(0,0,0,0.2)';
                ctx.beginPath();
                ctx.arc(0, 0, p.r*0.85, 0, Math.PI*2);
                ctx.fill();
            } else if(p.type === 'windshield'){
                ctx.strokeStyle = `rgba(255,255,255,${0.4+glow*0.4})`;
                ctx.lineWidth = 3;
                ctx.setLineDash([8, 6]);
                ctx.beginPath();
                ctx.moveTo(-S*0.4, S*0.3);
                ctx.quadraticCurveTo(-S*0.25, -S*0.25, 0, -S*0.3);
                ctx.lineTo(S*0.4, -S*0.3);
                ctx.lineTo(S*0.4, S*0.3);
                ctx.closePath();
                ctx.stroke();
                ctx.setLineDash([]);
                ctx.fillStyle = 'rgba(255,255,255,0.15)';
                ctx.fill();
            } else if(p.type === 'door'){
                ctx.strokeStyle = `rgba(255,255,255,${0.4+glow*0.4})`;
                ctx.lineWidth = 3;
                ctx.setLineDash([8, 6]);
                ctx.beginPath();
                ctx.roundRect(-S*0.3, -S*0.3, S*0.6, S*0.6, [S*0.05]);
                ctx.stroke();
                ctx.setLineDash([]);
                ctx.fillStyle = 'rgba(0,0,0,0.12)';
                ctx.fill();
            } else if(p.type === 'headlight'){
                ctx.strokeStyle = `rgba(255,255,255,${0.4+glow*0.4})`;
                ctx.lineWidth = 3;
                ctx.setLineDash([6, 4]);
                ctx.beginPath();
                ctx.ellipse(0, 0, p.r, p.r*0.9, 0, 0, Math.PI*2);
                ctx.stroke();
                ctx.setLineDash([]);
                ctx.fillStyle = 'rgba(0,0,0,0.12)';
                ctx.fill();
            }
            ctx.restore();
        }

        function drawPart(p, x, y, isGhost){
            ctx.save();
            ctx.translate(x, y);

            // Scale pop-in when just placed
            if(p.justPlaced > 0){
                const t = p.justPlaced / 20;
                const s = 1 + Math.sin(t*Math.PI)*0.25;
                ctx.scale(s, s);
                p.justPlaced--;
            } else if(p.dragging){
                ctx.scale(1.1, 1.1);
                // Shadow below
                ctx.save();
                ctx.translate(0, p.r*0.6);
                ctx.scale(1, 0.25);
                ctx.fillStyle = 'rgba(0,0,0,0.25)';
                ctx.beginPath();
                ctx.arc(0, 0, p.r*0.9, 0, Math.PI*2);
                ctx.fill();
                ctx.restore();
            }

            if(isGhost) ctx.globalAlpha = 0.7;

            if(p.type === 'wheel'){
                drawWheel(0, 0, p.r);
            } else if(p.type === 'windshield'){
                drawWindshield();
            } else if(p.type === 'door'){
                drawDoor();
            } else if(p.type === 'headlight'){
                drawHeadlight(p.r);
            }

            ctx.restore();
        }

        function drawWheel(x, y, r){
            // Outer tire
            ctx.fillStyle = '#1a1a1a';
            ctx.beginPath();
            ctx.arc(x, y, r, 0, Math.PI*2);
            ctx.fill();
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 2;
            ctx.stroke();
            // Tread marks
            ctx.strokeStyle = '#2c2c2c';
            ctx.lineWidth = 1.5;
            for(let i=0; i<10; i++){
                const a = (i/10)*Math.PI*2;
                const x1 = x + Math.cos(a)*r*0.8;
                const y1 = y + Math.sin(a)*r*0.8;
                const x2 = x + Math.cos(a)*r*0.95;
                const y2 = y + Math.sin(a)*r*0.95;
                ctx.beginPath();
                ctx.moveTo(x1, y1);
                ctx.lineTo(x2, y2);
                ctx.stroke();
            }
            // Inner rim
            ctx.fillStyle = '#bdc3c7';
            ctx.beginPath();
            ctx.arc(x, y, r*0.55, 0, Math.PI*2);
            ctx.fill();
            ctx.strokeStyle = '#7f8c8d';
            ctx.lineWidth = 1.5;
            ctx.stroke();
            // Spokes
            ctx.strokeStyle = '#7f8c8d';
            ctx.lineWidth = 3;
            ctx.lineCap = 'round';
            for(let i=0; i<5; i++){
                const a = (i/5)*Math.PI*2;
                ctx.beginPath();
                ctx.moveTo(x, y);
                ctx.lineTo(x + Math.cos(a)*r*0.5, y + Math.sin(a)*r*0.5);
                ctx.stroke();
            }
            // Center cap
            ctx.fillStyle = '#2c3e50';
            ctx.beginPath();
            ctx.arc(x, y, r*0.15, 0, Math.PI*2);
            ctx.fill();
            // Highlight
            ctx.fillStyle = 'rgba(255,255,255,0.4)';
            ctx.beginPath();
            ctx.arc(x - r*0.3, y - r*0.3, r*0.12, 0, Math.PI*2);
            ctx.fill();
        }

        function drawWindshield(){
            ctx.fillStyle = '#aed6f1';
            ctx.strokeStyle = '#1f618d';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(-S*0.4, S*0.3);
            ctx.quadraticCurveTo(-S*0.25, -S*0.25, 0, -S*0.3);
            ctx.lineTo(S*0.4, -S*0.3);
            ctx.lineTo(S*0.4, S*0.3);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();
            // Reflection
            ctx.fillStyle = 'rgba(255,255,255,0.6)';
            ctx.beginPath();
            ctx.moveTo(-S*0.3, S*0.2);
            ctx.quadraticCurveTo(-S*0.2, -S*0.1, -S*0.05, -S*0.2);
            ctx.lineTo(-S*0.1, S*0.25);
            ctx.closePath();
            ctx.fill();
        }

        function drawDoor(){
            // Door in the car body color
            ctx.fillStyle = car.body;
            ctx.strokeStyle = car.dark;
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.roundRect(-S*0.3, -S*0.3, S*0.6, S*0.6, [S*0.05]);
            ctx.fill();
            ctx.stroke();
            // Window
            ctx.fillStyle = '#aed6f1';
            ctx.beginPath();
            ctx.roundRect(-S*0.22, -S*0.25, S*0.44, S*0.25, [S*0.03]);
            ctx.fill();
            ctx.strokeStyle = car.dark;
            ctx.lineWidth = 2;
            ctx.stroke();
            // Handle
            ctx.fillStyle = car.dark;
            ctx.beginPath();
            ctx.roundRect(-S*0.12, S*0.08, S*0.2, S*0.05, [S*0.02]);
            ctx.fill();
        }

        function drawHeadlight(r){
            // Outer rim
            ctx.fillStyle = '#ecf0f1';
            ctx.strokeStyle = '#34495e';
            ctx.lineWidth = 2.5;
            ctx.beginPath();
            ctx.ellipse(0, 0, r, r*0.95, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.stroke();
            // Yellow glow inside
            const grad = ctx.createRadialGradient(-r*0.2, -r*0.2, 0, 0, 0, r);
            grad.addColorStop(0, '#fffde7');
            grad.addColorStop(0.5, '#f9e79f');
            grad.addColorStop(1, '#f4d03f');
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.ellipse(0, 0, r*0.78, r*0.73, 0, 0, Math.PI*2);
            ctx.fill();
            // Sparkle
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.ellipse(-r*0.3, -r*0.3, r*0.15, r*0.1, -0.4, 0, Math.PI*2);
            ctx.fill();
        }

        // ===== PLACED PART DRAWING (on chassis) =====
        function drawPlacedParts(offsetX){
            offsetX = offsetX || 0;
            parts.forEach(p => {
                if(!p.placed) return;
                drawPart(p, p.slotX + offsetX, p.slotY, false);
            });
        }

        // ===== DRAG HANDLING =====
        let dragPart = null;
        let dragOffsetX = 0, dragOffsetY = 0;

        function getPointerPos(e){
            const rect = canvas.getBoundingClientRect();
            return {
                x: e.clientX - rect.left,
                y: e.clientY - rect.top
            };
        }

        function hitTestPart(px, py){
            // Only tray parts (unplaced, non-dragging) are grabbable
            // Reverse iterate so topmost drawn gets clicked first
            for(let i=parts.length-1; i>=0; i--){
                const p = parts[i];
                if(p.placed) continue;
                const dx = px - p.x;
                const dy = py - p.y;
                const hitR = Math.max(p.r, S*0.35);
                if(Math.sqrt(dx*dx + dy*dy) < hitR){
                    return p;
                }
            }
            return null;
        }

        canvas.addEventListener('pointerdown', e=>{
            e.preventDefault();
            ensureAudio();
            if(carDriving) return;
            const pos = getPointerPos(e);
            const p = hitTestPart(pos.x, pos.y);
            if(p){
                dragPart = p;
                p.dragging = true;
                dragOffsetX = pos.x - p.x;
                dragOffsetY = pos.y - p.y;
                playPop();
                try{ canvas.setPointerCapture(e.pointerId); }catch(_){}
            }
        });

        canvas.addEventListener('pointermove', e=>{
            if(!dragPart) return;
            e.preventDefault();
            const pos = getPointerPos(e);
            dragPart.x = pos.x - dragOffsetX;
            dragPart.y = pos.y - dragOffsetY;
        });

        function releasePart(){
            if(!dragPart) return;
            const p = dragPart;
            p.dragging = false;

            // Check if close to its slot
            const dx = p.x - p.slotX;
            const dy = p.y - p.slotY;
            const dist = Math.sqrt(dx*dx + dy*dy);
            const threshold = p.r + S*0.2;

            if(dist < threshold){
                // SNAP into place
                p.placed = true;
                p.x = p.slotX;
                p.y = p.slotY;
                p.justPlaced = 20;
                playSnap();

                // Check if all placed
                if(parts.every(pp => pp.placed)){
                    setTimeout(carComplete, 400);
                }
            } else {
                // Return to tray with animation (we'll just set it back)
                playWrong();
                animateReturn(p);
            }
            dragPart = null;
        }
        canvas.addEventListener('pointerup', e=>{e.preventDefault(); releasePart();});
        canvas.addEventListener('pointercancel', e=>{e.preventDefault(); releasePart();});
        canvas.addEventListener('pointerleave', e=>{e.preventDefault(); releasePart();});

        function animateReturn(p){
            // Tween back to startX/startY over 15 frames
            const fromX = p.x, fromY = p.y;
            const toX = p.startX, toY = p.startY;
            let t = 0;
            const steps = 15;
            function step(){
                t++;
                const k = t/steps;
                const ease = 1 - Math.pow(1-k, 3);
                p.x = fromX + (toX - fromX)*ease;
                p.y = fromY + (toY - fromY)*ease;
                if(t < steps) requestAnimationFrame(step);
                else { p.x = toX; p.y = toY; }
            }
            step();
        }

        // ===== CAR COMPLETE =====
        function carComplete(){
            playWin();
            playHorn();
            carsBuilt++;
            document.getElementById('carsBuilt').textContent = '🚗 '+carsBuilt;

            // Confetti
            for(let i=0; i<30; i++){
                setTimeout(()=>{
                    const el = document.createElement('div');
                    el.className = 'confetti';
                    el.textContent = ['🎉','⭐','✨','🎊','💫'][Math.floor(Math.random()*5)];
                    el.style.left = (centerX + (Math.random()-0.5)*S*3) + 'px';
                    el.style.top = centerY + 'px';
                    const angle = Math.random()*Math.PI*2;
                    const dist = 150 + Math.random()*200;
                    el.style.setProperty('--tx', Math.cos(angle)*dist + 'px');
                    el.style.setProperty('--ty', (Math.sin(angle)*dist - 100) + 'px');
                    el.style.setProperty('--rot', (Math.random()*720-360) + 'deg');
                    document.body.appendChild(el);
                    setTimeout(()=>el.remove(), 1800);
                }, i*30);
            }

            // Celebratory message
            const msgs = ['Fantastico!', 'Carro pronto!', 'Muito bem!', 'Bora rodar!', 'Genial!'];
            const el = document.createElement('div');
            el.className = 'msg';
            el.textContent = msgs[Math.floor(Math.random()*msgs.length)];
            document.body.appendChild(el);
            setTimeout(()=>el.remove(), 2500);

            setTimeout(()=> speak(car.name), 500);

            // After a delay, start driving
            setTimeout(()=>{
                carDriving = true;
                driveX = 0;
                playEngine();
            }, 1500);
        }

        // ===== MAIN LOOP =====
        function frame(){
            ctx.clearRect(0, 0, W, H);
            drawBackground();

            if(carDriving){
                driveX += 6;
                drawCarChassis(driveX);
                drawPlacedParts(driveX);

                // Smoke puffs behind
                if(Math.floor(driveX/20) % 3 === 0){
                    const smokeX = centerX - S*1.4 + driveX;
                    const smokeY = centerY + S*0.5 + (Math.random()-0.5)*10;
                    ctx.fillStyle = 'rgba(200,200,200,0.5)';
                    ctx.beginPath();
                    ctx.arc(smokeX, smokeY, 6+Math.random()*4, 0, Math.PI*2);
                    ctx.fill();
                }

                // When off screen, setup next car
                if(centerX + driveX - S*1.5 > W){
                    nextCarTimer++;
                    if(nextCarTimer > 30){
                        nextCarTimer = 0;
                        setupCar();
                    }
                }
            } else {
                // Draw chassis first (with slots)
                drawCarChassis();
                // Draw placed parts on chassis
                drawPlacedParts();

                // Draw tray/unplaced parts
                parts.forEach(p => {
                    if(!p.placed){
                        p.wobble += 0.03;
                        const yOff = p.dragging ? 0 : Math.sin(p.wobble)*2;
                        drawPart(p, p.x, p.y + yOff, false);
                    }
                });

                // Draw dragging part on top
                if(dragPart){
                    // already drawn above via iteration; bring to top
                    drawPart(dragPart, dragPart.x, dragPart.y, false);
                }
            }

            requestAnimationFrame(frame);
        }

        // ===== INIT =====
        resize();
        window.addEventListener('resize', resize);
        frame();

        document.addEventListener('gesturestart', e=>e.preventDefault());
        document.addEventListener('dblclick', e=>e.preventDefault());
        document.addEventListener('touchend', ensureAudio, {once:true});
        document.addEventListener('click', ensureAudio, {once:true});
    })();
    </script>
</body>
</html>
