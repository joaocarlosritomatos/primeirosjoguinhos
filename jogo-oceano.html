<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Limpa o Oceano - Primeiros Joguinhos</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0984e3">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;}
        body {
            overflow:hidden;
            background:linear-gradient(180deg,#74b9ff 0%,#0984e3 25%,#0652DD 50%,#1B1464 100%);
            min-height:100vh;min-height:100dvh;
            font-family:'Segoe UI',sans-serif;
            touch-action:none;
        }
        canvas{display:block;width:100vw;height:100vh;height:100dvh;}
        .home-btn{
            position:fixed;top:10px;left:10px;z-index:20;
            width:42px;height:42px;border-radius:50%;border:none;
            background:rgba(255,255,255,0.2);font-size:20px;cursor:pointer;
            display:flex;align-items:center;justify-content:center;text-decoration:none;
        }
        .hud{
            position:fixed;top:12px;right:16px;z-index:20;
            display:flex;gap:14px;align-items:center;
        }
        .hud-item{
            font-size:clamp(16px,4vw,22px);font-weight:800;
            color:white;text-shadow:1px 1px 0 rgba(0,0,0,0.3);
        }
        .msg{
            position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
            z-index:30;font-size:clamp(20px,5vw,32px);font-weight:900;
            color:white;text-shadow:2px 2px 0 rgba(0,0,0,0.3);
            text-align:center;pointer-events:none;
            animation:msg-pop 2s ease-out forwards;
        }
        @keyframes msg-pop{
            0%{opacity:0;transform:translate(-50%,-50%) scale(0.5)}
            15%{opacity:1;transform:translate(-50%,-50%) scale(1.1)}
            30%{transform:translate(-50%,-50%) scale(1)}
            70%{opacity:1}
            100%{opacity:0;transform:translate(-50%,-60%)}
        }
        .particle{
            position:fixed;pointer-events:none;z-index:25;
            font-size:20px;animation:p-fly 1s ease-out forwards;
        }
        @keyframes p-fly{
            0%{opacity:1;transform:translate(0,0) scale(1)}
            100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(0.3)}
        }
        .level-complete{
            position:fixed;inset:0;z-index:50;
            background:rgba(0,0,0,0.5);backdrop-filter:blur(5px);
            display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;
            opacity:0;pointer-events:none;transition:opacity 0.3s;
        }
        .level-complete.show{opacity:1;pointer-events:all;}
        .lc-emoji{font-size:80px;}
        .lc-text{font-size:clamp(24px,6vw,36px);font-weight:900;color:white;text-shadow:2px 2px 0 rgba(0,0,0,0.3);}
        .lc-sub{font-size:clamp(14px,3.5vw,18px);color:rgba(255,255,255,0.7);font-weight:600;}
        .lc-btn{
            padding:14px 40px;border:none;border-radius:50px;
            background:#55efc4;color:#2d3436;font-size:clamp(16px,4vw,22px);
            font-weight:800;cursor:pointer;margin-top:8px;
        }
        .lc-btn:active{transform:scale(0.93);}
        .ios-unlock{position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.6);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;cursor:pointer;backdrop-filter:blur(5px);}.ios-unlock-emoji{font-size:80px;animation:ios-bounce 1s ease-in-out infinite;}.ios-unlock-text{font-size:24px;font-weight:800;color:white;text-shadow:2px 2px 0 rgba(0,0,0,0.2);}@keyframes ios-bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
    </style>
</head>
<body>
<div class="ios-unlock" id="iosUnlock"><div class="ios-unlock-emoji">🌊</div><div class="ios-unlock-text">Toca para comecar!</div></div>
    <a href="index.html" class="home-btn">🏠</a>
    <div class="hud">
        <span class="hud-item" id="trashCount">🗑️ 0</span>
        <span class="hud-item" id="levelDisplay">Nivel 1</span>
    </div>
    <canvas id="c"></canvas>

    <div class="level-complete" id="levelComplete">
        <div class="lc-emoji">🐬</div>
        <div class="lc-text" id="lcText">Oceano mais limpo!</div>
        <div class="lc-sub" id="lcSub">Removeste todo o lixo!</div>
        <button class="lc-btn" id="lcBtn">Proximo nivel!</button>
    </div>

    <script>
        const canvas = document.getElementById('c');
        const c = canvas.getContext('2d');
        let W, H, dpr;

        // Audio
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        let ctx;
        function ensureAudio(){if(!ctx)ctx=new AudioCtx();if(ctx.state==='suspended')ctx.resume();}

        function playClean(){
            ensureAudio();const t=ctx.currentTime;
            [500,700,900].forEach((f,i)=>{
                const o=ctx.createOscillator(),g=ctx.createGain();
                o.type='sine';o.frequency.value=f;
                g.gain.setValueAtTime(0.15,t+i*0.08);g.gain.exponentialRampToValueAtTime(0.001,t+i*0.08+0.2);
                o.connect(g).connect(ctx.destination);o.start(t+i*0.08);o.stop(t+i*0.08+0.25);
            });
        }
        function playWrong(){
            ensureAudio();const t=ctx.currentTime;
            const o=ctx.createOscillator(),g=ctx.createGain();
            o.type='sawtooth';o.frequency.value=150;
            g.gain.setValueAtTime(0.08,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.15);
            o.connect(g).connect(ctx.destination);o.start(t);o.stop(t+0.2);
        }
        function playWin(){
            ensureAudio();const t=ctx.currentTime;
            [523,659,784,1047].forEach((f,i)=>{
                const o=ctx.createOscillator(),g=ctx.createGain();
                o.type='sine';o.frequency.value=f;
                g.gain.setValueAtTime(0.18,t+i*0.15);g.gain.exponentialRampToValueAtTime(0.001,t+i*0.15+0.4);
                o.connect(g).connect(ctx.destination);o.start(t+i*0.15);o.stop(t+i*0.15+0.45);
            });
        }

        function resize(){
            dpr=window.devicePixelRatio||1;
            W=window.innerWidth;H=window.innerHeight;
            canvas.width=W*dpr;canvas.height=H*dpr;
            canvas.style.width=W+'px';canvas.style.height=H+'px';
            c.setTransform(dpr,0,0,dpr,0,0);
        }
        resize();window.addEventListener('resize',resize);

        // ===== GAME STATE =====
        let level = 1;
        let trashCollected = 0;
        let totalTrashCollected = 0;
        let animals = [];
        let trash = [];
        let plants = [];
        let bubbles = [];
        let ripples = [];
        let lightRays = [];

        // ===== DEFINITIONS =====
        const trashTypes = [
            { emoji: '🥤', name: 'copo' },
            { emoji: '🧴', name: 'garrafa' },
            { emoji: '👜', name: 'saco' },
            { emoji: '🥫', name: 'lata' },
            { emoji: '📦', name: 'caixa' },
            { emoji: '🩴', name: 'chinelo' },
            { emoji: '🔋', name: 'pilha' },
            { emoji: '📱', name: 'telemovel' },
            { emoji: '👟', name: 'sapato' },
            { emoji: '🛞', name: 'pneu' },
        ];

        const animalTypes = [
            { type:'fish', speed:1.2, size:40, color:'#ff6b6b', fin:'#ee5a24', stripe:'#ff9f9f' },
            { type:'fish', speed:1.5, size:35, color:'#ffd93d', fin:'#f9a825', stripe:'#fff3a0' },
            { type:'fish', speed:1.0, size:45, color:'#74b9ff', fin:'#0984e3', stripe:'#a0d4ff' },
            { type:'fish', speed:0.8, size:38, color:'#55efc4', fin:'#00b894', stripe:'#80ffdb' },
            { type:'fish', speed:1.3, size:42, color:'#a29bfe', fin:'#6c5ce7', stripe:'#c8c5ff' },
            { type:'fish', speed:0.9, size:50, color:'#fd79a8', fin:'#e84393', stripe:'#ffb0cd' },
            { type:'fish', speed:1.1, size:36, color:'#ffa502', fin:'#e67e22', stripe:'#ffc860' },
            { type:'shark', speed:1.8, size:80, color:'#636e72', fin:'#4a5568', belly:'#b2bec3' },
            { type:'shark', speed:2.2, size:90, color:'#4a5568', fin:'#2d3436', belly:'#a0aab0' },
            { type:'turtle', speed:0.5, size:50, color:'#27ae60', shell:'#2ecc71', skin:'#6ab04c' },
            { type:'jellyfish', speed:0.3, size:45, color:'#c39bff', tentacles:'#a855f7' },
            { type:'jellyfish', speed:0.25, size:35, color:'#93e8ff', tentacles:'#38bdf8' },
            { type:'crab', speed:0.35, size:35, color:'#e74c3c', legs:'#c0392b', bottom:true },
            { type:'octopus', speed:0.5, size:55, color:'#e84393', spots:'#fd79a8' },
            { type:'whale', speed:0.8, size:110, color:'#2980b9', belly:'#74b9ff' },
            { type:'pufferfish', speed:0.6, size:40, color:'#ffd93d', spines:'#f39c12' },
        ];

        const plantTypesDef = [
            { type:'seaweed', colors:['#27ae60','#2ecc71','#1abc9c'] },
            { type:'seaweed', colors:['#16a085','#1abc9c','#0e8c6e'] },
            { type:'seaweed', colors:['#6ab04c','#78e08f','#55a03a'] },
            { type:'coral_branch', colors:['#e74c3c','#ff6b6b','#c0392b'] },
            { type:'coral_branch', colors:['#e84393','#fd79a8','#c0357a'] },
            { type:'coral_branch', colors:['#f39c12','#ffd93d','#e67e22'] },
            { type:'coral_round', colors:['#ff6b6b','#ff9f9f','#ee5a24'] },
            { type:'coral_round', colors:['#a29bfe','#c8c5ff','#6c5ce7'] },
            { type:'coral_round', colors:['#fdcb6e','#ffeaa7','#f39c12'] },
            { type:'anemone', colors:['#e84393','#fd79a8','#c0357a'] },
            { type:'anemone', colors:['#00b894','#55efc4','#009974'] },
            { type:'kelp', colors:['#2d5a1e','#3d7a35','#4a8c3f'] },
            { type:'rock', colors:['#636e72','#7a8a8e','#4a5568'] },
            { type:'starfish', colors:['#e67e22','#f39c12','#d35400'] },
            { type:'shell', colors:['#ffeaa7','#fdcb6e','#f9ca24'] },
        ];

        // ===== SPAWN FUNCTIONS =====
        function spawnAnimal(){
            const type = animalTypes[Math.floor(Math.random()*animalTypes.length)];
            const fromLeft = Math.random() > 0.5;
            const baseY = type.bottom ? H - 50 - Math.random()*30 : 80 + Math.random()*(H-200);
            const a = {
                ...type,
                x: fromLeft ? -type.size*2 : W + type.size*2,
                y: baseY,
                baseY: baseY,
                dir: fromLeft ? 1 : -1,
                // Organic movement
                wobble: Math.random()*Math.PI*2,
                wobbleAmp: 8 + Math.random()*15,           // vertical wave amplitude
                wobbleSpeed: 0.015 + Math.random()*0.025,  // vertical wave speed
                // Speed variation
                baseSpeed: type.speed,
                speedPhase: Math.random()*Math.PI*2,
                speedVar: 0.3 + Math.random()*0.4,         // speed varies +-30-70%
                // Body tilt (rotation)
                tilt: 0,
                tiltTarget: 0,
                // Curiosity: sometimes pause and look around
                pauseTimer: 200 + Math.floor(Math.random()*400),
                isPaused: false,
                pauseDuration: 0,
                // Scale breathing
                scalePhase: Math.random()*Math.PI*2,
                // Vertical drift - slowly change depth
                driftTarget: baseY,
                driftTimer: 100 + Math.floor(Math.random()*200),
            };
            animals.push(a);
        }

        function spawnTrash(){
            const type = trashTypes[Math.floor(Math.random()*trashTypes.length)];
            trash.push({
                ...type,
                x: 30 + Math.random()*(W-60),
                y: -30 - Math.random()*60,
                r: 38 + Math.random()*18,
                bobble: Math.random()*Math.PI*2,
                bobbleSpeed: 0.01 + Math.random()*0.015,
                sinkSpeed: 0.3 + Math.random()*0.4,
                wobbleAmp: 15 + Math.random()*20,
                wobbleSpeed: 0.008 + Math.random()*0.008,
                startX: 0,
                rot: (Math.random()-0.5)*0.5,
                opacity: 1,
                removing: false,
                sunk: false,
            });
            trash[trash.length-1].startX = trash[trash.length-1].x;
        }

        function spawnPlants(){
            plants = [];
            const count = 15 + Math.floor(Math.random()*10);
            for(let i=0;i<count;i++){
                const def = plantTypesDef[Math.floor(Math.random()*plantTypesDef.length)];
                plants.push({
                    ...def,
                    x: 15 + Math.random()*(W-30),
                    y: H - 15,
                    size: 30 + Math.random()*35,
                    sway: Math.random()*Math.PI*2,
                    swaySpeed: 0.008 + Math.random()*0.012,
                    segments: 4 + Math.floor(Math.random()*4), // for seaweed/kelp
                    branches: 3 + Math.floor(Math.random()*3), // for coral
                    tentacles: 6 + Math.floor(Math.random()*6), // for anemone
                });
            }
            // Sort by y so further back renders first
            plants.sort((a,b)=>a.size - b.size);
        }

        function spawnBubble(){
            bubbles.push({
                x: 20 + Math.random()*(W-40),
                y: H + 10,
                r: 2 + Math.random()*4,
                speed: 0.3 + Math.random()*0.8,
                wobble: Math.random()*Math.PI*2,
            });
        }

        function initLightRays(){
            lightRays = [];
            for(let i=0;i<4;i++){
                lightRays.push({
                    x: Math.random()*W,
                    width: 30 + Math.random()*60,
                    opacity: 0.03 + Math.random()*0.04,
                    speed: 0.1 + Math.random()*0.2,
                });
            }
        }

        // ===== INIT LEVEL =====
        function initLevel(){
            animals = [];
            trash = [];
            trashCollected = 0;
            document.getElementById('trashCount').textContent = '🗑️ 0';
            document.getElementById('levelDisplay').textContent = 'Nivel ' + level;
            document.getElementById('levelComplete').classList.remove('show');

            const trashCount = 4 + level * 2;
            for(let i=0;i<trashCount;i++){
                spawnTrash();
                // Stagger: each piece starts higher so they fall one by one
                trash[trash.length-1].y = -30 - i * 80 - Math.random()*40;
            }

            const animalCount = 3 + level;
            for(let i=0;i<animalCount;i++) spawnAnimal();

            spawnPlants();
            initLightRays();
        }

        // ===== CLICK/TOUCH =====
        function spawnCleanParticles(x,y){
            const emojis=['✨','💫','⭐','🌟','💚'];
            for(let i=0;i<6;i++){
                const el=document.createElement('div');
                el.className='particle';
                el.textContent=emojis[Math.floor(Math.random()*emojis.length)];
                const angle=(Math.PI*2*i)/6;
                const dist=40+Math.random()*30;
                el.style.left=x+'px';el.style.top=y+'px';
                el.style.setProperty('--tx',Math.cos(angle)*dist+'px');
                el.style.setProperty('--ty',Math.sin(angle)*dist+'px');
                document.body.appendChild(el);
                setTimeout(()=>el.remove(),1000);
            }
        }

        function showMsg(text){
            const el=document.createElement('div');
            el.className='msg';el.textContent=text;
            document.body.appendChild(el);
            setTimeout(()=>el.remove(),2000);
        }

        canvas.addEventListener('pointerdown',(e)=>{
            e.preventDefault();
            const rect=canvas.getBoundingClientRect();
            const px=e.clientX-rect.left;
            const py=e.clientY-rect.top;

            // Check if clicked an animal (wrong!)
            for(let i=animals.length-1;i>=0;i--){
                const a=animals[i];
                const dx=px-a.x;
                const dy=py-a.y;
                if(Math.sqrt(dx*dx+dy*dy)<a.size){
                    playWrong();
                    showMsg('Nao! Esse e um animal! 🐟');
                    a.speed *= 3;
                    return;
                }
            }
        });

        // Next level button
        document.getElementById('lcBtn').addEventListener('pointerdown',(e)=>{
            e.preventDefault();
            level++;
            initLevel();
        });

        // ===== DRAWING =====
        function drawBackground(){
            // Water gradient is done by CSS, draw sand at bottom
            c.fillStyle='#f0d9a0';
            c.beginPath();
            c.moveTo(0,H-15);
            // Wavy sand
            for(let x=0;x<=W;x+=20){
                c.lineTo(x,H-15+Math.sin(x*0.05)*5);
            }
            c.lineTo(W,H);c.lineTo(0,H);
            c.closePath();c.fill();

            // Sand details
            c.fillStyle='#e6c98a';
            for(let i=0;i<8;i++){
                const sx=Math.sin(i*4.7)*W*0.4+W*0.5;
                c.beginPath();
                c.arc(sx,H-8+Math.sin(i*2.3)*3,2+Math.sin(i)*2,0,Math.PI*2);
                c.fill();
            }
        }

        function drawLightRays(){
            lightRays.forEach(ray=>{
                ray.x+=ray.speed;
                if(ray.x>W+ray.width)ray.x=-ray.width;
                c.save();
                c.globalAlpha=ray.opacity;
                c.fillStyle='#ffffff';
                c.beginPath();
                c.moveTo(ray.x,0);
                c.lineTo(ray.x+ray.width*0.3,0);
                c.lineTo(ray.x+ray.width,H);
                c.lineTo(ray.x+ray.width*0.7,H);
                c.closePath();c.fill();
                c.restore();
            });
        }

        function drawBubbles(){
            if(Math.random()<0.03) spawnBubble();
            for(let i=bubbles.length-1;i>=0;i--){
                const b=bubbles[i];
                b.y-=b.speed;
                b.wobble+=0.03;
                b.x+=Math.sin(b.wobble)*0.3;
                if(b.y<-10){bubbles.splice(i,1);continue;}

                c.save();
                c.globalAlpha=0.4;
                c.beginPath();
                c.arc(b.x,b.y,b.r,0,Math.PI*2);
                c.strokeStyle='rgba(255,255,255,0.6)';
                c.lineWidth=1;
                c.stroke();
                // Highlight
                c.beginPath();
                c.arc(b.x-b.r*0.3,b.y-b.r*0.3,b.r*0.25,0,Math.PI*2);
                c.fillStyle='rgba(255,255,255,0.5)';
                c.fill();
                c.restore();
            }
        }

        function drawPlants(){
            plants.forEach(p=>{
                p.sway+=p.swaySpeed;
                const S=p.size;
                const sw=Math.sin(p.sway);
                c.save();
                c.translate(p.x,p.y);

                if(p.type==='seaweed'){
                    // Wavy seaweed strands
                    for(let strand=-1;strand<=1;strand++){
                        c.beginPath();
                        c.moveTo(strand*S*0.08,0);
                        let cx=strand*S*0.08;
                        for(let seg=0;seg<p.segments;seg++){
                            const segH=-S*0.2*(seg+1);
                            const wave=Math.sin(p.sway+seg*0.8+strand)*S*0.12;
                            cx+=wave*0.3;
                            c.quadraticCurveTo(cx+wave,segH+S*0.1,cx,segH);
                        }
                        c.strokeStyle=p.colors[Math.abs(strand)];
                        c.lineWidth=S*0.08;
                        c.lineCap='round';
                        c.stroke();
                        // Leaf blobs along strand
                        for(let seg=1;seg<p.segments;seg++){
                            const leafY=-S*0.2*seg;
                            const leafX=cx+Math.sin(p.sway+seg)*S*0.08;
                            c.beginPath();
                            c.ellipse(leafX+strand*S*0.06,leafY,S*0.07,S*0.04,sw*0.3+strand,0,Math.PI*2);
                            c.fillStyle=p.colors[2]||p.colors[0];
                            c.globalAlpha=0.7;
                            c.fill();
                            c.globalAlpha=1;
                        }
                    }

                } else if(p.type==='coral_branch'){
                    // Branching coral
                    for(let b=0;b<p.branches;b++){
                        const angle=-Math.PI/2 + (b-p.branches/2+0.5)*0.4 + sw*0.05;
                        const len=S*0.5+b*S*0.08;
                        c.save();
                        c.rotate(angle+Math.PI/2);
                        // Main branch
                        c.beginPath();
                        c.moveTo(0,0);
                        c.lineTo(0,-len);
                        c.strokeStyle=p.colors[0];
                        c.lineWidth=S*0.07;
                        c.lineCap='round';
                        c.stroke();
                        // Sub branches
                        for(let sb=1;sb<=2;sb++){
                            const subY=-len*sb*0.4;
                            const subAngle=(sb%2===0?1:-1)*0.5+Math.sin(p.sway+b+sb)*0.1;
                            c.save();
                            c.translate(0,subY);
                            c.rotate(subAngle);
                            c.beginPath();
                            c.moveTo(0,0);
                            c.lineTo(0,-len*0.3);
                            c.strokeStyle=p.colors[1];
                            c.lineWidth=S*0.04;
                            c.stroke();
                            // Tip blob
                            c.beginPath();
                            c.arc(0,-len*0.3,S*0.05,0,Math.PI*2);
                            c.fillStyle=p.colors[1];
                            c.fill();
                            c.restore();
                        }
                        // Tip
                        c.beginPath();
                        c.arc(0,-len,S*0.06,0,Math.PI*2);
                        c.fillStyle=p.colors[1];
                        c.fill();
                        c.restore();
                    }

                } else if(p.type==='coral_round'){
                    // Round brain/cushion coral
                    const pulse=1+Math.sin(p.sway*0.5)*0.03;
                    // Base
                    c.beginPath();
                    c.ellipse(0,-S*0.2,S*0.4*pulse,S*0.25*pulse,0,0,Math.PI*2);
                    c.fillStyle=p.colors[0];
                    c.fill();
                    // Bumps
                    for(let b=0;b<6;b++){
                        const bAngle=(Math.PI*2*b)/6+sw*0.05;
                        const bx=Math.cos(bAngle)*S*0.22;
                        const by=-S*0.2+Math.sin(bAngle)*S*0.13;
                        c.beginPath();
                        c.arc(bx,by,S*0.1*pulse,0,Math.PI*2);
                        c.fillStyle=p.colors[1];
                        c.globalAlpha=0.5;
                        c.fill();
                        c.globalAlpha=1;
                    }
                    // Texture lines
                    c.beginPath();
                    c.ellipse(0,-S*0.2,S*0.25*pulse,S*0.15*pulse,0,0,Math.PI*2);
                    c.strokeStyle=p.colors[2]||p.colors[0];
                    c.lineWidth=1;
                    c.globalAlpha=0.3;
                    c.stroke();
                    c.globalAlpha=1;

                } else if(p.type==='anemone'){
                    // Sea anemone with waving tentacles
                    // Base/stalk
                    c.beginPath();
                    c.moveTo(-S*0.1,0);
                    c.quadraticCurveTo(-S*0.12,-S*0.15,-S*0.08,-S*0.25);
                    c.lineTo(S*0.08,-S*0.25);
                    c.quadraticCurveTo(S*0.12,-S*0.15,S*0.1,0);
                    c.fillStyle=p.colors[2];
                    c.fill();
                    // Tentacles
                    for(let t=0;t<p.tentacles;t++){
                        const tAngle=-Math.PI*0.8+t*(Math.PI*0.6/(p.tentacles-1));
                        const wave=Math.sin(p.sway*1.5+t*0.7)*0.2;
                        const tLen=S*0.35+Math.sin(t*2.3)*S*0.1;
                        c.beginPath();
                        const bx=Math.cos(tAngle+wave)*S*0.06;
                        const by=-S*0.25;
                        c.moveTo(bx,by);
                        const tipX=bx+Math.cos(tAngle+wave)*tLen;
                        const tipY=by+Math.sin(tAngle+wave)*tLen;
                        const cpx=bx+Math.cos(tAngle+wave*2)*tLen*0.6;
                        const cpy=by+Math.sin(tAngle+wave*2)*tLen*0.6;
                        c.quadraticCurveTo(cpx,cpy,tipX,tipY);
                        c.strokeStyle=p.colors[0];
                        c.lineWidth=S*0.035;
                        c.lineCap='round';
                        c.stroke();
                        // Tip glow
                        c.beginPath();
                        c.arc(tipX,tipY,S*0.025,0,Math.PI*2);
                        c.fillStyle=p.colors[1];
                        c.fill();
                    }

                } else if(p.type==='kelp'){
                    // Tall kelp - multiple long wavy strands
                    for(let strand=0;strand<3;strand++){
                        const sx=(strand-1)*S*0.1;
                        c.beginPath();
                        c.moveTo(sx,0);
                        let kx=sx;
                        for(let seg=0;seg<6;seg++){
                            const segY=-S*0.18*(seg+1);
                            const wave=Math.sin(p.sway*0.8+seg*0.6+strand*1.5)*S*0.1;
                            kx+=wave*0.2;
                            c.quadraticCurveTo(kx+wave,segY+S*0.09,kx,segY);
                        }
                        c.strokeStyle=p.colors[strand%p.colors.length];
                        c.lineWidth=S*0.06;
                        c.lineCap='round';
                        c.stroke();
                        // Leaves
                        for(let seg=1;seg<6;seg+=2){
                            const ly=-S*0.18*seg;
                            const lWave=Math.sin(p.sway+seg+strand)*S*0.06;
                            const side=seg%2===0?1:-1;
                            c.beginPath();
                            c.ellipse(kx+side*S*0.08+lWave,ly,S*0.1,S*0.03,side*0.5+sw*0.2,0,Math.PI*2);
                            c.fillStyle=p.colors[1]||p.colors[0];
                            c.globalAlpha=0.6;
                            c.fill();
                            c.globalAlpha=1;
                        }
                    }

                } else if(p.type==='rock'){
                    // Rock/stone
                    c.beginPath();
                    c.moveTo(-S*0.3,0);
                    c.quadraticCurveTo(-S*0.35,-S*0.15,-S*0.2,-S*0.3);
                    c.quadraticCurveTo(-S*0.05,-S*0.4,S*0.1,-S*0.32);
                    c.quadraticCurveTo(S*0.3,-S*0.2,S*0.32,-S*0.05);
                    c.quadraticCurveTo(S*0.3,0,S*0.25,0);
                    c.closePath();
                    c.fillStyle=p.colors[0];
                    c.fill();
                    // Highlights
                    c.beginPath();
                    c.ellipse(-S*0.05,-S*0.22,S*0.1,S*0.06,-0.3,0,Math.PI*2);
                    c.fillStyle=p.colors[1];
                    c.globalAlpha=0.3;
                    c.fill();
                    c.globalAlpha=1;
                    // Shadow
                    c.beginPath();
                    c.ellipse(S*0.1,-S*0.08,S*0.12,S*0.06,0.2,0,Math.PI*2);
                    c.fillStyle=p.colors[2];
                    c.globalAlpha=0.2;
                    c.fill();
                    c.globalAlpha=1;

                } else if(p.type==='starfish'){
                    // Starfish on the sand
                    const rot=p.sway*0.02; // very slow rotation
                    c.save();
                    c.rotate(rot);
                    for(let arm=0;arm<5;arm++){
                        const angle=(Math.PI*2*arm)/5 - Math.PI/2;
                        c.beginPath();
                        c.moveTo(0,0);
                        const tipX=Math.cos(angle)*S*0.35;
                        const tipY=Math.sin(angle)*S*0.35;
                        const cp1x=Math.cos(angle-0.3)*S*0.15;
                        const cp1y=Math.sin(angle-0.3)*S*0.15;
                        const cp2x=Math.cos(angle+0.3)*S*0.15;
                        const cp2y=Math.sin(angle+0.3)*S*0.15;
                        c.quadraticCurveTo(cp1x,cp1y,tipX,tipY);
                        c.quadraticCurveTo(cp2x,cp2y,0,0);
                        c.fillStyle=p.colors[arm%2===0?0:1];
                        c.fill();
                    }
                    // Center
                    c.beginPath();
                    c.arc(0,0,S*0.06,0,Math.PI*2);
                    c.fillStyle=p.colors[2];
                    c.fill();
                    // Dots on arms
                    for(let arm=0;arm<5;arm++){
                        const angle=(Math.PI*2*arm)/5 - Math.PI/2;
                        c.beginPath();
                        c.arc(Math.cos(angle)*S*0.18,Math.sin(angle)*S*0.18,S*0.025,0,Math.PI*2);
                        c.fillStyle=p.colors[2];
                        c.globalAlpha=0.5;
                        c.fill();
                        c.globalAlpha=1;
                    }
                    c.restore();

                } else if(p.type==='shell'){
                    // Spiral shell
                    c.beginPath();
                    for(let t=0;t<Math.PI*3;t+=0.1){
                        const r=S*0.04*t;
                        const sx=Math.cos(t+p.sway*0.01)*r;
                        const sy=-S*0.15+Math.sin(t+p.sway*0.01)*r*0.6;
                        if(t===0) c.moveTo(sx,sy);
                        else c.lineTo(sx,sy);
                    }
                    c.strokeStyle=p.colors[0];
                    c.lineWidth=S*0.06;
                    c.lineCap='round';
                    c.stroke();
                    // Shell body
                    c.beginPath();
                    c.ellipse(0,-S*0.1,S*0.2,S*0.15,0,0,Math.PI*2);
                    c.fillStyle=p.colors[1];
                    c.globalAlpha=0.4;
                    c.fill();
                    c.globalAlpha=1;
                }

                c.restore();
            });
        }

        function drawAnimals(){
            // Spawn new animals occasionally
            if(Math.random()<0.008 && animals.length<10+level*2) spawnAnimal();

            for(let i=animals.length-1;i>=0;i--){
                const a=animals[i];
                a.wobble+=a.wobbleSpeed;
                a.scalePhase+=0.03;
                a.speedPhase+=0.02;

                // Pause behavior - sometimes stops to "look around"
                a.pauseTimer--;
                if(a.pauseTimer<=0 && !a.isPaused && !a.bottom){
                    a.isPaused=true;
                    a.pauseDuration=40+Math.floor(Math.random()*80);
                }
                if(a.isPaused){
                    a.pauseDuration--;
                    if(a.pauseDuration<=0){
                        a.isPaused=false;
                        a.pauseTimer=150+Math.floor(Math.random()*350);
                    }
                }

                // Vertical drift - slowly change swimming depth
                a.driftTimer--;
                if(a.driftTimer<=0){
                    const minY=80, maxY=H-120;
                    a.driftTarget=a.bottom ? a.baseY : (minY+Math.random()*(maxY-minY));
                    a.driftTimer=120+Math.floor(Math.random()*250);
                }
                a.baseY+=(a.driftTarget-a.baseY)*0.008;

                // Speed with variation (accelerate/decelerate naturally)
                let currentSpeed=a.baseSpeed*(1+Math.sin(a.speedPhase)*a.speedVar);
                if(a.isPaused) currentSpeed*=0.05; // almost stop when paused

                a.x+=currentSpeed*a.dir;

                // Organic vertical wave
                const yOff=Math.sin(a.wobble)*a.wobbleAmp;
                a.y=a.baseY+yOff;

                // Tilt: very subtle, only for small fish
                const vertSpeed=Math.cos(a.wobble)*a.wobbleAmp*a.wobbleSpeed;
                if(a.size < 65) {
                    a.tiltTarget=vertSpeed*0.02*a.dir;
                    a.tilt+=(a.tiltTarget-a.tilt)*0.05;
                    if(a.isPaused) a.tilt=Math.sin(a.pauseDuration*0.1)*0.06;
                } else {
                    // Big animals: no tilt, swim flat
                    a.tilt=0;
                }

                // Tail wag effect via scaleX oscillation
                const tailWag=1+Math.sin(a.wobble*3)*0.02*(a.isPaused?0.3:1);
                // Scale breathing
                const scalePulse=1+Math.sin(a.scalePhase)*0.04;

                // Remove if off screen
                if((a.dir>0 && a.x>W+a.size*2)||(a.dir<0 && a.x<-a.size*2)){
                    animals.splice(i,1);continue;
                }

                c.save();
                c.translate(a.x,a.y);
                c.rotate(a.tilt);
                c.scale(a.dir<0?-1:1, 1);

                const S=a.size;
                const tailAngle=Math.sin(a.wobble*4)*0.4*(a.isPaused?0.15:1);
                const finAngle=Math.sin(a.wobble*3)*0.3;
                const time=a.wobble;

                if(a.type==='fish'){
                    // === FISH ===
                    // Tail
                    c.save();
                    c.translate(-S*0.5,0);
                    c.rotate(tailAngle);
                    c.beginPath();
                    c.moveTo(0,0);
                    c.lineTo(-S*0.4,-S*0.3);
                    c.quadraticCurveTo(-S*0.25,0,-S*0.4,S*0.3);
                    c.closePath();
                    c.fillStyle=a.fin;
                    c.fill();
                    c.restore();
                    // Body
                    c.beginPath();
                    c.ellipse(0,0,S*0.55,S*0.32,0,0,Math.PI*2);
                    c.fillStyle=a.color;
                    c.fill();
                    // Stripe
                    c.beginPath();
                    c.ellipse(S*0.05,0,S*0.3,S*0.25,0,0,Math.PI*2);
                    c.fillStyle=a.stripe;
                    c.globalAlpha=0.4;
                    c.fill();
                    c.globalAlpha=1;
                    // Top fin
                    c.save();
                    c.translate(0,-S*0.28);
                    c.rotate(finAngle*0.5);
                    c.beginPath();
                    c.moveTo(-S*0.1,0);
                    c.quadraticCurveTo(0,-S*0.25,S*0.15,0);
                    c.fillStyle=a.fin;
                    c.fill();
                    c.restore();
                    // Eye
                    c.beginPath();
                    c.arc(S*0.22,-S*0.06,S*0.1,0,Math.PI*2);
                    c.fillStyle='white';
                    c.fill();
                    c.beginPath();
                    c.arc(S*0.25,-S*0.06,S*0.05,0,Math.PI*2);
                    c.fillStyle='#2d3436';
                    c.fill();
                    // Mouth
                    c.beginPath();
                    c.arc(S*0.4,S*0.04,S*0.04,0,Math.PI);
                    c.strokeStyle='rgba(0,0,0,0.3)';
                    c.lineWidth=1.5;
                    c.stroke();

                } else if(a.type==='shark'){
                    // === SHARK ===
                    // Tail
                    c.save();
                    c.translate(-S*0.5,0);
                    c.rotate(tailAngle*0.6);
                    c.beginPath();
                    c.moveTo(0,0);
                    c.lineTo(-S*0.35,-S*0.3);
                    c.lineTo(-S*0.2,-S*0.05);
                    c.lineTo(-S*0.35,S*0.2);
                    c.closePath();
                    c.fillStyle=a.fin;
                    c.fill();
                    c.restore();
                    // Body
                    c.beginPath();
                    c.moveTo(S*0.55,0);
                    c.quadraticCurveTo(S*0.3,-S*0.28,-S*0.1,-S*0.22);
                    c.quadraticCurveTo(-S*0.45,-S*0.15,-S*0.5,0);
                    c.quadraticCurveTo(-S*0.45,S*0.12,-S*0.1,S*0.2);
                    c.quadraticCurveTo(S*0.3,S*0.25,S*0.55,0);
                    c.fillStyle=a.color;
                    c.fill();
                    // Belly
                    c.beginPath();
                    c.moveTo(S*0.5,S*0.02);
                    c.quadraticCurveTo(S*0.1,S*0.2,-S*0.3,S*0.12);
                    c.quadraticCurveTo(-S*0.1,S*0.05,S*0.5,S*0.02);
                    c.fillStyle=a.belly;
                    c.fill();
                    // Dorsal fin
                    c.save();
                    c.translate(S*0.05,-S*0.22);
                    c.rotate(finAngle*0.3);
                    c.beginPath();
                    c.moveTo(-S*0.08,0);
                    c.lineTo(S*0.02,-S*0.28);
                    c.lineTo(S*0.15,0);
                    c.fillStyle=a.fin;
                    c.fill();
                    c.restore();
                    // Eye
                    c.beginPath();
                    c.arc(S*0.28,-S*0.08,S*0.05,0,Math.PI*2);
                    c.fillStyle='white';
                    c.fill();
                    c.beginPath();
                    c.arc(S*0.3,-S*0.08,S*0.025,0,Math.PI*2);
                    c.fillStyle='#1a1a2e';
                    c.fill();
                    // Mouth
                    c.beginPath();
                    c.moveTo(S*0.55,0);
                    c.lineTo(S*0.35,S*0.06);
                    c.strokeStyle='rgba(0,0,0,0.4)';
                    c.lineWidth=1.5;
                    c.stroke();
                    // Gill lines
                    for(let g=0;g<3;g++){
                        c.beginPath();
                        c.moveTo(S*0.15+g*S*0.04,-S*0.08);
                        c.lineTo(S*0.15+g*S*0.04,S*0.05);
                        c.strokeStyle='rgba(0,0,0,0.15)';
                        c.lineWidth=1;
                        c.stroke();
                    }

                } else if(a.type==='turtle'){
                    // === TURTLE ===
                    const legKick=Math.sin(time*3)*0.4;
                    // Legs
                    [[-0.25,-0.22],[0.15,-0.22],[-0.25,0.22],[0.15,0.22]].forEach(([lx,ly],li)=>{
                        c.save();
                        c.translate(S*lx,S*ly);
                        c.rotate((li<2?1:-1)*legKick*(li%2===0?1:-1));
                        c.beginPath();
                        c.ellipse(0,0,S*0.15,S*0.08,li<2?-0.3:0.3,0,Math.PI*2);
                        c.fillStyle=a.skin;
                        c.fill();
                        c.restore();
                    });
                    // Shell
                    c.beginPath();
                    c.ellipse(0,0,S*0.38,S*0.3,0,0,Math.PI*2);
                    c.fillStyle=a.shell;
                    c.fill();
                    c.strokeStyle='rgba(0,0,0,0.15)';
                    c.lineWidth=1;
                    c.stroke();
                    // Shell pattern
                    c.beginPath();
                    c.ellipse(0,0,S*0.2,S*0.15,0,0,Math.PI*2);
                    c.strokeStyle='rgba(0,0,0,0.1)';
                    c.stroke();
                    // Head
                    c.beginPath();
                    c.ellipse(S*0.4,0,S*0.14,S*0.1,0,0,Math.PI*2);
                    c.fillStyle=a.skin;
                    c.fill();
                    // Eye
                    c.beginPath();
                    c.arc(S*0.46,-S*0.03,S*0.035,0,Math.PI*2);
                    c.fillStyle='#2d3436';
                    c.fill();

                } else if(a.type==='jellyfish'){
                    // === JELLYFISH ===
                    const pulse=1+Math.sin(time*2)*0.12;
                    // Bell
                    c.beginPath();
                    c.ellipse(0,-S*0.1,S*0.3*pulse,S*0.25,0,Math.PI,0);
                    c.quadraticCurveTo(S*0.3*pulse,S*0.05,0,S*0.05);
                    c.quadraticCurveTo(-S*0.3*pulse,S*0.05,-S*0.3*pulse,-S*0.1);
                    c.fillStyle=a.color;
                    c.globalAlpha=0.7;
                    c.fill();
                    c.globalAlpha=1;
                    // Tentacles
                    for(let t=-2;t<=2;t++){
                        c.beginPath();
                        const tx=t*S*0.1;
                        c.moveTo(tx,S*0.05);
                        const wave=Math.sin(time*2+t)*S*0.1;
                        c.quadraticCurveTo(tx+wave,S*0.25,tx+wave*0.5,S*0.45);
                        c.strokeStyle=a.tentacles;
                        c.globalAlpha=0.5;
                        c.lineWidth=2;
                        c.stroke();
                        c.globalAlpha=1;
                    }

                } else if(a.type==='crab'){
                    // === CRAB ===
                    const legMove=Math.sin(time*5)*0.2;
                    // Legs
                    for(let side=-1;side<=1;side+=2){
                        for(let l=0;l<3;l++){
                            c.save();
                            c.translate(S*(l-1)*0.15*side,S*0.1);
                            c.rotate(side*(0.3+l*0.2+legMove*(l%2===0?1:-1)));
                            c.beginPath();
                            c.moveTo(0,0);
                            c.lineTo(S*0.2*side,S*0.12);
                            c.strokeStyle=a.legs;
                            c.lineWidth=2.5;
                            c.stroke();
                            c.restore();
                        }
                    }
                    // Body
                    c.beginPath();
                    c.ellipse(0,0,S*0.35,S*0.22,0,0,Math.PI*2);
                    c.fillStyle=a.color;
                    c.fill();
                    // Claws
                    for(let side=-1;side<=1;side+=2){
                        c.save();
                        c.translate(S*0.35*side,-S*0.05);
                        c.rotate(side*0.3+Math.sin(time*2)*0.15*side);
                        c.beginPath();
                        c.ellipse(S*0.1*side,0,S*0.12,S*0.08,side*0.3,0,Math.PI*2);
                        c.fillStyle=a.color;
                        c.fill();
                        c.restore();
                    }
                    // Eyes (on stalks)
                    for(let side=-1;side<=1;side+=2){
                        c.beginPath();
                        c.moveTo(S*0.08*side,-S*0.18);
                        c.lineTo(S*0.12*side,-S*0.3);
                        c.strokeStyle=a.color;
                        c.lineWidth=3;
                        c.stroke();
                        c.beginPath();
                        c.arc(S*0.12*side,-S*0.32,S*0.05,0,Math.PI*2);
                        c.fillStyle='white';
                        c.fill();
                        c.beginPath();
                        c.arc(S*0.13*side,-S*0.32,S*0.025,0,Math.PI*2);
                        c.fillStyle='#2d3436';
                        c.fill();
                    }

                } else if(a.type==='octopus'){
                    // === OCTOPUS ===
                    // Tentacles
                    for(let t=0;t<8;t++){
                        c.beginPath();
                        const angle=-0.8+t*0.23;
                        const tx=Math.cos(angle)*S*0.25;
                        const ty=S*0.2;
                        const wave=Math.sin(time*2+t*0.8)*S*0.15;
                        c.moveTo(tx,ty);
                        c.quadraticCurveTo(tx+wave,ty+S*0.25,tx+wave*1.5,ty+S*0.5);
                        c.strokeStyle=a.spots;
                        c.lineWidth=3.5;
                        c.lineCap='round';
                        c.stroke();
                    }
                    // Head
                    c.beginPath();
                    c.ellipse(0,0,S*0.35,S*0.3,0,0,Math.PI*2);
                    c.fillStyle=a.color;
                    c.fill();
                    // Spots
                    for(let s=0;s<4;s++){
                        c.beginPath();
                        c.arc(S*(0.1-s*0.08),S*(0.05-s*0.06+Math.sin(s)*0.05),S*0.04,0,Math.PI*2);
                        c.fillStyle=a.spots;
                        c.globalAlpha=0.3;
                        c.fill();
                        c.globalAlpha=1;
                    }
                    // Eyes
                    for(let side=-1;side<=1;side+=2){
                        c.beginPath();
                        c.ellipse(S*0.12*side,-S*0.08,S*0.09,S*0.07,0,0,Math.PI*2);
                        c.fillStyle='white';
                        c.fill();
                        c.beginPath();
                        c.arc(S*0.14*side,-S*0.08,S*0.04,0,Math.PI*2);
                        c.fillStyle='#2d3436';
                        c.fill();
                    }

                } else if(a.type==='whale'){
                    // === WHALE ===
                    // Tail
                    c.save();
                    c.translate(-S*0.5,0);
                    c.rotate(tailAngle*0.3);
                    c.beginPath();
                    c.moveTo(0,0);
                    c.quadraticCurveTo(-S*0.1,-S*0.2,-S*0.25,-S*0.22);
                    c.quadraticCurveTo(-S*0.15,0,-S*0.25,S*0.22);
                    c.quadraticCurveTo(-S*0.1,S*0.2,0,0);
                    c.fillStyle=a.color;
                    c.fill();
                    c.restore();
                    // Body
                    c.beginPath();
                    c.ellipse(0,0,S*0.55,S*0.28,0,0,Math.PI*2);
                    c.fillStyle=a.color;
                    c.fill();
                    // Belly
                    c.beginPath();
                    c.ellipse(S*0.05,S*0.08,S*0.4,S*0.18,0,0,Math.PI);
                    c.fillStyle=a.belly;
                    c.fill();
                    // Eye
                    c.beginPath();
                    c.arc(S*0.3,-S*0.06,S*0.04,0,Math.PI*2);
                    c.fillStyle='white';
                    c.fill();
                    c.beginPath();
                    c.arc(S*0.31,-S*0.06,S*0.02,0,Math.PI*2);
                    c.fillStyle='#2d3436';
                    c.fill();
                    // Mouth line
                    c.beginPath();
                    c.moveTo(S*0.55,S*0.02);
                    c.quadraticCurveTo(S*0.35,S*0.12,S*0.1,S*0.1);
                    c.strokeStyle='rgba(0,0,0,0.2)';
                    c.lineWidth=1.5;
                    c.stroke();
                    // Fin
                    c.save();
                    c.translate(S*0.05,S*0.22);
                    c.rotate(finAngle*0.2);
                    c.beginPath();
                    c.moveTo(0,0);
                    c.quadraticCurveTo(-S*0.1,S*0.15,S*0.05,S*0.18);
                    c.quadraticCurveTo(S*0.1,S*0.05,0,0);
                    c.fillStyle=a.color;
                    c.fill();
                    c.restore();

                } else if(a.type==='pufferfish'){
                    // === PUFFERFISH ===
                    const puff=1+Math.sin(time*1.5)*0.1;
                    // Body
                    c.beginPath();
                    c.arc(0,0,S*0.38*puff,0,Math.PI*2);
                    c.fillStyle=a.color;
                    c.fill();
                    // Spines
                    for(let s=0;s<12;s++){
                        const sa=(Math.PI*2*s)/12;
                        const sr=S*0.38*puff;
                        c.beginPath();
                        c.moveTo(Math.cos(sa)*sr,Math.sin(sa)*sr);
                        c.lineTo(Math.cos(sa)*(sr+S*0.08),Math.sin(sa)*(sr+S*0.08));
                        c.strokeStyle=a.spines;
                        c.lineWidth=2;
                        c.stroke();
                    }
                    // Belly
                    c.beginPath();
                    c.ellipse(S*0.05,S*0.05,S*0.22*puff,S*0.2*puff,0,0,Math.PI*2);
                    c.fillStyle='#fff8e7';
                    c.globalAlpha=0.5;
                    c.fill();
                    c.globalAlpha=1;
                    // Eye
                    c.beginPath();
                    c.arc(S*0.15,-S*0.08,S*0.08,0,Math.PI*2);
                    c.fillStyle='white';
                    c.fill();
                    c.beginPath();
                    c.arc(S*0.17,-S*0.08,S*0.04,0,Math.PI*2);
                    c.fillStyle='#2d3436';
                    c.fill();
                    // Tail
                    c.save();
                    c.translate(-S*0.35,0);
                    c.rotate(tailAngle*0.5);
                    c.beginPath();
                    c.moveTo(0,0);
                    c.lineTo(-S*0.15,-S*0.12);
                    c.lineTo(-S*0.15,S*0.12);
                    c.closePath();
                    c.fillStyle=a.spines;
                    c.fill();
                    c.restore();
                    // Fins
                    c.save();
                    c.translate(0,-S*0.3*puff);
                    c.rotate(finAngle*0.4);
                    c.beginPath();
                    c.ellipse(0,-S*0.06,S*0.08,S*0.05,0,0,Math.PI*2);
                    c.fillStyle=a.spines;
                    c.globalAlpha=0.6;
                    c.fill();
                    c.globalAlpha=1;
                    c.restore();
                }

                c.restore();
            }
        }

        // Separate overlay canvas for trash (avoids state leaks)
        const trashCanvas = document.createElement('canvas');
        trashCanvas.width = W;
        trashCanvas.height = H;
        trashCanvas.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;z-index:2;';
        canvas.parentNode.appendChild(trashCanvas);
        const tc = trashCanvas.getContext('2d');

        // Forward clicks on trash canvas to main handler
        trashCanvas.addEventListener('pointerdown',(e)=>{
            e.preventDefault();
            const rect=trashCanvas.getBoundingClientRect();
            const px=e.clientX-rect.left;
            const py=e.clientY-rect.top;

            for(let i=trash.length-1;i>=0;i--){
                const t=trash[i];
                if(t.removing) continue;
                const dx=px-t.x;
                const dy=py-t.y;
                if(Math.sqrt(dx*dx+dy*dy)<t.r+15){
                    t.removing=true;
                    playClean();
                    spawnCleanParticles(e.clientX, e.clientY);
                    trashCollected++;
                    totalTrashCollected++;
                    document.getElementById('trashCount').textContent='🗑️ '+trashCollected;
                    const msgs=['Boa!','Limpo!','Muito bem!','Fixe!','Genial!'];
                    if(trashCollected%3===0) showMsg(msgs[Math.floor(Math.random()*msgs.length)]+' 🌊');
                    return;
                }
            }

            // If no trash hit, forward to main canvas for animal clicks
            canvas.dispatchEvent(new PointerEvent('pointerdown',{
                clientX:e.clientX, clientY:e.clientY,
                bubbles:true, cancelable:true
            }));
        });

        function drawTrash(){
            tc.clearRect(0,0,W,H);

            trash.forEach(t=>{
                t.bobble+=t.bobbleSpeed;

                // Sink slowly until reaching the sand
                if(!t.removing && !t.sunk){
                    t.y += t.sinkSpeed;
                    t.x = t.startX + Math.sin(t.bobble * t.wobbleSpeed * 60) * t.wobbleAmp;
                    if(t.y >= H - 60){
                        t.y = H - 60;
                        t.sunk = true;
                        t.sunkTimer = 120;
                    }
                }

                // Blink and disappear when sunk
                if(t.sunk && !t.removing){
                    t.sunkTimer--;
                    if(t.sunkTimer <= 0){
                        t.missed = true;
                        t.removing = true;
                    }
                }

                const yOff = t.sunk ? Math.sin(t.bobble)*2 : Math.sin(t.bobble)*3;

                if(t.removing){
                    t.opacity-=0.08;
                    t.y-=2;
                }

                // Blink when sunk
                const blinking = t.sunk && !t.removing && t.sunkTimer < 80;
                if(blinking && Math.floor(t.sunkTimer / 4) % 2 === 0){
                    // blink off
                } else {
                    tc.save();
                    tc.globalAlpha=Math.max(0.01,t.opacity);
                    tc.translate(t.x,t.y+yOff);
                    tc.rotate(t.rot+Math.sin(t.bobble*0.7)*0.05);

                    tc.font=t.r*1.5+'px serif';
                    tc.textAlign='center';
                    tc.textBaseline='middle';
                    tc.fillText(t.emoji,0,0);

                    tc.restore();
                }
            });

            // Remove faded-out trash (both collected and missed)
            for(let i=trash.length-1;i>=0;i--){
                if(trash[i].opacity<=0){
                    const wasMissed = trash[i].missed;
                    trash.splice(i,1);
                    if(wasMissed){
                        showMsg('Escapou! 😢');
                    }
                    // Check if level complete (all trash gone)
                    if(trash.length===0){
                        setTimeout(()=>{
                            playWin();
                            const texts=['Oceano mais limpo!','Os peixes agradecem!','Fantastico!','Planeta feliz!'];
                            document.getElementById('lcText').textContent=texts[Math.floor(Math.random()*texts.length)];
                            document.getElementById('lcSub').textContent=`Removeste ${trashCollected} lixos! Total: ${totalTrashCollected}`;
                            document.getElementById('levelComplete').classList.add('show');
                        },500);
                    }
                }
            }
        }

        // ===== SUBMARINE =====
        let sub = {
            x: -120,
            y: 120 + Math.random()*(H*0.4),
            dir: 1,
            speed: 0.4 + Math.random()*0.3,
            wobble: 0,
            bubbleTimer: 0,
            subBubbles: [],
            propAngle: 0,
        };

        function drawSubmarine(){
            sub.wobble += 0.02;
            sub.propAngle += 0.3;
            const yOff = Math.sin(sub.wobble)*4;

            // Move
            sub.x += sub.speed * sub.dir;

            // When off-screen, reappear from the other side at new depth
            if(sub.dir===1 && sub.x > W+140){
                sub.dir = -1;
                sub.y = 100 + Math.random()*(H*0.5);
                sub.speed = 0.4 + Math.random()*0.3;
            } else if(sub.dir===-1 && sub.x < -140){
                sub.dir = 1;
                sub.y = 100 + Math.random()*(H*0.5);
                sub.speed = 0.4 + Math.random()*0.3;
            }

            // Exhaust bubbles
            sub.bubbleTimer++;
            if(sub.bubbleTimer>15){
                sub.bubbleTimer=0;
                const bx = sub.dir===1 ? sub.x-30 : sub.x+30;
                sub.subBubbles.push({x:bx, y:sub.y+yOff-2, r:2+Math.random()*3, life:60});
            }
            for(let i=sub.subBubbles.length-1;i>=0;i--){
                const b=sub.subBubbles[i];
                b.y-=0.5; b.x+=(Math.random()-0.5)*0.5; b.life--;
                if(b.life<=0){sub.subBubbles.splice(i,1);continue;}
                c.beginPath();
                c.arc(b.x,b.y,b.r,0,Math.PI*2);
                c.fillStyle='rgba(255,255,255,'+(b.life/60*0.4)+')';
                c.fill();
            }

            c.save();
            c.translate(sub.x, sub.y + yOff);
            if(sub.dir===-1) c.scale(-1,1);

            // Main hull (yellow)
            c.beginPath();
            c.ellipse(0,0,38,16,0,0,Math.PI*2);
            c.fillStyle='#f1c40f';
            c.fill();
            c.strokeStyle='#d4a20a';
            c.lineWidth=2;
            c.stroke();

            // Darker stripe
            c.beginPath();
            c.ellipse(0,2,34,6,0,0,Math.PI);
            c.fillStyle='#e6a800';
            c.fill();

            // Tower/conning tower
            c.beginPath();
            c.roundRect(-8,-24,16,12,3);
            c.fillStyle='#f1c40f';
            c.fill();
            c.strokeStyle='#d4a20a';
            c.lineWidth=1.5;
            c.stroke();

            // Periscope
            c.beginPath();
            c.moveTo(2,-24);
            c.lineTo(2,-32);
            c.lineTo(8,-32);
            c.strokeStyle='#7f8c8d';
            c.lineWidth=2;
            c.stroke();

            // Window (porthole)
            c.beginPath();
            c.arc(12,0,5,0,Math.PI*2);
            c.fillStyle='#85c1e9';
            c.fill();
            c.strokeStyle='#d4a20a';
            c.lineWidth=1.5;
            c.stroke();

            // Small window
            c.beginPath();
            c.arc(-5,0,3.5,0,Math.PI*2);
            c.fillStyle='#aed6f1';
            c.fill();
            c.strokeStyle='#d4a20a';
            c.lineWidth=1;
            c.stroke();

            // Propeller at the back
            c.save();
            c.translate(-38,0);
            c.rotate(sub.propAngle);
            c.beginPath();
            c.ellipse(0,0,2,8,0,0,Math.PI*2);
            c.fillStyle='#7f8c8d';
            c.fill();
            c.beginPath();
            c.ellipse(0,0,8,2,0,0,Math.PI*2);
            c.fillStyle='#7f8c8d';
            c.fill();
            c.restore();

            // Front nose highlight
            c.beginPath();
            c.ellipse(28,-4,8,4,0.3,Math.PI,0);
            c.fillStyle='rgba(255,255,255,0.2)';
            c.fill();

            c.restore();
        }

        // ===== SPONGEBOB =====
        let bob = {
            x: W + 60,
            dir: -1,
            speed: 0.5,
            walk: 0,
            blink: 0,
            blinkTimer: 120 + Math.floor(Math.random()*200),
            armSwing: 0,
        };

        function drawSpongeBob(){
            bob.walk += 0.06;
            bob.armSwing += 0.08;
            bob.blinkTimer--;
            if(bob.blinkTimer<=0){
                bob.blink = 8;
                bob.blinkTimer = 100 + Math.floor(Math.random()*250);
            }
            if(bob.blink>0) bob.blink--;

            // Move along the sand
            bob.x += bob.speed * bob.dir;
            if(bob.dir===-1 && bob.x < -50){
                bob.dir = 1;
                bob.speed = 0.4 + Math.random()*0.3;
            } else if(bob.dir===1 && bob.x > W+50){
                bob.dir = -1;
                bob.speed = 0.4 + Math.random()*0.3;
            }

            const groundY = H - 22;
            const bounce = Math.abs(Math.sin(bob.walk*2))*3;

            c.save();
            c.translate(bob.x, groundY - 28 - bounce);
            if(bob.dir===-1) c.scale(-1,1);
            const sc = 0.85;
            c.scale(sc,sc);

            // Legs (brown pants + black shoes)
            const legSwing = Math.sin(bob.walk*2)*4;
            // Left leg
            c.save();
            c.translate(-6, 24);
            c.rotate(legSwing*0.05);
            // Brown pants leg
            c.fillStyle='#8B4513';
            c.fillRect(-3,0,6,10);
            // White sock
            c.fillStyle='#fff';
            c.fillRect(-3,10,6,4);
            // Black shoe
            c.fillStyle='#111';
            c.beginPath();
            c.ellipse(0,16,5,3,0,0,Math.PI*2);
            c.fill();
            c.restore();
            // Right leg
            c.save();
            c.translate(6, 24);
            c.rotate(-legSwing*0.05);
            c.fillStyle='#8B4513';
            c.fillRect(-3,0,6,10);
            c.fillStyle='#fff';
            c.fillRect(-3,10,6,4);
            c.fillStyle='#111';
            c.beginPath();
            c.ellipse(0,16,5,3,0,0,Math.PI*2);
            c.fill();
            c.restore();

            // Body (yellow sponge rectangle)
            c.fillStyle='#f1c40f';
            c.strokeStyle='#c8960c';
            c.lineWidth=1.5;
            c.beginPath();
            c.roundRect(-16,-24,32,48,3);
            c.fill();
            c.stroke();

            // Sponge holes
            c.fillStyle='#d4a20a';
            const holes = [[-8,-15,2],[-3,-8,2.5],[6,-12,2],[9,-3,1.8],[-6,2,2.2],[3,5,1.8],[-10,10,2],[7,12,1.5],[-2,15,2]];
            holes.forEach(h=>{
                c.beginPath();
                c.arc(h[0],h[1],h[2],0,Math.PI*2);
                c.fill();
            });

            // White shirt
            c.fillStyle='#fff';
            c.fillRect(-14,10,28,14);
            c.strokeStyle='#ddd';
            c.lineWidth=0.5;
            c.strokeRect(-14,10,28,14);

            // Red tie
            c.fillStyle='#e74c3c';
            c.beginPath();
            c.moveTo(0,10);
            c.lineTo(4,16);
            c.lineTo(0,22);
            c.lineTo(-4,16);
            c.closePath();
            c.fill();

            // Belt
            c.fillStyle='#111';
            c.fillRect(-14,22,28,3);

            // Arms
            const armAngle = Math.sin(bob.armSwing)*0.3;
            // Left arm
            c.save();
            c.translate(-16, 4);
            c.rotate(-0.3 + armAngle);
            c.fillStyle='#f1c40f';
            c.fillRect(-3,-2,3,18);
            c.restore();
            // Right arm
            c.save();
            c.translate(16, 4);
            c.rotate(0.3 - armAngle);
            c.fillStyle='#f1c40f';
            c.fillRect(0,-2,3,18);
            c.restore();

            // Face
            // Eyes
            const blinking = bob.blink > 0;
            // Left eye
            c.fillStyle='#fff';
            c.beginPath();
            c.ellipse(-6,-12,5,6,0,0,Math.PI*2);
            c.fill();
            c.strokeStyle='#333';
            c.lineWidth=0.8;
            c.stroke();
            if(!blinking){
                c.fillStyle='#3498db';
                c.beginPath();
                c.arc(-6,-12,2.5,0,Math.PI*2);
                c.fill();
                c.fillStyle='#111';
                c.beginPath();
                c.arc(-6,-12,1.2,0,Math.PI*2);
                c.fill();
            } else {
                c.beginPath();
                c.moveTo(-10,-12);
                c.lineTo(-2,-12);
                c.strokeStyle='#333';
                c.lineWidth=1.5;
                c.stroke();
            }
            // Right eye
            c.fillStyle='#fff';
            c.beginPath();
            c.ellipse(6,-12,5,6,0,0,Math.PI*2);
            c.fill();
            c.strokeStyle='#333';
            c.lineWidth=0.8;
            c.stroke();
            if(!blinking){
                c.fillStyle='#3498db';
                c.beginPath();
                c.arc(6,-12,2.5,0,Math.PI*2);
                c.fill();
                c.fillStyle='#111';
                c.beginPath();
                c.arc(6,-12,1.2,0,Math.PI*2);
                c.fill();
            } else {
                c.beginPath();
                c.moveTo(2,-12);
                c.lineTo(10,-12);
                c.strokeStyle='#333';
                c.lineWidth=1.5;
                c.stroke();
            }

            // Nose
            c.fillStyle='#f1c40f';
            c.beginPath();
            c.ellipse(0,-8,2,3,0,0,Math.PI*2);
            c.fill();
            c.strokeStyle='#c8960c';
            c.lineWidth=0.5;
            c.stroke();

            // Mouth - big happy smile
            c.beginPath();
            c.arc(0,-3,8,0.1,Math.PI-0.1);
            c.strokeStyle='#333';
            c.lineWidth=1.5;
            c.stroke();
            // Teeth
            c.fillStyle='#fff';
            c.fillRect(-3,-3,3,4);
            c.fillRect(1,-3,3,4);
            c.strokeStyle='#ccc';
            c.lineWidth=0.5;
            c.strokeRect(-3,-3,3,4);
            c.strokeRect(1,-3,3,4);

            // Cheeks
            c.fillStyle='rgba(231,76,60,0.2)';
            c.beginPath();
            c.arc(-10,-5,3,0,Math.PI*2);
            c.fill();
            c.beginPath();
            c.arc(10,-5,3,0,Math.PI*2);
            c.fill();

            // Eyelashes (3 on each eye)
            c.strokeStyle='#333';
            c.lineWidth=0.8;
            for(let i=-1;i<=1;i++){
                c.beginPath();
                c.moveTo(-6+i*2,-18);
                c.lineTo(-6+i*2.5,-21);
                c.stroke();
                c.beginPath();
                c.moveTo(6+i*2,-18);
                c.lineTo(6+i*2.5,-21);
                c.stroke();
            }

            c.restore();
        }

        // ===== GAME LOOP =====
        function frame(){
            c.clearRect(0,0,W,H);
            drawBackground();
            drawLightRays();
            drawBubbles();
            drawSubmarine();
            drawPlants();
            drawSpongeBob();
            drawAnimals();
            drawTrash();
            requestAnimationFrame(frame);
        }

        initLevel();
        frame();

        document.addEventListener('gesturestart',e=>e.preventDefault());
        document.addEventListener('dblclick',e=>e.preventDefault());

        // iOS audio unlock
        (function() {
            var unlock = document.getElementById('iosUnlock');
            function doUnlock() {
                var AC = window.AudioContext || window.webkitAudioContext;
                if (!ctx) ctx = new AC();
                ctx.resume().then(function() {
                    var o = ctx.createOscillator();
                    var g = ctx.createGain();
                    g.gain.value = 0.001;
                    o.connect(g);
                    g.connect(ctx.destination);
                    o.start(0);
                    o.stop(ctx.currentTime + 0.1);
                });
                unlock.style.display = 'none';
                document.removeEventListener('touchstart', doUnlock, true);
                document.removeEventListener('touchend', doUnlock, true);
                document.removeEventListener('click', doUnlock, true);
            }
            unlock.addEventListener('touchend', doUnlock);
            unlock.addEventListener('click', doUnlock);
            document.addEventListener('touchstart', doUnlock, true);
            document.addEventListener('touchend', doUnlock, true);
        })();
    </script>
</body>
</html>
