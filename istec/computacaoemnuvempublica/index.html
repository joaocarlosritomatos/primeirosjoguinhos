<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CNP — Quiz Aulas 1–3</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: #1a1a1a;
    color: #e5e5e5;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .header {
    width: 100%;
    background: #B51817;
    padding: 20px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header h1 {
    font-size: 18px;
    font-weight: 600;
    color: #fff;
    letter-spacing: 1px;
  }
  .header .badge {
    background: rgba(255,255,255,0.2);
    color: #fff;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 500;
  }

  .container {
    max-width: 800px;
    width: 100%;
    padding: 30px 20px 60px;
  }

  .intro {
    text-align: center;
    padding: 40px 20px;
  }
  .intro h2 {
    font-size: 32px;
    font-weight: 700;
    color: #fff;
    margin-bottom: 10px;
  }
  .intro p {
    font-size: 15px;
    color: #9ca3af;
    margin-bottom: 30px;
  }
  .intro .start-btn {
    background: #B51817;
    color: #fff;
    border: none;
    padding: 14px 40px;
    font-size: 16px;
    font-weight: 600;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .intro .start-btn:hover { background: #9e1514; }

  .progress-bar {
    width: 100%;
    height: 6px;
    background: #2a2a2a;
    border-radius: 3px;
    margin-bottom: 30px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #B51817, #e63946);
    border-radius: 3px;
    transition: width 0.5s ease;
  }

  .question-card {
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 12px;
    padding: 30px;
    margin-bottom: 20px;
    display: none;
  }
  .question-card.active { display: block; }

  .q-number {
    font-size: 12px;
    font-weight: 600;
    color: #B51817;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .q-text {
    font-size: 18px;
    font-weight: 600;
    color: #fff;
    line-height: 1.5;
    margin-bottom: 24px;
  }

  .options { display: flex; flex-direction: column; gap: 10px; }

  .option {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 18px;
    background: #222;
    border: 2px solid #333;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s;
    font-size: 14px;
    color: #d1d5db;
    line-height: 1.5;
  }
  .option:hover:not(.disabled) {
    border-color: #555;
    background: #2a2a2a;
  }
  .option .radio {
    width: 22px;
    height: 22px;
    min-width: 22px;
    border: 2px solid #555;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }
  .option .radio .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: transparent;
    transition: background 0.2s;
  }
  .option.selected .radio {
    border-color: #B51817;
  }
  .option.selected .radio .dot {
    background: #B51817;
  }

  /* Feedback states */
  .option.correct {
    border-color: #22c55e;
    background: rgba(34, 197, 94, 0.1);
  }
  .option.correct .radio { border-color: #22c55e; }
  .option.correct .radio .dot { background: #22c55e; }

  .option.wrong {
    border-color: #ef4444;
    background: rgba(239, 68, 68, 0.1);
  }
  .option.wrong .radio { border-color: #ef4444; }
  .option.wrong .radio .dot { background: #ef4444; }

  .option.show-correct {
    border-color: #22c55e;
    background: rgba(34, 197, 94, 0.08);
  }

  .option.disabled { cursor: default; opacity: 0.85; }

  .feedback {
    margin-top: 16px;
    padding: 14px 18px;
    border-radius: 8px;
    font-size: 13px;
    line-height: 1.6;
    display: none;
  }
  .feedback.correct {
    background: rgba(34, 197, 94, 0.1);
    border: 1px solid rgba(34, 197, 94, 0.3);
    color: #86efac;
    display: block;
  }
  .feedback.wrong {
    background: rgba(239, 68, 68, 0.1);
    border: 1px solid rgba(239, 68, 68, 0.3);
    color: #fca5a5;
    display: block;
  }

  .nav-btn {
    margin-top: 20px;
    background: #B51817;
    color: #fff;
    border: none;
    padding: 12px 32px;
    font-size: 14px;
    font-weight: 600;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.2s;
    display: none;
  }
  .nav-btn:hover { background: #9e1514; }
  .nav-btn.visible { display: inline-block; }

  /* Results */
  .results {
    display: none;
    text-align: center;
    padding: 50px 20px;
  }
  .results.active { display: block; }

  .score-circle {
    width: 180px;
    height: 180px;
    border-radius: 50%;
    border: 8px solid #2a2a2a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin: 0 auto 30px;
    position: relative;
  }
  .score-circle.great { border-color: #22c55e; }
  .score-circle.ok { border-color: #eab308; }
  .score-circle.weak { border-color: #ef4444; }

  .score-number {
    font-size: 48px;
    font-weight: 700;
    color: #fff;
  }
  .score-label {
    font-size: 14px;
    color: #9ca3af;
  }

  .results h2 {
    font-size: 28px;
    font-weight: 700;
    color: #fff;
    margin-bottom: 10px;
  }
  .results p {
    font-size: 15px;
    color: #9ca3af;
    margin-bottom: 30px;
    max-width: 500px;
    margin-left: auto;
    margin-right: auto;
  }

  .results-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
    max-width: 400px;
    margin: 0 auto 30px;
  }
  .results-grid .dot {
    width: 100%;
    aspect-ratio: 1;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 700;
    color: #fff;
  }
  .dot.g { background: rgba(34,197,94,0.2); color: #22c55e; }
  .dot.r { background: rgba(239,68,68,0.2); color: #ef4444; }

  .retry-btn {
    background: transparent;
    border: 2px solid #B51817;
    color: #B51817;
    padding: 12px 32px;
    font-size: 14px;
    font-weight: 600;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    margin-right: 10px;
  }
  .retry-btn:hover { background: #B51817; color: #fff; }

  .review-btn {
    background: #B51817;
    border: 2px solid #B51817;
    color: #fff;
    padding: 12px 32px;
    font-size: 14px;
    font-weight: 600;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .review-btn:hover { background: #9e1514; border-color: #9e1514; }

  .timer {
    font-size: 13px;
    color: #9ca3af;
    text-align: right;
    margin-bottom: 10px;
  }

  @media (max-width: 600px) {
    .header { padding: 15px 20px; }
    .header h1 { font-size: 14px; }
    .container { padding: 20px 15px 40px; }
    .q-text { font-size: 16px; }
    .intro h2 { font-size: 24px; }
    .results-grid { grid-template-columns: repeat(5, 1fr); }
  }

  .logo-corner {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 1000;
    opacity: 0.85;
    transition: opacity 0.3s;
  }
  .logo-corner:hover {
    opacity: 1;
  }
  .logo-corner img {
    height: 72px;
    filter: drop-shadow(0 2px 8px rgba(0,0,0,0.5));
  }
</style>
</head>
<body>

<div class="header">
  <div style="display:flex;align-items:center;gap:16px;">
    <h1>COMPUTAÇÃO EM NUVEM PÚBLICA</h1>
  </div>
  <span class="badge">Quiz &middot; Aulas 1–3</span>
</div>

<div class="container">
  <!-- INTRO -->
  <div class="intro" id="intro">
    <h2>Assessment Aulas 1–3</h2>
    <p>10 perguntas de escolha múltipla &middot; ~5 minutos<br>
    Conceitos cloud, Azure overview, regiões e hierarquia, Gartner Magic Quadrant</p>
    <button class="start-btn" onclick="startQuiz()">Começar</button>
  </div>

  <!-- QUIZ -->
  <div id="quiz" style="display:none;">
    <div class="timer" id="timer">00:00</div>
    <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
    <div id="questions-container"></div>
    <button class="nav-btn" id="nextBtn" onclick="nextQuestion()">Próxima pergunta</button>
  </div>

  <!-- RESULTS -->
  <div class="results" id="results">
    <div class="score-circle" id="scoreCircle">
      <span class="score-number" id="scoreNumber">0</span>
      <span class="score-label">de 10</span>
    </div>
    <h2 id="resultsTitle"></h2>
    <p id="resultsMsg"></p>
    <div class="results-grid" id="resultsGrid"></div>
    <div style="margin-top:20px;">
      <button class="retry-btn" onclick="resetQuiz()">Repetir quiz</button>
      <button class="review-btn" onclick="reviewQuiz()">Rever respostas</button>
    </div>
  </div>
</div>

<script>
const questions = [
  {
    q: "O que é cloud computing?",
    options: [
      "Entrega de serviços de computação (servidores, storage, redes, software) através da internet, sob pedido e com pagamento por uso.",
      "Alojamento de websites num servidor dedicado dentro das instalações da empresa.",
      "Utilização de uma rede local (LAN) para partilhar ficheiros entre computadores.",
    ],
    correct: 0,
    explanation: "Cloud computing é a entrega de serviços de computação — incluindo servidores, armazenamento, bases de dados, redes e software — através da internet (\"the cloud\"), com pricing pay-per-use."
  },
  {
    q: "Qual modelo de serviço cloud dá ao cliente MAIS controlo sobre a infraestrutura, mas também MAIS responsabilidade?",
    options: [
      "Platform as a Service (PaaS)",
      "Infrastructure as a Service (IaaS)",
      "Software as a Service (SaaS)",
    ],
    correct: 1,
    explanation: "No IaaS, o cliente gere o SO, middleware, runtime, dados e aplicações. O provider gere apenas o hardware, a virtualização e a rede física. É o modelo com mais controlo e mais responsabilidade."
  },
  {
    q: "Na hierarquia de gestão do Azure, qual é a ordem correta do nível mais alto para o mais baixo?",
    options: [
      "Subscrição → Tenant → Resource Group → Recurso",
      "Tenant (Entra ID) → Management Group → Subscrição → Resource Group → Recurso",
      "Resource Group → Subscrição → Tenant → Recurso",
    ],
    correct: 1,
    explanation: "A hierarquia Azure é: Tenant (Azure Entra ID, antigo AAD) no topo, depois Management Groups (opcionais), depois Subscrições, depois Resource Groups, e finalmente os Recursos individuais."
  },
  {
    q: "O que é uma região Azure?",
    options: [
      "Um único datacenter da Microsoft num país.",
      "Um conjunto de datacenters ligados por rede de baixa latência, dentro de uma área geográfica definida.",
      "Uma zona de disponibilidade com redundância automática.",
    ],
    correct: 1,
    explanation: "Uma região Azure é um conjunto de datacenters interligados por rede de baixa latência, dentro de um perímetro geográfico definido. Cada região pode ter múltiplas Availability Zones."
  },
  {
    q: "No Gartner Magic Quadrant, os dois eixos são:",
    options: [
      "Preço vs Qualidade de serviço.",
      "Ability to Execute (eixo Y) vs Completeness of Vision (eixo X).",
      "Market Share (eixo Y) vs Número de serviços (eixo X).",
    ],
    correct: 1,
    explanation: "O MQ usa dois eixos: Ability to Execute (capacidade de entregar hoje — mede produto, vendas, operações) no eixo Y, e Completeness of Vision (estratégia e inovação futura) no eixo X."
  },
  {
    q: "No Magic Quadrant 2024 para Cloud Infrastructure and Platform Services, quais são os três Leaders?",
    options: [
      "AWS, Microsoft Azure e Oracle Cloud",
      "AWS, Microsoft Azure e Google Cloud",
      "Microsoft Azure, Google Cloud e IBM Cloud",
    ],
    correct: 1,
    explanation: "Os três Leaders consolidados no MQ 2024 são AWS (líder histórico), Microsoft Azure (segundo, a crescer) e Google Cloud Platform (terceiro, forte em dados e AI). Oracle está no quadrante Niche/Visionary."
  },
  {
    q: "O que é um Resource Group no Azure?",
    options: [
      "Um contentor lógico que agrupa recursos relacionados (VMs, discos, redes) para gestão, faturação e controlo de acesso conjunto.",
      "Um grupo de utilizadores com permissões de administrador.",
      "Uma coleção de subscricoes dentro do mesmo tenant.",
    ],
    correct: 0,
    explanation: "Um Resource Group é um contentor lógico. Todos os recursos Azure vivem obrigatoriamente dentro de um RG. Facilita gestão de ciclo de vida (apagar o RG apaga tudo dentro), faturação por projeto, e aplicação de políticas RBAC."
  },
  {
    q: "Qual destas afirmações sobre Availability Zones é verdadeira?",
    options: [
      "São datacenters em países diferentes para disaster recovery.",
      "São localizações fisicamente separadas dentro de uma mesma região Azure, cada uma com energia, refrigeração e rede independentes.",
      "São réplicas automáticas de dados entre regiões.",
    ],
    correct: 1,
    explanation: "Availability Zones são localizações fisicamente separadas DENTRO de uma mesma região. Cada zona tem alimentação elétrica, refrigeração e rede independentes. Protegem contra falhas de datacenter, não contra falhas de região."
  },
  {
    q: "Qual é a principal limitação do Gartner Magic Quadrant que devemos ter em conta ao usá-lo?",
    options: [
      "O Magic Quadrant é completamente gratuito e por isso tem pouca qualidade.",
      "Avalia providers de forma genérica — não diz qual é melhor para o SEU workload específico, contexto ou equipa.",
      "Só analisa empresas norte-americanas.",
    ],
    correct: 1,
    explanation: "O MQ avalia providers de forma genérica e holística. Não considera o vosso workload, equipa, regulamentação ou orçamento específicos. Um Leader no MQ pode não ser a melhor escolha para o vosso caso concreto."
  },
  {
    q: "Qual ferramenta do Azure permite executar comandos CLI e scripts diretamente no browser, sem instalar nada localmente?",
    options: [
      "Azure DevOps",
      "Azure Cloud Shell",
      "Azure Resource Manager (ARM)",
    ],
    correct: 1,
    explanation: "O Azure Cloud Shell é um terminal acessível diretamente no browser (portal.azure.com), com Azure CLI e PowerShell pre-instalados, storage persistente, e acesso a ferramentas como git, kubectl, terraform. Não exige instalação local."
  },
];

let current = 0;
let score = 0;
let answers = [];
let timerInterval;
let seconds = 0;
let quizStarted = false;

function shuffleArray(arr) {
  // Fisher-Yates
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

function buildQuiz() {
  const container = document.getElementById('questions-container');
  container.innerHTML = '';
  questions.forEach((q, qi) => {
    const card = document.createElement('div');
    card.className = 'question-card' + (qi === 0 ? ' active' : '');
    card.id = 'q' + qi;

    // Shuffle options but track correct
    const indices = q.options.map((_, i) => i);
    shuffleArray(indices);
    q._shuffled = indices;

    let optionsHtml = '';
    indices.forEach((origIdx, displayIdx) => {
      optionsHtml += `
        <div class="option" data-q="${qi}" data-orig="${origIdx}" onclick="selectOption(this, ${qi}, ${origIdx})">
          <div class="radio"><div class="dot"></div></div>
          <span>${q.options[origIdx]}</span>
        </div>`;
    });

    card.innerHTML = `
      <div class="q-number">Pergunta ${qi + 1} de ${questions.length}</div>
      <div class="q-text">${q.q}</div>
      <div class="options">${optionsHtml}</div>
      <div class="feedback" id="fb${qi}"></div>
    `;
    container.appendChild(card);
  });
}

function startQuiz() {
  document.getElementById('intro').style.display = 'none';
  document.getElementById('quiz').style.display = 'block';
  current = 0;
  score = 0;
  seconds = 0;
  answers = new Array(questions.length).fill(null);
  buildQuiz();
  updateProgress();
  timerInterval = setInterval(() => {
    seconds++;
    const m = String(Math.floor(seconds / 60)).padStart(2, '0');
    const s = String(seconds % 60).padStart(2, '0');
    document.getElementById('timer').textContent = m + ':' + s;
  }, 1000);
  quizStarted = true;
}

function selectOption(el, qi, origIdx) {
  if (answers[qi] !== null) return; // already answered

  const q = questions[qi];
  const isCorrect = origIdx === q.correct;
  answers[qi] = { selected: origIdx, correct: isCorrect };
  if (isCorrect) score++;

  // Disable all options
  const card = document.getElementById('q' + qi);
  const opts = card.querySelectorAll('.option');
  opts.forEach(o => {
    o.classList.add('disabled');
    const oi = parseInt(o.dataset.orig);
    if (oi === origIdx && isCorrect) {
      o.classList.add('correct');
    } else if (oi === origIdx && !isCorrect) {
      o.classList.add('wrong');
    }
    if (oi === q.correct && !isCorrect) {
      o.classList.add('show-correct', 'correct');
    }
  });

  // Show feedback
  const fb = document.getElementById('fb' + qi);
  fb.className = 'feedback ' + (isCorrect ? 'correct' : 'wrong');
  fb.innerHTML = (isCorrect ? '<strong>Correto!</strong> ' : '<strong>Incorreto.</strong> ') + q.explanation;

  // Show next button
  const btn = document.getElementById('nextBtn');
  btn.classList.add('visible');
  btn.textContent = current < questions.length - 1 ? 'Próxima pergunta \u2192' : 'Ver resultados';
}

function nextQuestion() {
  if (current < questions.length - 1) {
    document.getElementById('q' + current).classList.remove('active');
    current++;
    document.getElementById('q' + current).classList.add('active');
    document.getElementById('nextBtn').classList.remove('visible');
    updateProgress();
  } else {
    showResults();
  }
}

function updateProgress() {
  const pct = ((current + 1) / questions.length) * 100;
  document.getElementById('progress').style.width = pct + '%';
}

function showResults() {
  clearInterval(timerInterval);
  document.getElementById('quiz').style.display = 'none';
  const res = document.getElementById('results');
  res.classList.add('active');

  const pct = Math.round((score / questions.length) * 100);
  document.getElementById('scoreNumber').textContent = score;

  const circle = document.getElementById('scoreCircle');
  if (pct >= 80) {
    circle.className = 'score-circle great';
    document.getElementById('resultsTitle').textContent = 'Excelente!';
    document.getElementById('resultsMsg').textContent = `${score} de ${questions.length} corretas (${pct}%). Ótimo domínio dos conceitos das aulas 1 a 3.`;
  } else if (pct >= 50) {
    circle.className = 'score-circle ok';
    document.getElementById('resultsTitle').textContent = 'Bom trabalho!';
    document.getElementById('resultsMsg').textContent = `${score} de ${questions.length} corretas (${pct}%). Revejam os tópicos onde erraram.`;
  } else {
    circle.className = 'score-circle weak';
    document.getElementById('resultsTitle').textContent = 'Precisa de revisão.';
    document.getElementById('resultsMsg').textContent = `${score} de ${questions.length} corretas (${pct}%). Recomendo rever os slides antes da próxima aula.`;
  }

  const m = String(Math.floor(seconds / 60)).padStart(2, '0');
  const s = String(seconds % 60).padStart(2, '0');
  document.getElementById('resultsMsg').textContent += ` Tempo: ${m}:${s}.`;

  const grid = document.getElementById('resultsGrid');
  grid.innerHTML = '';
  answers.forEach((a, i) => {
    const dot = document.createElement('div');
    dot.className = 'dot ' + (a && a.correct ? 'g' : 'r');
    dot.textContent = i + 1;
    grid.appendChild(dot);
  });
}

function resetQuiz() {
  document.getElementById('results').classList.remove('active');
  document.getElementById('intro').style.display = 'block';
  current = 0;
  score = 0;
  seconds = 0;
  answers = [];
  document.getElementById('timer').textContent = '00:00';
}

function reviewQuiz() {
  document.getElementById('results').classList.remove('active');
  document.getElementById('quiz').style.display = 'block';
  document.getElementById('nextBtn').classList.add('visible');
  document.getElementById('nextBtn').textContent = 'Próxima pergunta \u2192';

  // Show all cards in review mode
  const cards = document.querySelectorAll('.question-card');
  cards.forEach(c => c.classList.remove('active'));
  current = 0;
  document.getElementById('q0').classList.add('active');

  // Override next to cycle through
  document.getElementById('nextBtn').onclick = function() {
    if (current < questions.length - 1) {
      document.getElementById('q' + current).classList.remove('active');
      current++;
      document.getElementById('q' + current).classList.add('active');
      if (current === questions.length - 1) {
        document.getElementById('nextBtn').textContent = 'Voltar aos resultados';
      }
    } else {
      document.getElementById('quiz').style.display = 'none';
      document.getElementById('results').classList.add('active');
      document.getElementById('nextBtn').onclick = function() { nextQuestion(); };
    }
  };
}
